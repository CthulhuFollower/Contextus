<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1a22" />
  <title>Contextus</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/three.module.js"
      }
    }
  </script>
  <style>
    :root {
      --bg-top: #0f1a22;
      --bg-mid: #0a1218;
      --bg-deep: #060b10;

      --node: rgba(190, 205, 218, 0.92);
      --node-center: rgba(235, 241, 246, 0.98);
      --node-selected: rgba(250, 253, 255, 1);

      --line: rgba(150, 182, 205, 0.16);
      --line-active: rgba(218, 235, 248, 0.42);

      --text: #d7e1e9;

      --tool-bg: rgba(11, 20, 28, 0.42);
      --tool-border: rgba(200, 228, 246, 0.12);
      --tool-bg-hover: rgba(18, 31, 42, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-deep));
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
    }

    canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    .floating-tools {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
    }

    .maps-entry {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 90;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--tool-border);
      background: var(--tool-bg);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(10px);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.02);
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    .tool-btn:hover {
      background: var(--tool-bg-hover);
      transform: scale(1.04);
    }

    .tool-btn:active {
      transform: scale(0.98);
    }

    #scene {
      transition: filter 0.34s ease, transform 0.34s ease, opacity 0.34s ease;
    }

    .constellation-btn {
      position: relative;
      overflow: hidden;
    }

    .constellation-btn::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 32% 35%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 68% 40%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 40% 68%, rgba(239, 247, 252, 0.9) 0 1.6px, transparent 2.2px),
        radial-gradient(circle at 72% 72%, rgba(239, 247, 252, 0.82) 0 1.4px, transparent 2px);
      opacity: 0.92;
    }

    .constellation-btn::after {
      content: "";
      position: absolute;
      inset: 10px 9px;
      border: 1px solid rgba(228, 240, 249, 0.14);
      border-left: none;
      border-bottom: none;
      transform: skewY(6deg) rotate(5deg);
      opacity: 0.5;
    }

    .maps-open #scene {
      filter: blur(11px) saturate(0.54) brightness(0.48);
      transform: scale(1.028);
      opacity: 0.92;
    }

    .maps-entering #scene {
      filter: blur(16px) saturate(0.34) brightness(0.18);
      transform: scale(1.052);
      opacity: 0.2;
    }

    .maps-open .floating-tools {
      opacity: 0.14;
      filter: blur(4px);
      pointer-events: none;
    }

    .maps-entering .floating-tools,
    .maps-entering .constellation-btn {
      opacity: 0;
      filter: blur(6px);
      pointer-events: none;
    }

    .maps-open .constellation-btn {
      background: rgba(18, 31, 42, 0.78);
      border-color: rgba(216, 232, 244, 0.18);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.22),
        0 0 0 1px rgba(210, 228, 240, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .maps-open .editor,
    .maps-open .note-card {
      opacity: 0;
      pointer-events: none;
    }

    .maps-overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      background:
        radial-gradient(circle at 50% 44%, rgba(160, 186, 206, 0.14), rgba(12, 20, 28, 0.12) 24%, rgba(7, 12, 18, 0.58) 58%, rgba(4, 8, 12, 0.82) 100%),
        linear-gradient(180deg, rgba(9, 16, 22, 0.36), rgba(4, 8, 12, 0.74));
    }

    .maps-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .maps-overlay canvas {
      position: absolute;
      inset: 0;
    }

    .maps-label {
      position: absolute;
      z-index: 2;
      display: none;
      min-width: 100px;
      max-width: 220px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(206, 225, 239, 0.1);
      background: rgba(8, 14, 20, 0.7);
      color: #e9f2f8;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 16px));
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    }

    .maps-label.is-visible {
      display: block;
    }

    .maps-center-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 2;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(210, 228, 240, 0.1);
      background: rgba(7, 12, 18, 0.48);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(8px) scale(0.92);
      transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      pointer-events: none;
      cursor: pointer;
    }

    .maps-center-btn.is-visible {
      opacity: 0.82;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .maps-center-btn:hover {
      background: rgba(11, 18, 26, 0.72);
      border-color: rgba(220, 235, 245, 0.16);
    }

    .maps-center-btn::before,
    .maps-center-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      border-radius: 999px;
    }

    .maps-center-btn::before {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(234, 243, 248, 0.56);
    }

    .maps-center-btn::after {
      width: 3px;
      height: 3px;
      background: rgba(244, 249, 252, 0.8);
      box-shadow: 0 0 10px rgba(245, 249, 252, 0.18);
    }

    .maps-confirm {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .maps-confirm.is-visible {
      display: flex;
    }

    .maps-confirm-panel {
      width: min(360px, calc(100vw - 32px));
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(194, 220, 239, 0.13);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.96), rgba(6, 10, 15, 0.9)),
        rgba(8, 14, 20, 0.92);
      box-shadow:
        0 24px 44px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.03);
      text-align: center;
      pointer-events: auto;
      backdrop-filter: blur(18px);
    }

    .maps-confirm-kicker {
      margin: 0 0 10px;
      color: rgba(214, 226, 235, 0.74);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .maps-confirm-name {
      margin: 0 0 10px;
      color: #eff7fb;
      font-size: 16px;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }

    .maps-confirm-copy {
      margin: 0 0 16px;
      color: rgba(196, 211, 221, 0.78);
      font-size: 12px;
      line-height: 1.6;
    }

    .maps-confirm-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .maps-confirm-btn {
      min-width: 112px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(196, 220, 238, 0.12);
      background: rgba(11, 19, 26, 0.72);
      color: #d8e3eb;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    .maps-confirm-btn:hover {
      transform: translateY(-1px);
      background: rgba(17, 29, 39, 0.82);
      border-color: rgba(208, 226, 239, 0.18);
    }

    .maps-confirm-btn:focus-visible {
      outline: none;
      border-color: rgba(220, 235, 245, 0.22);
      box-shadow:
        0 0 0 1px rgba(220, 235, 245, 0.12),
        0 0 0 4px rgba(213, 228, 239, 0.05);
    }

    .maps-confirm-btn.is-danger {
      background: rgba(32, 15, 18, 0.88);
      border-color: rgba(221, 168, 176, 0.18);
      color: rgba(247, 228, 232, 0.92);
    }

    .maps-confirm-btn.is-danger:hover {
      background: rgba(48, 18, 23, 0.92);
      border-color: rgba(236, 182, 191, 0.28);
    }

    .editor {
      position: absolute;
      z-index: 60;
      display: none;
      width: min(360px, calc(100vw - 32px));
    }

    .editor.is-visible {
      display: block;
    }

    .editor-panel,
    .note-card {
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(194, 220, 239, 0.12);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.92), rgba(7, 12, 18, 0.84)),
        rgba(8, 14, 20, 0.9);
      backdrop-filter: blur(18px);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .editor-head,
    .note-card-title {
      margin: 0 0 10px;
      color: rgba(224, 236, 245, 0.9);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .editor input,
    .editor textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(190, 220, 245, 0.12);
      background: rgba(8, 14, 20, 0.82);
      color: var(--text);
      outline: none;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .editor input {
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .editor textarea {
      min-height: 150px;
      max-height: 42vh;
      resize: none;
      white-space: pre-wrap;
    }

    .editor input:focus,
    .editor textarea:focus {
      border-color: rgba(214, 232, 244, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 0 0 1px rgba(215, 233, 244, 0.08);
    }

    .editor input::placeholder,
    .editor textarea::placeholder {
      color: #708393;
    }

    .editor-foot {
      margin-top: 10px;
      color: rgba(160, 178, 191, 0.74);
      font-size: 11px;
      text-align: right;
      letter-spacing: 0.02em;
    }

    .note-card {
      position: absolute;
      z-index: 55;
      display: none;
      width: min(320px, calc(100vw - 32px));
      pointer-events: none;
    }

    .note-card.is-preview {
      z-index: 54;
      width: min(240px, calc(100vw - 48px));
      padding: 12px 13px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(10, 16, 23, 0.9), rgba(6, 10, 16, 0.82)),
        rgba(7, 12, 18, 0.86);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.025);
    }

    .note-card.is-visible {
      display: block;
    }

    .note-card-body {
      max-height: min(220px, 34vh);
      overflow: auto;
      color: rgba(223, 234, 242, 0.88);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      scrollbar-width: thin;
      scrollbar-color: rgba(173, 196, 213, 0.28) transparent;
    }

    .note-card.is-preview .note-card-title {
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(219, 232, 242, 0.82);
    }

    .note-card.is-preview .note-card-body {
      max-height: min(156px, 24vh);
      overflow: hidden;
      font-size: 11px;
      line-height: 1.52;
      color: rgba(214, 227, 236, 0.84);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div class="floating-tools">
      <button id="addNodeBtn" class="tool-btn" title="Agregar nodo">+</button>
      <button id="removeNodeBtn" class="tool-btn" title="Eliminar nodo">−</button>
    </div>

    <div class="maps-entry">
      <button id="openMapsBtn" class="tool-btn constellation-btn" title="Abrir constelacion de mapas" aria-label="Abrir constelacion de mapas"></button>
    </div>

    <div id="mapsOverlay" class="maps-overlay" aria-hidden="true">
      <canvas id="mapsScene"></canvas>
      <div id="mapsLabel" class="maps-label" aria-hidden="true"></div>
      <button id="centerMapsBtn" class="maps-center-btn" type="button" aria-label="Centrar" title="Centrar"></button>
      <div id="mapsConfirm" class="maps-confirm" aria-hidden="true">
        <div id="mapsConfirmPanel" class="maps-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="mapsConfirmName">
          <div class="maps-confirm-kicker">Borrar mapa</div>
          <div id="mapsConfirmName" class="maps-confirm-name"></div>
          <div class="maps-confirm-copy">Esta accion no se puede deshacer.</div>
          <div class="maps-confirm-actions">
            <button id="cancelDeleteMapBtn" class="maps-confirm-btn" type="button">Cancelar</button>
            <button id="confirmDeleteMapBtn" class="maps-confirm-btn is-danger" type="button">Borrar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="editor" class="editor">
      <div class="editor-panel">
        <div class="editor-head">Nodo</div>
        <input id="nodeInput" type="text" maxlength="64" placeholder="Titulo breve" />
        <textarea id="nodeNoteInput" maxlength="1800" placeholder="Desarrolla la idea con mas detalle..."></textarea>
        <div class="editor-foot">Esc cancela. Ctrl+Enter guarda.</div>
      </div>
    </div>

    <div id="noteCard" class="note-card" aria-hidden="true">
      <div id="noteCardTitle" class="note-card-title"></div>
      <div id="noteCardBody" class="note-card-body"></div>
    </div>
  </div>

    function toFiniteNumber(value, fallback = 0) {
      if (value === null || value === undefined || value === "") return fallback;
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function sanitizePersistedText(value, fallback = "") {
      if (typeof value !== "string") return fallback;
      const trimmed = value.trim();
      return trimmed || fallback;
    }

    function clonePersistedValue(value) {
      return JSON.parse(JSON.stringify(value));

    function requestToPromise(request) {
      return new Promise((resolve, reject) => {
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function openLocalDb() {
      if (!("indexedDB" in window)) {
        return Promise.reject(new Error("IndexedDB no esta disponible."));
      }

      if (localDbPromise) return localDbPromise;

      localDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(LOCAL_DB_NAME, LOCAL_DB_VERSION);

        request.onupgradeneeded = () => {
          const db = request.result;

          if (!db.objectStoreNames.contains("snapshots")) {
            db.createObjectStore("snapshots", { keyPath: "id" });
          }

          if (!db.objectStoreNames.contains("transactions")) {
            const transactionsStore = db.createObjectStore("transactions", { keyPath: "id" });
            transactionsStore.createIndex("status", "status", { unique: false });
            transactionsStore.createIndex("createdAt", "createdAt", { unique: false });
          }

          if (!db.objectStoreNames.contains("meta")) {
            db.createObjectStore("meta", { keyPath: "key" });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        request.onblocked = () => {
          console.warn("La base local esta bloqueada por otra pestana.");
        };
      });

      return localDbPromise;
    }

    function queuePersistenceTask(task) {
      const queuedTask = persistenceChain.then(task, task);
      persistenceChain = queuedTask.catch(() => {});
      return queuedTask;
    }

    function nextLocalRevision() {
      localRevision = Math.max(0, toFiniteNumber(localRevision, 0)) + 1;
      return localRevision;
    }

    function createTransactionId() {
      const randomPart = Math.random().toString(36).slice(2, 10);
      return `tx_${Date.now()}_${randomPart}`;
    }

    function createLocalTransactionRecord(type, payload, revision) {
      if (!LOCAL_TRANSACTION_TYPES.has(type)) {
        throw new Error(`Tipo de transaccion desconocido: ${type}`);
      }

      return {
        id: createTransactionId(),
        type,
        createdAt: Date.now(),
        localRevision: revision,
        status: "pending",
        payload: clonePersistedValue(payload || {})
      };
    }

    function createLocalSnapshotRecord(state, revision) {
      return {
        id: LOCAL_SNAPSHOT_ID,
        schemaVersion: LOCAL_SCHEMA_VERSION,
        storageVersion: STORAGE_VERSION,
        localRevision: revision,
        savedAt: Date.now(),
        state: clonePersistedValue(state)
      };
    }

    function writeLocalCommit(snapshotRecord, transactionRecord = null, metaRecords = []) {
      return openLocalDb().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(["snapshots", "transactions", "meta"], "readwrite");

        tx.objectStore("snapshots").put(snapshotRecord);
        tx.objectStore("meta").put({ key: "localRevision", value: snapshotRecord.localRevision });

        for (const record of metaRecords) {
          tx.objectStore("meta").put(record);
        }

        if (transactionRecord) {
          tx.objectStore("transactions").put(transactionRecord);
        }

        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error("Transaccion local abortada."));
      }));
    }

    function writeLocalMetaRecords(metaRecords) {
      return openLocalDb().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(["meta"], "readwrite");
        const store = tx.objectStore("meta");

        for (const record of metaRecords) {
          store.put(record);
        }

        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error("Transaccion local abortada."));
      }));
    }

    function setLocalMetaValue(key, value) {
      return queuePersistenceTask(() => writeLocalMetaRecords([{ key, value }]));
    }

    async function loadLocalSnapshot() {
      const db = await openLocalDb();
      const tx = db.transaction(["snapshots"], "readonly");
      const snapshot = await requestToPromise(tx.objectStore("snapshots").get(LOCAL_SNAPSHOT_ID));
      return snapshot || null;
    }

    function captureWorkspaceState(syncActiveMap = true) {
      if (syncActiveMap) {
        syncActiveMapInMemory();
      }

      return clonePersistedValue({
        version: STORAGE_VERSION,
        activeMapId,
        mapIdCounter,
        mapsView: captureMapsViewState(),
        maps
      });
    }

    function saveLocalSnapshot(state) {
      const revision = nextLocalRevision();
      const snapshotRecord = createLocalSnapshotRecord(state, revision);
      return queuePersistenceTask(() => writeLocalCommit(snapshotRecord));
    }

    function enqueueLocalTransaction(type, payload = {}, revisionOverride = null) {
      const revision = Number.isFinite(revisionOverride) ? revisionOverride : nextLocalRevision();
      const transactionRecord = createLocalTransactionRecord(type, payload, revision);

      return queuePersistenceTask(() => openLocalDb().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(["transactions", "meta"], "readwrite");
        tx.objectStore("transactions").put(transactionRecord);
        tx.objectStore("meta").put({ key: "localRevision", value: revision });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error("Transaccion local abortada."));
      })));
    }

    function commitLocalTransaction(type, payload = {}, options = {}) {
      try {
        const syncActiveMap = options.syncActiveMap !== false;
        const revision = nextLocalRevision();
        const state = captureWorkspaceState(syncActiveMap);
        const snapshotRecord = createLocalSnapshotRecord(state, revision);
        const transactionRecord = createLocalTransactionRecord(type, payload, revision);

        return queuePersistenceTask(() => writeLocalCommit(snapshotRecord, transactionRecord))
          .catch((error) => {
            console.error("No se pudo confirmar la transaccion local:", error);
          });
      } catch (error) {
        console.error("No se pudo preparar la transaccion local:", error);
        return Promise.resolve();
      }
    }

    function restorePersistedState(state, shouldResave = false) {
      if (!state || !Array.isArray(state.maps)) return false;

      const restoredMaps = state.maps.map((map, index) =>
        sanitizeStoredMap(map, Number.isFinite(Number(map && map.id)) ? Number(map.id) : index + 1)
      );

      if (!restoredMaps.length) return false;

      const needsResave =
        shouldResave ||
        state.version !== STORAGE_VERSION ||
        !Number.isFinite(Number(state.mapIdCounter)) ||
        !Number.isFinite(Number(state.activeMapId)) ||
        state.maps.some(map => !Number.isFinite(Number(map && map.id))) ||
        state.maps.some(map => !readStoredStarIdentity(map)) ||
        !sanitizeMapsViewState(state.mapsView);

      return restoreWorkspace(
        restoredMaps,
        Number(state.activeMapId),
        toFiniteNumber(state.mapIdCounter, 0),
        sanitizeMapsViewState(state.mapsView),
        needsResave
      );

    function loadLocalStorageState() {
      try {
        const currentRaw = localStorage.getItem(STORAGE_KEY);
        if (currentRaw) {
          const state = JSON.parse(currentRaw);
          if (restorePersistedState(state, false)) return true;
        }

        const legacyMultiRaw = localStorage.getItem(LEGACY_MULTI_STORAGE_KEY);
        if (legacyMultiRaw) {
          const state = JSON.parse(legacyMultiRaw);
          if (state && Array.isArray(state.maps)) {
            const restoredMaps = state.maps.map((map, index) =>
              sanitizeStoredMap(map, index + 1)
            );

            if (restoredMaps.length) {
              const activeIndex = Math.floor(clamp(toFiniteNumber(state.activeMapIndex, 0), 0, restoredMaps.length - 1));
              return restoreWorkspace(
                restoredMaps,
                restoredMaps[activeIndex].id,
                restoredMaps.length,
                null,
                true
              );
            }
          }
        }

        const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!legacyRaw) return false;

        const legacyState = JSON.parse(legacyRaw);
        if (!legacyState || !Array.isArray(legacyState.nodes) || !Array.isArray(legacyState.links)) {
          return false;
        }

        const restoredMap = sanitizeStoredMap(legacyState, 1);
        return restoreWorkspace([restoredMap], restoredMap.id, 1, null, true);
      } catch (error) {
        console.error("No se pudo cargar el estado heredado:", error);
        return false;
      }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function smoothstep(edge0, edge1, value) {
      if (edge0 === edge1) {
        return value < edge0 ? 0 : 1;
      }

      const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function hash01(seed) {
      const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453123;
      return x - Math.floor(x);
    }

    function rgba(color, alpha) {
      return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    }

    function mixColor(colorA, colorB, amount = 0.5) {
      const t = clamp(amount, 0, 1);
      return [
        Math.round(lerp(colorA[0], colorB[0], t)),
        Math.round(lerp(colorA[1], colorB[1], t)),
        Math.round(lerp(colorA[2], colorB[2], t))
      ];
    }

    function roundValue(value, precision = 3) {
      return Number(value.toFixed(precision));
    }

    function randomInRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function getStarTypeTemplate(starType, starVariant = null) {
      const base = STAR_TYPE_PROFILES[starType] || STAR_TYPE_PROFILES.yellow;
      const variant = STAR_VARIANT_PROFILES[starType] && STAR_VARIANT_PROFILES[starType][starVariant];
      return variant ? { ...base, ...variant } : base;
    }

    function pickWeightedEntry(entries, value = null) {
      const totalWeight = entries.reduce((sum, entry) => sum + entry.weight, 0);
      const rollValue = Number.isFinite(value) ? clamp(value, 0, 0.999999) : Math.random();
      let roll = rollValue * totalWeight;

      for (const entry of entries) {
        roll -= entry.weight;
        if (roll <= 0) {
          return entry;
        }
      }

      return entries[entries.length - 1];
    }

    function pickWeightedStarType() {
      return pickWeightedEntry(STAR_TYPE_WEIGHTS).type;
    }

    function isValidStarVariant(starType, starVariant) {
      return Boolean(
        starVariant &&
        STAR_VARIANT_PROFILES[starType] &&
        STAR_VARIANT_PROFILES[starType][starVariant]
      );
    }

    function pickStarVariant(starType) {
      if (starType === "red") {
        return Math.random() < STAR_RED_GIANT_PROBABILITY ? "giant" : null;
      }

      if (starType === "white") {
        return pickWeightedEntry(WHITE_STAR_VARIANT_WEIGHTS).variant;
      }

      return null;
    }

    function createRandomStarIdentity() {
      const starType = pickWeightedStarType();
      const starVariant = pickStarVariant(starType);
      const template = getStarTypeTemplate(starType, starVariant);

      return {
        starType,
        starVariant,
        starScale: roundValue(randomInRange(template.scaleRange[0], template.scaleRange[1])),
        starLuminosity: roundValue(randomInRange(template.luminosityRange[0], template.luminosityRange[1]))
      };
    }

    function readStoredStarIdentity(rawMap) {
      const starType = typeof (rawMap && rawMap.starType) === "string"
        ? rawMap.starType
        : null;
      if (!STAR_TYPE_PROFILES[starType]) return null;

      const rawStarVariant = typeof (rawMap && rawMap.starVariant) === "string"
        ? rawMap.starVariant
        : null;
      const starVariant = isValidStarVariant(starType, rawStarVariant) ? rawStarVariant : null;
      const template = getStarTypeTemplate(starType, starVariant);
      const scale = Number(rawMap && rawMap.starScale);
      const luminosity = Number(rawMap && rawMap.starLuminosity);

      if (!Number.isFinite(scale) || !Number.isFinite(luminosity)) {
        return null;
      }

      return {
        starType,
        starVariant,
        starScale: roundValue(clamp(scale, template.scaleRange[0], template.scaleRange[1])),
        starLuminosity: roundValue(clamp(luminosity, template.luminosityRange[0], template.luminosityRange[1]))
      };
    }

    function sanitizeStarIdentity(rawMap) {
      return readStoredStarIdentity(rawMap) || createRandomStarIdentity();
    }

    function invalidateConstellationVisualCaches(mapId = null) {
      if (mapId === null) {

      constellationStarProfileCache.delete(mapId);

    function getMapStarProfile(map) {
      const cached = constellationStarProfileCache.get(map.id);
      if (cached && cached.mapRef === map) {
        return cached.profile;
      }

      const identity = sanitizeStarIdentity(map);
      const template = getStarTypeTemplate(identity.starType, identity.starVariant);
      const profile = {
        ...identity,
        ...template
      };

      constellationStarProfileCache.set(map.id, {
        mapRef: map,
        profile
      });
      return profile;

    function createDefaultMapState(mapId = allocateMapId(), starIdentityOverride = null) {
      let nextNodeId = 0;
      const mapNodes = [];
      const mapLinks = [];
      const starIdentity = starIdentityOverride || createRandomStarIdentity();

      function addMapNode({ x, y, parentId = null, level = 0, isCenter = false, label = "", note = "" }) {
        const id = ++nextNodeId;
        mapNodes.push({
          id,
          parentId,
          level,
          isCenter,
          label: label || (isCenter ? "Centro" : "Nodo"),
          note: typeof note === "string" ? note : "",
          x,
          y
        });

        if (parentId !== null) {
          mapLinks.push({
            from: parentId,
            to: id
          });
        }

        return { id };
      }

      const center = addMapNode({
        x: 0,
        y: 0,
        level: 0,
        isCenter: true,
        label: "Centro"
      });

      const count = 4;
      const radius = 160;

      for (let i = 0; i < count; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i / count);
        addMapNode({
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          parentId: center.id,
          level: 1,
          label: "Nodo"
        });
      }

      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter: nextNodeId,
        selectedNodeId: center.id,
        constellationPosition: null,
        camera: {
          x: width / 2,
          y: height / 2,
          targetX: width / 2,
          targetY: height / 2
        },
        nodes: mapNodes,
        links: mapLinks
      };
    }

    function sanitizeStoredMap(rawMap, fallbackId) {
      const rawNodes = Array.isArray(rawMap && rawMap.nodes) ? rawMap.nodes : [];
      const rawLinks = Array.isArray(rawMap && rawMap.links) ? rawMap.links : [];
      const mapId = toFiniteNumber(rawMap && rawMap.id, fallbackId);

      const validNodeIds = new Set();
      const sanitizedNodes = [];
      let maxNodeId = 0;

      for (const rawNode of rawNodes) {
        if (!rawNode) continue;

        const nodeId = toFiniteNumber(rawNode.id, maxNodeId + 1);
        const parentId = rawNode.parentId === null || rawNode.parentId === undefined
          ? null
          : toFiniteNumber(rawNode.parentId, null);
        const isCenter = Boolean(rawNode.isCenter);
        maxNodeId = Math.max(maxNodeId, nodeId);
        validNodeIds.add(nodeId);

        sanitizedNodes.push({
          id: nodeId,
          parentId,
          level: toFiniteNumber(rawNode.level, 0),
          isCenter,
          label: sanitizePersistedText(rawNode.label, isCenter ? "Centro" : "Nodo"),
          note: typeof rawNode.note === "string" ? rawNode.note : "",
          x: toFiniteNumber(rawNode.x, 0),
          y: toFiniteNumber(rawNode.y, 0)
        });
      }

      for (const node of sanitizedNodes) {
        if (node.parentId !== null && !validNodeIds.has(node.parentId)) {
          node.parentId = null;
        }
      }

      const sanitizedLinks = [];
      for (const rawLink of rawLinks) {
        if (!rawLink) continue;

        const from = toFiniteNumber(rawLink.from, NaN);
        const to = toFiniteNumber(rawLink.to, NaN);

        if (validNodeIds.has(from) && validNodeIds.has(to)) {
          sanitizedLinks.push({
            from,
            to
          });
        }
      }

      if (!sanitizedNodes.length) {
        return createDefaultMapState(mapId);
      }

      const starIdentity = sanitizeStarIdentity(rawMap);

      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter: Math.max(toFiniteNumber(rawMap && rawMap.nodeIdCounter, 0), maxNodeId),
        selectedNodeId: validNodeIds.has(toFiniteNumber(rawMap && rawMap.selectedNodeId, NaN))
          ? toFiniteNumber(rawMap.selectedNodeId, sanitizedNodes[0].id)
          : sanitizedNodes[0].id,
        constellationPosition: sanitizeConstellationPosition(rawMap && rawMap.constellationPosition),
        camera: {
          x: rawMap && rawMap.camera ? toFiniteNumber(rawMap.camera.x, width / 2) : width / 2,
          y: rawMap && rawMap.camera ? toFiniteNumber(rawMap.camera.y, height / 2) : height / 2,
          targetX: rawMap && rawMap.camera ? toFiniteNumber(rawMap.camera.targetX, toFiniteNumber(rawMap.camera.x, width / 2)) : width / 2,
          targetY: rawMap && rawMap.camera ? toFiniteNumber(rawMap.camera.targetY, toFiniteNumber(rawMap.camera.y, height / 2)) : height / 2,
          zoom: rawMap && rawMap.camera ? clamp(Number(rawMap.camera.zoom) || 1, D0_ZOOM_MIN, D0_ZOOM_MAX) : 1,
          targetZoom: rawMap && rawMap.camera
            ? clamp(Number(rawMap.camera.targetZoom) || Number(rawMap.camera.zoom) || 1, D0_ZOOM_MIN, D0_ZOOM_MAX)
            : 1
        },
        nodes: sanitizedNodes,
        links: sanitizedLinks
      };
    }

    function serializeCurrentMap(mapId = activeMapId) {
      const existingMap = getMapById(mapId);
      const starIdentity = sanitizeStarIdentity(existingMap);
      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter,
        selectedNodeId,
        constellationPosition: cloneConstellationPosition(existingMap && existingMap.constellationPosition),
        camera: {
          x: camera.x,
          y: camera.y,
          targetX: camera.targetX,
          targetY: camera.targetY,
          zoom: camera.zoom,
          targetZoom: camera.targetZoom
        },
        nodes: nodes.map(node => ({
          id: node.id,
          parentId: node.parentId,
          level: node.level,
          isCenter: node.isCenter,
          label: node.label,
          note: node.note,
          x: node.x,
          y: node.y
        })),
        links: links.map(link => ({
          from: link.from,
          to: link.to
        }))
      };
    }

    function syncActiveMapInMemory() {
      const index = getActiveMapIndex();
      if (index < 0) return;
      maps[index] = serializeCurrentMap(activeMapId);
      invalidateConstellationVisualCaches(activeMapId);
    }

    function sanitizeConstellationPosition(rawPosition) {
      if (!rawPosition) return null;
      const x = Number(rawPosition.x);
      const y = Number(rawPosition.y);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
      return { x, y };
    }

    function cloneConstellationPosition(position) {
      const sanitized = sanitizeConstellationPosition(position);
      return sanitized ? { x: sanitized.x, y: sanitized.y } : null;
    }

    function sanitizeMapsViewState(rawView) {
      if (!rawView) return null;

      const x = toFiniteNumber(rawView.x, NaN);
      const y = toFiniteNumber(rawView.y, NaN);
      const zoom = clamp(toFiniteNumber(rawView.zoom, NaN), MAPS_ZOOM_MIN, MAPS_ZOOM_MAX);
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(zoom)) return null;

      const targetX = toFiniteNumber(rawView.targetX, x);
      const targetY = toFiniteNumber(rawView.targetY, y);
      const targetZoom = Number.isFinite(toFiniteNumber(rawView.targetZoom, NaN))
        ? clamp(toFiniteNumber(rawView.targetZoom, zoom), MAPS_ZOOM_MIN, MAPS_ZOOM_MAX)
        : zoom;

      return {
        x,
        y,
        targetX,
        targetY,
        zoom,
        targetZoom
      };
    }

    function setMapConstellationPosition(mapId, x, y) {
      const map = getMapById(mapId);
      if (!map || !Number.isFinite(x) || !Number.isFinite(y)) return false;
      map.constellationPosition = { x, y };
      return true;
    }

    function freezeMapConstellationPosition(map) {
      if (!map || cloneConstellationPosition(map.constellationPosition)) return;

      const orderedMaps = getOrderedMaps();
      const mapIndex = orderedMaps.findIndex(candidate => candidate.id === map.id);
      if (mapIndex < 0) return;

      const point = getConstellationMapWorldPoint(map, mapIndex, orderedMaps.length);
      map.constellationPosition = {
        x: point.x,
        y: point.y
      };
    }

    function applyMapState(state) {
      nodes.length = 0;
      links.length = 0;

      activeMapId = state.id;
      nodeIdCounter = state.nodeIdCounter ?? 0;
      selectedNodeId = state.selectedNodeId ?? null;
      editingNodeId = null;
      draggedNodeId = null;
      panning = false;
      pointerMoved = false;

      app.style.cursor = mapsOverlayOpen ? "default" : "grab";
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
      hideNoteCard();

      const nextCamera = state.camera || {};
      camera.x = toFiniteNumber(nextCamera.x, width / 2);
      camera.y = toFiniteNumber(nextCamera.y, height / 2);
      camera.targetX = toFiniteNumber(nextCamera.targetX, camera.x);
      camera.targetY = toFiniteNumber(nextCamera.targetY, camera.y);
      camera.zoom = clamp(toFiniteNumber(nextCamera.zoom, 1), D0_ZOOM_MIN, D0_ZOOM_MAX);
      camera.targetZoom = clamp(toFiniteNumber(nextCamera.targetZoom, camera.zoom), D0_ZOOM_MIN, D0_ZOOM_MAX);

      for (const savedNode of state.nodes || []) {
        nodes.push({
          id: savedNode.id,
          parentId: savedNode.parentId ?? null,
          level: toFiniteNumber(savedNode.level, 0),
          isCenter: Boolean(savedNode.isCenter),
          label: sanitizePersistedText(savedNode.label, savedNode.isCenter ? "Centro" : "Nodo"),
          note: typeof savedNode.note === "string" ? savedNode.note : "",

          x: toFiniteNumber(savedNode.x, 0),
          y: toFiniteNumber(savedNode.y, 0),

          vx: 0,
          vy: 0,

          renderX: toFiniteNumber(savedNode.x, 0),
          renderY: toFiniteNumber(savedNode.y, 0),

          baseRadius: savedNode.isCenter ? 20 : 14,
          visualRadius: savedNode.isCenter ? 20 : 14,
          targetRadius: savedNode.isCenter ? 20 : 14,

          pulseUntil: 0,
          labelFloatSeed: Math.random() * Math.PI * 2
        });
      }

      for (const savedLink of state.links || []) {
        if (getNodeById(savedLink.from) && getNodeById(savedLink.to)) {
          links.push({
            from: savedLink.from,
            to: savedLink.to,
            lastEnergy: 0
          });
        }
      }

      if (!nodes.length) {
        const replacement = createDefaultMapState(state.id);
        const index = getMapIndexById(state.id);
        if (index >= 0) maps[index] = replacement;
        applyMapState(replacement);
        return;
      }

      if (!getNodeById(selectedNodeId)) {
        selectedNodeId = nodes[0].id;
      }
    }

    function updateMapsButton() {
      const totalMaps = Math.max(1, maps.length);
      const title = mapsOverlayOpen
        ? `Cerrar constelacion de mapas (${totalMaps})`
        : `Abrir constelacion de mapas (${totalMaps})`;

      openMapsBtn.title = title;
      openMapsBtn.setAttribute("aria-label", title);
      openMapsBtn.classList.toggle("is-active", mapsOverlayOpen);
    }

    function flushPendingSave() {
      if (saveTimeout !== null) {
        clearTimeout(saveTimeout);
        saveTimeout = null;
      }
    }

    function clearMapsLabel() {
      mapsLabel.textContent = "";
      mapsLabel.style.color = "";
      mapsLabel.style.textShadow = "";
      mapsLabel.classList.remove("is-visible");
    }

    function closeDeleteConfirmation() {
      pendingDeleteMapId = null;
      mapsConfirm.classList.remove("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "true");
    }

    function openDeleteConfirmation(mapId) {
      if (maps.length <= 1 || isOverlayEntering()) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      const orderedMaps = getOrderedMaps();
      const fallbackIndex = orderedMaps.findIndex(candidate => candidate.id === map.id);

      pendingDeleteMapId = mapId;
      mapsConfirmName.textContent = trimText(getMapName(map, Math.max(0, fallbackIndex)), 40);
      mapsConfirm.classList.add("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "false");
      clearMapsLabel();
      cancelDeleteMapBtn.focus();
      return true;
    }

    function getNextMapIdAfterDelete(mapId) {
      const remainingIds = getOrderedMaps()
        .map(map => map.id)
        .filter(existingId => existingId !== mapId);

      if (!remainingIds.length) return null;

      const nextGreater = remainingIds.find(existingId => existingId > mapId);
      return nextGreater ?? remainingIds[0];
    }

    function deleteMapById(mapId) {
      if (maps.length <= 1 || isOverlayEntering()) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const willLeaveSingleMapUniverse = maps.length === 2;
      if (willLeaveSingleMapUniverse) {
        freezeMapConstellationPosition(maps.find(existingMap => existingMap.id !== mapId));
      }
      const nextActiveId = mapId === activeMapId
        ? getNextMapIdAfterDelete(mapId)
        : activeMapId;
      const nextSelectedId = overlaySelectedMapId === mapId
        ? (mapId === activeMapId ? nextActiveId : null)
        : overlaySelectedMapId;

      maps = maps.filter(existingMap => existingMap.id !== mapId);
      invalidateConstellationVisualCaches(mapId);
      hoveredMapId = null;
      overlaySelectedMapId = nextSelectedId;
      closeDeleteConfirmation();

      if (mapId === activeMapId && nextActiveId !== null) {
        const nextMap = getMapById(nextActiveId);
        if (nextMap) {
          applyMapState(nextMap);
          if (willLeaveSingleMapUniverse) {
            holdMapsCameraAtCurrentView();
          } else {
            centerMapsCameraOnActive(false);
          }
        }
      } else if (willLeaveSingleMapUniverse) {
        holdMapsCameraAtCurrentView();
      }

      commitLocalTransaction("deleteMapAndSelectFallback", {
        deletedMapId: mapId,
        nextActiveMapId: activeMapId,
        nextOverlaySelectedMapId: overlaySelectedMapId,
        mapsView: captureMapsViewState()
      }, { syncActiveMap: false });
      updateMapsButton();
      return true;
    }

    function closeMapsOverlay() {
      if (!mapsOverlayOpen) return;

      settleMapsCamera();
      mapsOverlayOpen = false;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      overlaySelectedMapId = null;
      overlayCreateState = null;
      overlayEnterState = null;
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      draggedNodeId = null;
      panning = false;

      closeDeleteConfirmation();
      clearMapsLabel();
      hideNoteCard();
      centerMapsBtn.classList.remove("is-visible");
      mapsOverlay.classList.remove("is-open");
      mapsOverlay.setAttribute("aria-hidden", "true");
      app.classList.remove("maps-open");
      app.classList.remove("maps-entering");
      mapsCtx.clearRect(0, 0, width, height);
      app.style.cursor = "grab";
      updateMapsButton();
      commitLocalTransaction("updateViewFrame", createViewFramePayload("closeMapsOverlay"), { syncActiveMap: false });
    }

    function openMapsOverlay() {
      if (!maps.length) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();
      draggedNodeId = null;
      panning = false;

      mapsOverlayOpen = true;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      overlaySelectedMapId = activeMapId;
      overlayCreateState = null;
      overlayEnterState = null;
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      settleMapsCamera();
      closeDeleteConfirmation();
      hideNoteCard();

      mapsOverlay.classList.add("is-open");
      mapsOverlay.setAttribute("aria-hidden", "false");
      app.classList.add("maps-open");
      app.classList.remove("maps-entering");
      app.style.cursor = "default";
      updateMapsButton();
      updateMapsCenterButton();
    }

    function toggleMapsOverlay() {
      if (mapsOverlayOpen) closeMapsOverlay();
      else openMapsOverlay();
    }

    function switchMapById(mapId) {
      if (mapId === activeMapId) {
        closeMapsOverlay();
        return;
      }

      const nextMap = getMapById(mapId);
      if (!nextMap) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const previousMapId = activeMapId;
      applyMapState(nextMap);
      commitLocalTransaction("switchMap", {
        previousMapId,
        activeMapId,
        mapsView: captureMapsViewState()
      }, { syncActiveMap: false });
      closeMapsOverlay();
    }

    function cancelOverlayEntryTransition() {
      if (!overlayEnterState) return false;
      overlayEnterState = null;
      app.classList.remove("maps-entering");
      updateMapsCenterButton();
      return true;
    }

    function cancelOverlayCreateMode() {
      if (!overlayCreateState) return false;
      overlayCreateState = null;
      clearMapsLabel();
      return true;
    }

    function enterOverlayCreateMode() {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering()) return false;

      if (isOverlayCreating()) {
        cancelOverlayCreateMode();
        return false;
      }

      overlayCreateState = {
        starIdentity: createRandomStarIdentity(),
        previewMapId: -(mapIdCounter + 1),
        seed: Math.random() * 1000
      };
      hoveredMapId = null;
      clearMapsLabel();
      return true;
    }

    function createMapInConstellationAtWorldPoint(worldPoint, starIdentity = null) {
      if (!worldPoint || !Number.isFinite(worldPoint.x) || !Number.isFinite(worldPoint.y)) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const wasSingleMapUniverse = maps.length === 1;
      if (wasSingleMapUniverse) {
        freezeMapConstellationPosition(maps[0]);
      }
      const resolvedStarIdentity = starIdentity
        ? { ...starIdentity }
        : overlayCreateState && overlayCreateState.starIdentity
          ? { ...overlayCreateState.starIdentity }
          : createRandomStarIdentity();
      const freshMap = createDefaultMapState(undefined, resolvedStarIdentity);
      freshMap.constellationPosition = {
        x: worldPoint.x,
        y: worldPoint.y
      };
      maps.push(freshMap);
      invalidateConstellationVisualCaches(freshMap.id);
      overlaySelectedMapId = freshMap.id;
      hoveredMapId = freshMap.id;
      cancelOverlayCreateMode();
      if (wasSingleMapUniverse) {
        holdMapsCameraAtCurrentView();
      }
      commitLocalTransaction("createMap", {
        mapId: freshMap.id,
        map: clonePersistedValue(freshMap),
        mapsView: captureMapsViewState()
      }, { syncActiveMap: false });
      updateMapsButton();
      updateMapsCenterButton();
      return true;
    }

    function startOverlayEntryTransition(mapId) {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering()) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      const orderedMaps = getOrderedMaps();
      const mapIndex = orderedMaps.findIndex(candidate => candidate.id === mapId);
      if (mapIndex < 0) return false;

      const point = getConstellationMapWorldPoint(map, mapIndex, orderedMaps.length);
      const visualItem = constellationItems.find(item => item.kind === "map" && item.mapId === mapId);
      const targetX = visualItem ? visualItem.worldX + visualItem.driftX : point.x;
      const targetY = visualItem ? visualItem.worldY + visualItem.driftY : point.y;
      overlaySelectedMapId = mapId;
      hoveredMapId = null;
      overlayEnterState = {
        mapId,
        startedAt: null,
        startX: mapsCamera.x,
        startY: mapsCamera.y,
        startZoom: mapsCamera.zoom,
        targetX,
        targetY,
        targetZoom: clamp(Math.max(mapsCamera.zoom * 2.35, 1.9), MAPS_ZOOM_MIN, MAPS_ZOOM_MAX)
      };
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      clearMapsLabel();
      app.classList.add("maps-entering");
      updateMapsCenterButton();
      return true;
    }

    function createNewMap() {
      return enterOverlayCreateMode();
    }

    function getNodeById(id) {
      return nodes.find(n => n.id === id);
    }

    function getChildren(parentId) {
      return nodes.filter(n => n.parentId === parentId);
    }

    function getDescendants(nodeId) {
      const result = [];
      const stack = [nodeId];

      while (stack.length) {
        const current = stack.pop();
        const children = nodes.filter(n => n.parentId === current);
        for (const child of children) {
          result.push(child.id);
          stack.push(child.id);
        }
      }

      return result;
    }

    function getAdjacentNodes(nodeId) {
      const node = getNodeById(nodeId);
      if (!node) return [];

      const adjacent = [];
      if (node.parentId !== null) {
        const parent = getNodeById(node.parentId);
        if (parent) adjacent.push(parent);
      }

      for (const child of getChildren(node.id)) {
        adjacent.push(child);
      }

      return adjacent;
    }

    function addChildNode() {
      const parent = getNodeById(selectedNodeId);
      if (!parent) return;

      const siblings = getChildren(parent.id);
      const count = siblings.length;
      const distance = Math.max(110, 142 - parent.level * 8);

      let angle;
      if (parent.isCenter) {
        angle = -Math.PI / 2 + count * 0.92;
      } else {
        const parentOfParent = parent.parentId !== null ? getNodeById(parent.parentId) : null;
        const baseAngle = parentOfParent
          ? Math.atan2(parent.y - parentOfParent.y, parent.x - parentOfParent.x)
          : -Math.PI / 2;
        angle = baseAngle + (-0.75 + count * 0.45);
      }

      const child = createNode({
        x: parent.x + Math.cos(angle) * distance,
        y: parent.y + Math.sin(angle) * distance,
        parentId: parent.id,
        level: parent.level + 1,
        label: "Nuevo"
      });

      selectedNodeId = child.id;
      triggerExpand(child);
      commitLocalTransaction("createNode", {
        mapId: activeMapId,
        parentId: parent.id,
        node: serializeNodeForTransaction(child)
      }, { syncActiveMap: true });
    }

    function removeSelectedNode() {
      const node = getNodeById(selectedNodeId);
      if (!node || node.isCenter) return;

      const descendants = getDescendants(node.id);
      const idsToDelete = new Set([node.id, ...descendants]);
      const deletedNodes = nodes
        .filter(existingNode => idsToDelete.has(existingNode.id))
        .map(serializeNodeForTransaction);
      const deletedLinks = links
        .filter(link => idsToDelete.has(link.from) || idsToDelete.has(link.to))
        .map(link => ({ from: link.from, to: link.to }));

      for (let i = nodes.length - 1; i >= 0; i--) {
        if (idsToDelete.has(nodes[i].id)) nodes.splice(i, 1);
      }

      for (let i = links.length - 1; i >= 0; i--) {
        if (idsToDelete.has(links[i].from) || idsToDelete.has(links[i].to)) {
          links.splice(i, 1);
        }
      }

      if (editingNodeId && idsToDelete.has(editingNodeId)) closeEditor(false);

      const fallback = node.parentId ? getNodeById(node.parentId) : nodes[0];
      selectedNodeId = fallback ? fallback.id : null;
      commitLocalTransaction("deleteNodeTree", {
        mapId: activeMapId,
        rootNodeId: node.id,
        deletedNodeIds: [...idsToDelete],
        deletedNodes,
        deletedLinks,
        selectedNodeId
      }, { syncActiveMap: true });
    }

    function triggerExpand(node) {
      node.pulseUntil = performance.now() + 320;
    }

    function pointerPosition(e, targetElement = canvas) {
      const rect = targetElement.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function screenToWorld(
      x,
      y,
      zoom = camera.zoom,
      cameraX = camera.x,
      cameraY = camera.y
    ) {
      const safeZoom = Math.max(zoom, 0.0001);
      return {
        x: (x - cameraX) / safeZoom,
        y: (y - cameraY) / safeZoom
      };
    }

    function projectWorldPoint(x, y, zoom = camera.zoom, cameraX = camera.x, cameraY = camera.y) {
      return {
        x: x * zoom + cameraX,
        y: y * zoom + cameraY
      };
    }

    function getNodeAtScreen(x, y) {
      for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        const screenPoint = projectWorldPoint(n.renderX, n.renderY);
        const sx = screenPoint.x;
        const sy = screenPoint.y;
        const dx = x - sx;
        const dy = y - sy;
        const hitRadius = Math.max(18, (n.visualRadius + 10) * camera.zoom);
        if (dx * dx + dy * dy <= hitRadius * hitRadius) return n;
      }
      return null;
    }

    function trimText(text, max) {
      return text.length > max ? text.slice(0, max - 3) + "..." : text;
    }

    function wrap(value, size) {
      if (!size) return 0;
      return ((value % size) + size) % size;
    }

    function getNodeNote(node) {
      return node && typeof node.note === "string" ? node.note.trim() : "";
    }

    function hideNoteCard() {
      noteCard.classList.remove("is-visible");
      noteCard.setAttribute("aria-hidden", "true");
    }

    function ensureAdjacentNoteCard(nodeId) {
      let entry = adjacentNoteCards.get(nodeId);
      if (entry) return entry;

      const card = document.createElement("div");
      card.className = "note-card is-preview";
      card.setAttribute("aria-hidden", "true");

      const title = document.createElement("div");
      title.className = "note-card-title";

      const body = document.createElement("div");
      body.className = "note-card-body";

      card.append(title, body);
      app.append(card);

      entry = { card, title, body };
      adjacentNoteCards.set(nodeId, entry);
      return entry;
    }

    function hideAdjacentNoteCards() {
      for (const entry of adjacentNoteCards.values()) {
        entry.card.classList.remove("is-visible");
        entry.card.setAttribute("aria-hidden", "true");
      }
    }

    function pruneAdjacentNoteCards(visibleIds) {
      for (const [nodeId, entry] of adjacentNoteCards.entries()) {
        if (visibleIds.has(nodeId)) continue;
        entry.card.remove();
        adjacentNoteCards.delete(nodeId);
      }
    }

    function positionFloatingPanel(element, anchorX, anchorY, xOffset = 32) {
      const margin = 16;
      const rect = element.getBoundingClientRect();
      let left = anchorX + xOffset;

      if (left + rect.width > width - margin) {
        left = anchorX - rect.width - xOffset;
      }

      left = clamp(left, margin, Math.max(margin, width - rect.width - margin));

      let top = anchorY - rect.height * 0.34;
      top = clamp(top, margin, Math.max(margin, height - rect.height - margin));

      element.style.left = `${left}px`;
      element.style.top = `${top}px`;
    }

    function positionAdjacentNoteLane(items, side) {
      if (!items.length) return;

      const margin = 16;
      const gap = 12;

      items.sort((a, b) => a.preferredTop - b.preferredTop);

      let cursorTop = margin;
      for (const item of items) {
        item.top = Math.max(item.preferredTop, cursorTop);
        cursorTop = item.top + item.height + gap;
      }

      const overflowBottom = cursorTop - gap - (height - margin);
      if (overflowBottom > 0) {
        for (let i = items.length - 1; i >= 0; i--) {
          items[i].top -= overflowBottom;
        }
      }

      const firstTop = items[0].top;
      if (firstTop < margin) {
        const shiftDown = margin - firstTop;
        for (const item of items) {
          item.top += shiftDown;
        }
      }

      for (const item of items) {
        const horizontalOffset = 26 + Math.abs(item.directionX) * 18;
        let left = side === "right"
          ? item.anchorX + horizontalOffset
          : item.anchorX - item.width - horizontalOffset;

        left = clamp(left, margin, Math.max(margin, width - item.width - margin));
        item.entry.card.style.left = `${left}px`;
        item.entry.card.style.top = `${clamp(item.top, margin, Math.max(margin, height - item.height - margin))}px`;
      }
    }

    function updateAdjacentNoteCards() {
      if (!altRevealActive || mapsOverlayOpen || editingNodeId) {
        hideAdjacentNoteCards();
        return;
      }

      const selectedNode = getNodeById(selectedNodeId);
      if (!selectedNode) {
        hideAdjacentNoteCards();
        return;
      }

      const selectedPoint = projectWorldPoint(selectedNode.renderX, selectedNode.renderY);
      const selectedX = selectedPoint.x;
      const selectedY = selectedPoint.y;
      const adjacentNodes = getAdjacentNodes(selectedNode.id)
        .filter(node => getNodeNote(node).length > 0);
      const visibleIds = new Set(adjacentNodes.map(node => node.id));

      pruneAdjacentNoteCards(visibleIds);
      if (!adjacentNodes.length) {
        hideAdjacentNoteCards();
        return;
      }

      const lanes = {
        left: [],
        right: []
      };

      adjacentNodes.sort((a, b) => {
        const angleA = Math.atan2(a.renderY - selectedNode.renderY, a.renderX - selectedNode.renderX);
        const angleB = Math.atan2(b.renderY - selectedNode.renderY, b.renderX - selectedNode.renderX);
        return angleA - angleB;
      });

      for (const node of adjacentNodes) {
        const entry = ensureAdjacentNoteCard(node.id);
        const note = getNodeNote(node);
        const title = trimText(getNodeDisplayTitle(node), 30);

        if (entry.title.textContent !== title) {
          entry.title.textContent = title;
        }

        if (entry.body.textContent !== note) {
          entry.body.textContent = note;
        }

        entry.card.classList.add("is-visible");
        entry.card.setAttribute("aria-hidden", "false");

        const anchorPoint = projectWorldPoint(node.renderX, node.renderY);
        const anchorX = anchorPoint.x;
        const anchorY = anchorPoint.y;
        const dx = anchorX - selectedX;
        const dy = anchorY - selectedY;
        const direction = normalize(dx || 0.001, dy || -1);
        const side = dx < 0 ? "left" : "right";
        const rect = entry.card.getBoundingClientRect();

        lanes[side].push({
          entry,
          anchorX: anchorX + direction.x * 6,
          preferredTop: anchorY - rect.height * 0.5 + clamp(direction.y * 24, -28, 28),
          directionX: direction.x,
          width: rect.width,
          height: rect.height
        });
      }

      positionAdjacentNoteLane(lanes.left, "left");
      positionAdjacentNoteLane(lanes.right, "right");
    }

    function updateSelectedNoteCard() {
      if (mapsOverlayOpen || editingNodeId) {
        hideNoteCard();
        return;
      }

      const node = getNodeById(selectedNodeId);
      const note = getNodeNote(node);
      if (!node || !note) {
        hideNoteCard();
        return;
      }

      const title = trimText(getNodeDisplayTitle(node), 44);
      if (noteCardTitle.textContent !== title) {
        noteCardTitle.textContent = title;
      }
      if (noteCardBody.textContent !== note) {
        noteCardBody.textContent = note;
        noteCardBody.scrollTop = 0;
      }
      if (!noteCard.classList.contains("is-visible")) {
        noteCard.classList.add("is-visible");
        noteCard.setAttribute("aria-hidden", "false");
      }

      const point = projectWorldPoint(node.renderX, node.renderY);
      positionFloatingPanel(noteCard, point.x, point.y, 28);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function length(x, y) {
      return Math.hypot(x, y) || 1;
    }

    function normalize(x, y) {
      const len = length(x, y);
      return { x: x / len, y: y / len, len };
    }

    function updateNodes() {
      camera.x += (camera.targetX - camera.x) * 0.12;
      camera.y += (camera.targetY - camera.y) * 0.12;
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.14;

      for (const node of nodes) {
        const pulsing = performance.now() < node.pulseUntil;
        node.targetRadius = node.baseRadius * (pulsing ? 1.48 : (node.id === selectedNodeId ? 1.18 : 1));
        node.visualRadius += (node.targetRadius - node.visualRadius) * 0.15;

        node.x += node.vx;
        node.y += node.vy;

        node.vx *= 0.86;
        node.vy *= 0.86;

        if (Math.abs(node.vx) < 0.002) node.vx = 0;
        if (Math.abs(node.vy) < 0.002) node.vy = 0;

        node.renderX = node.x;
        node.renderY = node.y;
      }
    }

    function getBackgroundStarColors(seed, layerDepth = 0.5) {
      const weightedFamilies = [
        { weight: 40, family: "white_cold" },
        { weight: 25, family: "blue_white" },
        { weight: 15, family: "yellow_white" },
        { weight: 10, family: "orange" },
        { weight: 10, family: "red" }
      ];
      const totalWeight = weightedFamilies.reduce((sum, entry) => sum + entry.weight, 0);
      let roll = hash01(seed * 4.91) * totalWeight;
      let selectedFamily = weightedFamilies[0].family;

      for (const entry of weightedFamilies) {
        roll -= entry.weight;
        if (roll <= 0) {
          selectedFamily = entry.family;
          break;
        }
      }

      const whitePoint = [248, 250, 252];
      const nearFactor = clamp(layerDepth, 0, 1);
      const variant = hash01(seed * 7.3);
      const intenseRoll = hash01(seed * 11.7);
      const intenseThreshold = lerp(0.995, 0.9, nearFactor);
      const intenseVariant = intenseRoll > intenseThreshold;
      const intensityRoll = hash01(seed * 17.1);
      const brightnessRoll = hash01(seed * 19.9);
      const accentRoll = hash01(seed * 27.7);
      const accentSeed = hash01(seed * 31.4);
      const sizeRoll = hash01(seed * 33.2);
      const coreSizeRoll = hash01(seed * 35.8);
      const bloomRoll = hash01(seed * 39.6);
      let coreBase;
      let glowBase;
      let glowAlphaBoost = 1;
      let coreAlphaBoost = 1;
      let brightnessBoost = lerp(0.42, 1.34 + nearFactor * 0.24, brightnessRoll);
      let glowRadiusBoost = lerp(0.56, 1.58 + nearFactor * 0.34, sizeRoll);
      let coreRadiusBoost = lerp(0.72, 1.22 + nearFactor * 0.18, coreSizeRoll);
      let bloomRadiusBoost = 0;
      let bloomAlphaBoost = 0;
      let accentLevel = 0;

      if (accentRoll > lerp(0.9994, 0.982, nearFactor)) {
        accentLevel = 3;
      } else if (accentRoll > lerp(0.978, 0.85, nearFactor)) {
        accentLevel = 2;
      } else if (accentRoll > lerp(0.82, 0.5, nearFactor)) {
        accentLevel = 1;
      }

      if (brightnessRoll > lerp(0.988, 0.89, nearFactor)) {
        brightnessBoost = lerp(1.48, 2.28 + nearFactor * 0.34, hash01(seed * 23.4));
      } else if (brightnessRoll > lerp(0.9, 0.64, nearFactor)) {
        brightnessBoost = lerp(1.12, 1.74 + nearFactor * 0.18, hash01(seed * 21.2));
      }

      if (accentLevel === 3) {
        brightnessBoost = Math.max(brightnessBoost, lerp(3.4, 5.3 + nearFactor * 0.4, accentSeed));
        glowRadiusBoost = lerp(3.2, 5.1 + nearFactor * 0.34, sizeRoll);
        coreRadiusBoost = lerp(1.22, 1.72 + nearFactor * 0.08, coreSizeRoll);
        bloomRadiusBoost = lerp(2.4, 4 + nearFactor * 0.24, bloomRoll);
        bloomAlphaBoost = lerp(0.24, 0.42 + nearFactor * 0.04, hash01(seed * 41.8));
      } else if (accentLevel === 2) {
        brightnessBoost = Math.max(brightnessBoost, lerp(2.6, 4.4 + nearFactor * 0.42, accentSeed));
        glowRadiusBoost = lerp(2.6, 4.6 + nearFactor * 0.34, sizeRoll);
        coreRadiusBoost = lerp(1.12, 1.58 + nearFactor * 0.08, coreSizeRoll);
        bloomRadiusBoost = lerp(2.1, 3.6 + nearFactor * 0.22, bloomRoll);
        bloomAlphaBoost = lerp(0.22, 0.4 + nearFactor * 0.06, hash01(seed * 41.8));
      } else if (accentLevel === 1) {
        brightnessBoost = Math.max(brightnessBoost, lerp(1.3, 2.26 + nearFactor * 0.16, accentSeed));
        glowRadiusBoost = lerp(1.36, 2.42 + nearFactor * 0.16, sizeRoll);
        coreRadiusBoost = lerp(0.98, 1.32 + nearFactor * 0.04, coreSizeRoll);
        bloomRadiusBoost = lerp(1.06, 1.84 + nearFactor * 0.08, bloomRoll);
        bloomAlphaBoost = lerp(0.06, 0.14 + nearFactor * 0.02, hash01(seed * 41.8));
      }

      if (selectedFamily === "blue_white") {
        coreBase = mixColor([230, 239, 255], [186, 217, 255], variant);
        glowBase = mixColor([154, 194, 255], [58, 136, 255], variant);
        glowAlphaBoost = lerp(1.12, 1.34, intensityRoll) + nearFactor * 0.12;
        coreAlphaBoost = lerp(1.02, 1.12, intensityRoll);
        if (intenseVariant) {
          glowBase = mixColor(glowBase, [38, 112, 255], 0.42 + nearFactor * 0.28);
          glowAlphaBoost += 0.12;
        }
        if (accentLevel > 0) {
          const accentMix =
            accentLevel === 3 ? 0.76 + nearFactor * 0.28 :
            accentLevel === 2 ? 0.58 + nearFactor * 0.26 :
            0.28 + nearFactor * 0.12;
          glowBase = mixColor(glowBase, [34, 106, 255], accentMix);
          glowAlphaBoost += accentLevel === 3 ? 0.62 : accentLevel === 2 ? 0.34 : 0.16;
        }
      } else if (selectedFamily === "yellow_white") {
        coreBase = mixColor([255, 246, 222], [255, 232, 184], variant);
        glowBase = mixColor([255, 224, 162], [255, 192, 98], variant);
        glowAlphaBoost = lerp(1.08, 1.24, intensityRoll) + nearFactor * 0.08;
        coreAlphaBoost = lerp(1.01, 1.08, intensityRoll);
        if (intenseVariant) {
          glowBase = mixColor(glowBase, [255, 206, 84], 0.32 + nearFactor * 0.24);
          glowAlphaBoost += 0.08;
        }
        if (accentLevel > 0) {
          const accentMix =
            accentLevel === 3 ? 0.72 + nearFactor * 0.22 :
            accentLevel === 2 ? 0.5 + nearFactor * 0.2 :
            0.24 + nearFactor * 0.1;
          glowBase = mixColor(glowBase, [255, 202, 58], accentMix);
          glowAlphaBoost += accentLevel === 3 ? 0.48 : accentLevel === 2 ? 0.26 : 0.12;
        }
      } else if (selectedFamily === "orange") {
        coreBase = mixColor([255, 228, 194], [255, 204, 148], variant);
        glowBase = mixColor([255, 186, 114], [255, 132, 42], variant);
        glowAlphaBoost = lerp(1.12, 1.3, intensityRoll) + nearFactor * 0.1;
        coreAlphaBoost = lerp(1.02, 1.1, intensityRoll);
        if (intenseVariant) {
          glowBase = mixColor(glowBase, [255, 110, 24], 0.36 + nearFactor * 0.24);
          glowAlphaBoost += 0.1;
        }
        if (accentLevel > 0) {
          const accentMix =
            accentLevel === 3 ? 0.76 + nearFactor * 0.24 :
            accentLevel === 2 ? 0.56 + nearFactor * 0.22 :
            0.28 + nearFactor * 0.12;
          glowBase = mixColor(glowBase, [255, 102, 12], accentMix);
          glowAlphaBoost += accentLevel === 3 ? 0.54 : accentLevel === 2 ? 0.3 : 0.14;
        }
      } else if (selectedFamily === "red") {
        coreBase = mixColor([255, 214, 206], [255, 186, 172], variant);
        glowBase = mixColor([246, 138, 124], [232, 78, 66], variant);
        glowAlphaBoost = lerp(1.14, 1.32, intensityRoll) + nearFactor * 0.1;
        coreAlphaBoost = lerp(1.02, 1.12, intensityRoll);
        if (intenseVariant) {
          glowBase = mixColor(glowBase, [255, 64, 54], 0.34 + nearFactor * 0.28);
          glowAlphaBoost += 0.12;
        }
        if (accentLevel > 0) {
          const accentMix =
            accentLevel === 3 ? 0.78 + nearFactor * 0.24 :
            accentLevel === 2 ? 0.54 + nearFactor * 0.26 :
            0.24 + nearFactor * 0.12;
          glowBase = mixColor(glowBase, [255, 48, 36], accentMix);
          glowAlphaBoost += accentLevel === 3 ? 0.58 : accentLevel === 2 ? 0.32 : 0.14;
        }
      } else {
        coreBase = mixColor([248, 250, 255], [228, 241, 255], variant);
        glowBase = mixColor([228, 238, 252], [178, 210, 255], variant);
        glowAlphaBoost = lerp(1.02, 1.12, intensityRoll) + nearFactor * 0.04;
        coreAlphaBoost = lerp(1, 1.06, intensityRoll);
        if (intenseVariant) {
          glowBase = mixColor(glowBase, [158, 198, 255], 0.24 + nearFactor * 0.16);
          glowAlphaBoost += 0.05;
        }
        if (accentLevel > 0) {
          const accentMix =
            accentLevel === 3 ? 0.42 + nearFactor * 0.18 :
            accentLevel === 2 ? 0.3 + nearFactor * 0.14 :
            0.14 + nearFactor * 0.06;
          glowBase = mixColor(glowBase, [146, 194, 255], accentMix);
          glowAlphaBoost += accentLevel === 3 ? 0.22 : accentLevel === 2 ? 0.12 : 0.06;
        }
      }

      const accentCoreWhitenDrop = accentLevel === 3 ? 0.28 : accentLevel === 2 ? 0.18 : accentLevel === 1 ? 0.08 : 0;
      const accentGlowWhitenDrop = accentLevel === 3 ? 0.24 : accentLevel === 2 ? 0.14 : accentLevel === 1 ? 0.06 : 0;
      const coreWhiten = clamp(0.34 - nearFactor * 0.18 - (intenseVariant ? 0.08 : 0) - accentCoreWhitenDrop, 0, 0.48);
      const glowWhiten = clamp(0.12 - nearFactor * 0.08 - (intenseVariant ? 0.08 : 0) - accentGlowWhitenDrop, 0, 0.22);

      return {
        core: mixColor(coreBase, whitePoint, coreWhiten),
        glow: mixColor(glowBase, coreBase, glowWhiten),
        glowAlphaBoost,
        coreAlphaBoost,
        brightnessBoost,
        glowRadiusBoost,
        coreRadiusBoost,
        bloomRadiusBoost,
        bloomAlphaBoost
      };
    }

    function getUniverseBackdropLayerTileCount(layer) {
      return Math.max(
        6,
        Math.round((layer.count * UNIVERSE_BACKDROP_TILE_SIZE * UNIVERSE_BACKDROP_TILE_SIZE) / UNIVERSE_BACKDROP_REFERENCE_AREA)
      );
    }

    function drawUniverseBackdropStar(layerCtx, x, y, colors, glowRadius, coreRadius, glowAlpha, coreAlpha, bloomRadius, bloomAlpha) {
      if (bloomRadius > 0.01 && bloomAlpha > 0.002) {
        const bloom = layerCtx.createRadialGradient(x, y, 0, x, y, bloomRadius);
        bloom.addColorStop(0, rgba(colors.glow, bloomAlpha));
        bloom.addColorStop(1, "rgba(0,0,0,0)");
        layerCtx.fillStyle = bloom;
        layerCtx.beginPath();
        layerCtx.arc(x, y, bloomRadius, 0, Math.PI * 2);
        layerCtx.fill();
      }

      const glow = layerCtx.createRadialGradient(x, y, 0, x, y, glowRadius);
      glow.addColorStop(0, rgba(colors.glow, glowAlpha));
      glow.addColorStop(1, "rgba(0,0,0,0)");
      layerCtx.fillStyle = glow;
      layerCtx.beginPath();
      layerCtx.arc(x, y, glowRadius, 0, Math.PI * 2);
      layerCtx.fill();

      layerCtx.beginPath();
      layerCtx.arc(x, y, coreRadius, 0, Math.PI * 2);
      layerCtx.fillStyle = rgba(colors.core, coreAlpha);
      layerCtx.fill();
    }

    function createUniverseBackdropLayerCanvas(mode, layer, layerIndex, totalLayers) {
      const layerCanvas = document.createElement("canvas");
      layerCanvas.width = UNIVERSE_BACKDROP_TILE_SIZE;
      layerCanvas.height = UNIVERSE_BACKDROP_TILE_SIZE;
      const layerCtx = layerCanvas.getContext("2d");
      const starCount = getUniverseBackdropLayerTileCount(layer);
      const modeOffset = mode === "d1" ? 1000 : 0;
      const layerDepth = totalLayers <= 1 ? 1 : layerIndex / (totalLayers - 1);

      for (let i = 0; i < starCount; i++) {
        const seed = modeOffset + layerIndex * 10000 + i + 1;
        const x = hash01(seed * 3.7) * UNIVERSE_BACKDROP_TILE_SIZE;
        const y = hash01(seed * 8.9 + 14) * UNIVERSE_BACKDROP_TILE_SIZE;
        const glowRadius = layer.glowRadiusMin + hash01(seed * 5.1) * layer.glowRadiusRange;
        const coreRadius = layer.coreRadiusMin + hash01(seed * 6.8) * layer.coreRadiusRange;
        const glowAlpha = layer.glowAlphaMin + hash01(seed * 4.2) * layer.glowAlphaRange;
        const coreAlpha = layer.coreAlphaMin + hash01(seed * 9.4) * layer.coreAlphaRange;
        const colors = getBackgroundStarColors(seed, layerDepth);
        const finalGlowRadius = glowRadius * colors.glowRadiusBoost;
        const finalCoreRadius = coreRadius * colors.coreRadiusBoost;
        const finalGlowAlpha = clamp(glowAlpha * colors.glowAlphaBoost * colors.brightnessBoost, 0, 0.94);
        const finalCoreAlpha = clamp(coreAlpha * colors.coreAlphaBoost * colors.brightnessBoost, 0, 1);
        const finalBloomRadius = finalGlowRadius * colors.bloomRadiusBoost;
        const finalBloomAlpha = clamp(finalGlowAlpha * colors.bloomAlphaBoost, 0, 0.62);
        const drawRadius = Math.max(finalBloomRadius, finalGlowRadius, finalCoreRadius);
        const wrapOffsetsX = [0];
        const wrapOffsetsY = [0];

        if (x - drawRadius < 0) wrapOffsetsX.push(UNIVERSE_BACKDROP_TILE_SIZE);
        if (x + drawRadius > UNIVERSE_BACKDROP_TILE_SIZE) wrapOffsetsX.push(-UNIVERSE_BACKDROP_TILE_SIZE);
        if (y - drawRadius < 0) wrapOffsetsY.push(UNIVERSE_BACKDROP_TILE_SIZE);
        if (y + drawRadius > UNIVERSE_BACKDROP_TILE_SIZE) wrapOffsetsY.push(-UNIVERSE_BACKDROP_TILE_SIZE);

        for (const offsetX of wrapOffsetsX) {
          for (const offsetY of wrapOffsetsY) {
            drawUniverseBackdropStar(
              layerCtx,
              x + offsetX,
              y + offsetY,
              colors,
              finalGlowRadius,
              finalCoreRadius,
              finalGlowAlpha,
              finalCoreAlpha,
              finalBloomRadius,
              finalBloomAlpha
            );
          }
        }
      }

      return {
        canvas: layerCanvas,
        parallax: layer.parallaxMin + layer.parallaxRange * 0.5,
        driftX: layer.driftX,
        driftY: layer.driftY,
        seed: modeOffset + layerIndex * 10000 + 1
      };
    }

    function ensureUniverseBackdropCache(mode = "d0") {
      if (universeBackdropCache[mode]) return universeBackdropCache[mode];

      const layerDefinitions = getUniverseBackdropLayers(mode);
      const layers = layerDefinitions.map((layer, index) =>
        createUniverseBackdropLayerCanvas(mode, layer, index, layerDefinitions.length)
      );
      universeBackdropCache[mode] = {
        tileSize: UNIVERSE_BACKDROP_TILE_SIZE,
        layers
      };
      return universeBackdropCache[mode];
    }

    function drawUniverseBackdropLayer(renderCtx, layer, viewCamera, time, tileSize) {
      const driftX = Math.sin(time * 0.00012 + layer.seed * 0.00024) * layer.driftX;
      const driftY = Math.cos(time * 0.0001 + layer.seed * 0.00017) * layer.driftY;
      const offsetX = -wrap(-viewCamera.x * layer.parallax + driftX, tileSize);
      const offsetY = -wrap(-viewCamera.y * layer.parallax + driftY, tileSize);

      for (let x = offsetX; x < width; x += tileSize) {
        for (let y = offsetY; y < height; y += tileSize) {
          renderCtx.drawImage(layer.canvas, x, y, tileSize, tileSize);
        }
      }
    }

    function drawUniverseBackdrop(renderCtx, viewCamera, time, mode = "d0") {
      renderCtx.fillStyle = "#000000";
      renderCtx.fillRect(0, 0, width, height);

      const cache = ensureUniverseBackdropCache(mode);
      for (const layer of cache.layers) {
        drawUniverseBackdropLayer(renderCtx, layer, viewCamera, time, cache.tileSize);
      }
    }

    function drawBackground(time = 0) {
      drawUniverseBackdrop(ctx, camera, time, "d0");
    }

    function drawLiminalField() {
      const gridSize = 260;
      const startX = -((camera.x * 0.22) % gridSize) - gridSize;
      const startY = -((camera.y * 0.14) % gridSize) - gridSize;

      ctx.strokeStyle = "rgba(190, 214, 230, 0.028)";
      ctx.lineWidth = 1;

      for (let x = startX; x < width + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, -gridSize);
        ctx.lineTo(x, height + gridSize);
        ctx.stroke();
      }

      for (let y = startY; y < height + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(-gridSize, y);
        ctx.lineTo(width + gridSize, y);
        ctx.stroke();
      }
    }

    function drawPlanes() {
      const layers = [
        { y: height * 0.30, amp: 18, px: 0.10, py: 0.06, alpha: 0.055 },
        { y: height * 0.48, amp: 24, px: 0.18, py: 0.09, alpha: 0.045 },
        { y: height * 0.68, amp: 30, px: 0.28, py: 0.12, alpha: 0.038 }
      ];

      for (const layer of layers) {
        ctx.beginPath();

        for (let sx = -80; sx <= width + 80; sx += 18) {
          const wx = sx - camera.x * layer.px;
          const wy = camera.y * layer.py;

          const y =
            layer.y +
            Math.sin(wx * 0.0035 + 1.2) * layer.amp +
            Math.sin(wx * 0.008 + wy * 0.002) * layer.amp * 0.32;

          if (sx === -80) ctx.moveTo(sx, y);
          else ctx.lineTo(sx, y);
        }

        ctx.lineTo(width + 80, height + 100);
        ctx.lineTo(-80, height + 100);
        ctx.closePath();

        const g = ctx.createLinearGradient(0, layer.y - 50, 0, height);
        g.addColorStop(0, `rgba(175, 198, 212, ${layer.alpha})`);
        g.addColorStop(1, "rgba(10, 18, 24, 0)");
        ctx.fillStyle = g;
        ctx.fill();
      }
    }

    function drawAmbientGlow() {
      const gx = width * 0.52 - camera.x * 0.08;
      const gy = height * 0.42 - camera.y * 0.04;
      const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(width, height) * 0.55);
      g.addColorStop(0, "rgba(155, 180, 195, 0.08)");
      g.addColorStop(0.55, "rgba(95, 120, 138, 0.025)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);
    }

    function drawDust() {
      for (let i = 0; i < 32; i++) {
        const x = ((((i * 173.3) - camera.x * (0.06 + (i % 4) * 0.01)) % (width + 180)) + (width + 180)) % (width + 180) - 90;
