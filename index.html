<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama Orgánico Sobrio</title>
  <style>
    :root {
      --bg-top: #0f1a22;
      --bg-mid: #0a1218;
      --bg-deep: #060b10;

      --node: rgba(190, 205, 218, 0.92);
      --node-center: rgba(235, 241, 246, 0.98);
      --node-selected: rgba(250, 253, 255, 1);

      --line: rgba(150, 182, 205, 0.16);
      --line-active: rgba(218, 235, 248, 0.42);

      --text: #d7e1e9;

      --tool-bg: rgba(11, 20, 28, 0.42);
      --tool-border: rgba(200, 228, 246, 0.12);
      --tool-bg-hover: rgba(18, 31, 42, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-deep));
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
    }

    canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    .floating-tools {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
    }

    .maps-entry {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 90;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--tool-border);
      background: var(--tool-bg);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(10px);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.02);
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    .tool-btn:hover {
      background: var(--tool-bg-hover);
      transform: scale(1.04);
    }

    .tool-btn:active {
      transform: scale(0.98);
    }

    #scene {
      transition: filter 0.34s ease, transform 0.34s ease, opacity 0.34s ease;
    }

    .constellation-btn {
      position: relative;
      overflow: hidden;
    }

    .constellation-btn::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 32% 35%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 68% 40%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 40% 68%, rgba(239, 247, 252, 0.9) 0 1.6px, transparent 2.2px),
        radial-gradient(circle at 72% 72%, rgba(239, 247, 252, 0.82) 0 1.4px, transparent 2px);
      opacity: 0.92;
    }

    .constellation-btn::after {
      content: "";
      position: absolute;
      inset: 10px 9px;
      border: 1px solid rgba(228, 240, 249, 0.14);
      border-left: none;
      border-bottom: none;
      transform: skewY(6deg) rotate(5deg);
      opacity: 0.5;
    }

    .maps-open #scene {
      filter: blur(11px) saturate(0.54) brightness(0.48);
      transform: scale(1.028);
      opacity: 0.92;
    }

    .maps-open .floating-tools {
      opacity: 0.14;
      filter: blur(4px);
      pointer-events: none;
    }

    .maps-open .constellation-btn {
      background: rgba(18, 31, 42, 0.78);
      border-color: rgba(216, 232, 244, 0.18);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.22),
        0 0 0 1px rgba(210, 228, 240, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .maps-open .editor,
    .maps-open .note-card {
      opacity: 0;
      pointer-events: none;
    }

    .maps-overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      background:
        radial-gradient(circle at 50% 44%, rgba(160, 186, 206, 0.14), rgba(12, 20, 28, 0.12) 24%, rgba(7, 12, 18, 0.58) 58%, rgba(4, 8, 12, 0.82) 100%),
        linear-gradient(180deg, rgba(9, 16, 22, 0.36), rgba(4, 8, 12, 0.74));
    }

    .maps-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .maps-overlay canvas {
      position: absolute;
      inset: 0;
    }

    .maps-label {
      position: absolute;
      z-index: 2;
      display: none;
      min-width: 100px;
      max-width: 220px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(206, 225, 239, 0.1);
      background: rgba(8, 14, 20, 0.7);
      color: #e9f2f8;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 16px));
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    }

    .maps-label.is-visible {
      display: block;
    }

    .maps-confirm {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .maps-confirm.is-visible {
      display: flex;
    }

    .maps-confirm-panel {
      width: min(360px, calc(100vw - 32px));
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(194, 220, 239, 0.13);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.96), rgba(6, 10, 15, 0.9)),
        rgba(8, 14, 20, 0.92);
      box-shadow:
        0 24px 44px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.03);
      text-align: center;
      pointer-events: auto;
      backdrop-filter: blur(18px);
    }

    .maps-confirm-kicker {
      margin: 0 0 10px;
      color: rgba(214, 226, 235, 0.74);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .maps-confirm-name {
      margin: 0 0 10px;
      color: #eff7fb;
      font-size: 16px;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }

    .maps-confirm-copy {
      margin: 0 0 16px;
      color: rgba(196, 211, 221, 0.78);
      font-size: 12px;
      line-height: 1.6;
    }

    .maps-confirm-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .maps-confirm-btn {
      min-width: 112px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(196, 220, 238, 0.12);
      background: rgba(11, 19, 26, 0.72);
      color: #d8e3eb;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    .maps-confirm-btn:hover {
      transform: translateY(-1px);
      background: rgba(17, 29, 39, 0.82);
      border-color: rgba(208, 226, 239, 0.18);
    }

    .maps-confirm-btn:focus-visible {
      outline: none;
      border-color: rgba(220, 235, 245, 0.22);
      box-shadow:
        0 0 0 1px rgba(220, 235, 245, 0.12),
        0 0 0 4px rgba(213, 228, 239, 0.05);
    }

    .maps-confirm-btn.is-danger {
      background: rgba(32, 15, 18, 0.88);
      border-color: rgba(221, 168, 176, 0.18);
      color: rgba(247, 228, 232, 0.92);
    }

    .maps-confirm-btn.is-danger:hover {
      background: rgba(48, 18, 23, 0.92);
      border-color: rgba(236, 182, 191, 0.28);
    }

    .editor {
      position: absolute;
      z-index: 60;
      display: none;
      width: min(360px, calc(100vw - 32px));
    }

    .editor.is-visible {
      display: block;
    }

    .editor-panel,
    .note-card {
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(194, 220, 239, 0.12);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.92), rgba(7, 12, 18, 0.84)),
        rgba(8, 14, 20, 0.9);
      backdrop-filter: blur(18px);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .editor-head,
    .note-card-title {
      margin: 0 0 10px;
      color: rgba(224, 236, 245, 0.9);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .editor input,
    .editor textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(190, 220, 245, 0.12);
      background: rgba(8, 14, 20, 0.82);
      color: var(--text);
      outline: none;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .editor input {
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .editor textarea {
      min-height: 150px;
      max-height: 42vh;
      resize: none;
      white-space: pre-wrap;
    }

    .editor input:focus,
    .editor textarea:focus {
      border-color: rgba(214, 232, 244, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 0 0 1px rgba(215, 233, 244, 0.08);
    }

    .editor input::placeholder,
    .editor textarea::placeholder {
      color: #708393;
    }

    .editor-foot {
      margin-top: 10px;
      color: rgba(160, 178, 191, 0.74);
      font-size: 11px;
      text-align: right;
      letter-spacing: 0.02em;
    }

    .note-card {
      position: absolute;
      z-index: 55;
      display: none;
      width: min(320px, calc(100vw - 32px));
      pointer-events: none;
    }

    .note-card.is-visible {
      display: block;
    }

    .note-card-body {
      max-height: min(220px, 34vh);
      overflow: auto;
      color: rgba(223, 234, 242, 0.88);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      scrollbar-width: thin;
      scrollbar-color: rgba(173, 196, 213, 0.28) transparent;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div class="floating-tools">
      <button id="addNodeBtn" class="tool-btn" title="Agregar nodo">+</button>
      <button id="removeNodeBtn" class="tool-btn" title="Eliminar nodo">−</button>
    </div>

    <div class="maps-entry">
      <button id="openMapsBtn" class="tool-btn constellation-btn" title="Abrir constelacion de mapas" aria-label="Abrir constelacion de mapas"></button>
    </div>

    <div id="mapsOverlay" class="maps-overlay" aria-hidden="true">
      <canvas id="mapsScene"></canvas>
      <div id="mapsLabel" class="maps-label" aria-hidden="true"></div>
      <div id="mapsConfirm" class="maps-confirm" aria-hidden="true">
        <div id="mapsConfirmPanel" class="maps-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="mapsConfirmName">
          <div class="maps-confirm-kicker">Borrar mapa</div>
          <div id="mapsConfirmName" class="maps-confirm-name"></div>
          <div class="maps-confirm-copy">Esta accion no se puede deshacer.</div>
          <div class="maps-confirm-actions">
            <button id="cancelDeleteMapBtn" class="maps-confirm-btn" type="button">Cancelar</button>
            <button id="confirmDeleteMapBtn" class="maps-confirm-btn is-danger" type="button">Borrar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="editor" class="editor">
      <div class="editor-panel">
        <div class="editor-head">Nodo</div>
        <input id="nodeInput" type="text" maxlength="64" placeholder="Titulo breve" />
        <textarea id="nodeNoteInput" maxlength="1800" placeholder="Desarrolla la idea con mas detalle..."></textarea>
        <div class="editor-foot">Esc cancela. Ctrl+Enter guarda.</div>
      </div>
    </div>

    <div id="noteCard" class="note-card" aria-hidden="true">
      <div id="noteCardTitle" class="note-card-title"></div>
      <div id="noteCardBody" class="note-card-body"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "sobrio-tree-state-v3";
    const LEGACY_MULTI_STORAGE_KEY = "sobrio-tree-state-v2";
    const LEGACY_STORAGE_KEY = "sobrio-tree-state-v1";
    const STORAGE_VERSION = 4;

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const mapsCanvas = document.getElementById("mapsScene");
    const mapsCtx = mapsCanvas.getContext("2d");
    const app = document.getElementById("app");

    const addNodeBtn = document.getElementById("addNodeBtn");
    const removeNodeBtn = document.getElementById("removeNodeBtn");
    const openMapsBtn = document.getElementById("openMapsBtn");
    const mapsOverlay = document.getElementById("mapsOverlay");
    const mapsLabel = document.getElementById("mapsLabel");
    const mapsConfirm = document.getElementById("mapsConfirm");
    const mapsConfirmPanel = document.getElementById("mapsConfirmPanel");
    const mapsConfirmName = document.getElementById("mapsConfirmName");
    const cancelDeleteMapBtn = document.getElementById("cancelDeleteMapBtn");
    const confirmDeleteMapBtn = document.getElementById("confirmDeleteMapBtn");

    const editor = document.getElementById("editor");
    const nodeInput = document.getElementById("nodeInput");
    const nodeNoteInput = document.getElementById("nodeNoteInput");
    const noteCard = document.getElementById("noteCard");
    const noteCardTitle = document.getElementById("noteCardTitle");
    const noteCardBody = document.getElementById("noteCardBody");

    let width = 0;
    let height = 0;
    let dpr = Math.max(1, window.devicePixelRatio || 1);

    const nodes = [];
    const links = [];
    let maps = [];
    let activeMapId = null;
    let mapIdCounter = 0;

    let nodeIdCounter = 0;
    let selectedNodeId = null;
    let editingNodeId = null;

    let draggedNodeId = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let pointerMoved = false;

    let panning = false;
    let panLastX = 0;
    let panLastY = 0;

    let saveTimeout = null;
    let workspaceLoaded = false;
    let mapsOverlayOpen = false;
    let constellationItems = [];
    let hoveredMapId = null;
    let pendingDeleteMapId = null;

    const overlayPointer = {
      x: 0,
      y: 0,
      inside: false
    };

    const camera = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0
    };

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.max(1, window.devicePixelRatio || 1);

      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      mapsCanvas.width = width * dpr;
      mapsCanvas.height = height * dpr;
      mapsCanvas.style.width = width + "px";
      mapsCanvas.style.height = height + "px";
      mapsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (!workspaceLoaded) {
        workspaceLoaded = true;
        const restored = loadState();
        if (!restored) {
          const freshMap = createDefaultMapState();
          maps = [freshMap];
          activeMapId = freshMap.id;
          applyMapState(freshMap);
          updateMapsButton();
          saveState(false);
        }
      }
    }

    function createNode({ x, y, parentId = null, level = 0, isCenter = false, label = "", note = "" }) {
      const id = ++nodeIdCounter;
      const node = {
        id,
        parentId,
        level,
        isCenter,
        label: label || (isCenter ? "Centro" : "Nodo"),
        note: typeof note === "string" ? note : "",

        x,
        y,

        vx: 0,
        vy: 0,

        renderX: x,
        renderY: y,

        baseRadius: isCenter ? 20 : 14,
        visualRadius: isCenter ? 20 : 14,
        targetRadius: isCenter ? 20 : 14,

        pulseUntil: 0,
        labelFloatSeed: Math.random() * Math.PI * 2
      };

      nodes.push(node);

      if (parentId !== null) {
        links.push({
          from: parentId,
          to: id,
          lastEnergy: 0
        });
      }

      return node;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function hash01(seed) {
      const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453123;
      return x - Math.floor(x);
    }

    function allocateMapId() {
      mapIdCounter += 1;
      return mapIdCounter;
    }

    function getMapIndexById(mapId) {
      return maps.findIndex(map => map.id === mapId);
    }

    function getMapById(mapId) {
      const index = getMapIndexById(mapId);
      return index >= 0 ? maps[index] : null;
    }

    function getOrderedMaps() {
      return [...maps].sort((a, b) => a.id - b.id);
    }

    function getActiveMapIndex() {
      return getMapIndexById(activeMapId);
    }

    function getActiveMap() {
      return getMapById(activeMapId);
    }

    function getMapCenterNode(map) {
      return map.nodes.find(node => node.isCenter) || map.nodes[0] || null;
    }

    function getDefaultNodeLabel(node) {
      return node && node.isCenter ? "Centro" : "Nodo";
    }

    function getNodeDisplayTitle(node) {
      if (!node) return "";
      const label = typeof node.label === "string" ? node.label.trim() : "";
      return label || getDefaultNodeLabel(node);
    }

    function getMapName(map, fallbackIndex = 0) {
      const centerNode = getMapCenterNode(map);
      return getNodeDisplayTitle(centerNode) || `Mapa ${fallbackIndex + 1}`;
    }

    function createDefaultMapState(mapId = allocateMapId()) {
      let nextNodeId = 0;
      const mapNodes = [];
      const mapLinks = [];

      function addMapNode({ x, y, parentId = null, level = 0, isCenter = false, label = "", note = "" }) {
        const id = ++nextNodeId;
        mapNodes.push({
          id,
          parentId,
          level,
          isCenter,
          label: label || (isCenter ? "Centro" : "Nodo"),
          note: typeof note === "string" ? note : "",
          x,
          y
        });

        if (parentId !== null) {
          mapLinks.push({
            from: parentId,
            to: id
          });
        }

        return { id };
      }

      const center = addMapNode({
        x: 0,
        y: 0,
        level: 0,
        isCenter: true,
        label: "Centro"
      });

      const count = 4;
      const radius = 160;

      for (let i = 0; i < count; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i / count);
        addMapNode({
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          parentId: center.id,
          level: 1,
          label: "Nodo"
        });
      }

      return {
        id: mapId,
        nodeIdCounter: nextNodeId,
        selectedNodeId: center.id,
        camera: {
          x: width / 2,
          y: height / 2,
          targetX: width / 2,
          targetY: height / 2
        },
        nodes: mapNodes,
        links: mapLinks
      };
    }

    function sanitizeStoredMap(rawMap, fallbackId) {
      const rawNodes = Array.isArray(rawMap && rawMap.nodes) ? rawMap.nodes : [];
      const rawLinks = Array.isArray(rawMap && rawMap.links) ? rawMap.links : [];
      const mapId = Number.isFinite(rawMap && rawMap.id) ? rawMap.id : fallbackId;

      const validNodeIds = new Set();
      const sanitizedNodes = [];
      let maxNodeId = 0;

      for (const rawNode of rawNodes) {
        if (!rawNode) continue;

        const nodeId = Number.isFinite(rawNode.id) ? rawNode.id : maxNodeId + 1;
        maxNodeId = Math.max(maxNodeId, nodeId);
        validNodeIds.add(nodeId);

        sanitizedNodes.push({
          id: nodeId,
          parentId: rawNode.parentId ?? null,
          level: rawNode.level ?? 0,
          isCenter: Boolean(rawNode.isCenter),
          label: rawNode.label || (rawNode.isCenter ? "Centro" : "Nodo"),
          note: typeof rawNode.note === "string" ? rawNode.note : "",
          x: rawNode.x ?? 0,
          y: rawNode.y ?? 0
        });
      }

      for (const node of sanitizedNodes) {
        if (node.parentId !== null && !validNodeIds.has(node.parentId)) {
          node.parentId = null;
        }
      }

      const sanitizedLinks = [];
      for (const rawLink of rawLinks) {
        if (!rawLink) continue;

        if (validNodeIds.has(rawLink.from) && validNodeIds.has(rawLink.to)) {
          sanitizedLinks.push({
            from: rawLink.from,
            to: rawLink.to
          });
        }
      }

      if (!sanitizedNodes.length) {
        return createDefaultMapState(mapId);
      }

      return {
        id: mapId,
        nodeIdCounter: Math.max(rawMap && rawMap.nodeIdCounter ? rawMap.nodeIdCounter : 0, maxNodeId),
        selectedNodeId: validNodeIds.has(rawMap && rawMap.selectedNodeId)
          ? rawMap.selectedNodeId
          : sanitizedNodes[0].id,
        camera: {
          x: rawMap && rawMap.camera ? rawMap.camera.x ?? width / 2 : width / 2,
          y: rawMap && rawMap.camera ? rawMap.camera.y ?? height / 2 : height / 2,
          targetX: rawMap && rawMap.camera ? rawMap.camera.targetX ?? (rawMap.camera.x ?? width / 2) : width / 2,
          targetY: rawMap && rawMap.camera ? rawMap.camera.targetY ?? (rawMap.camera.y ?? height / 2) : height / 2
        },
        nodes: sanitizedNodes,
        links: sanitizedLinks
      };
    }

    function serializeCurrentMap(mapId = activeMapId) {
      return {
        id: mapId,
        nodeIdCounter,
        selectedNodeId,
        camera: {
          x: camera.x,
          y: camera.y,
          targetX: camera.targetX,
          targetY: camera.targetY
        },
        nodes: nodes.map(node => ({
          id: node.id,
          parentId: node.parentId,
          level: node.level,
          isCenter: node.isCenter,
          label: node.label,
          note: node.note,
          x: node.x,
          y: node.y
        })),
        links: links.map(link => ({
          from: link.from,
          to: link.to
        }))
      };
    }

    function syncActiveMapInMemory() {
      const index = getActiveMapIndex();
      if (index < 0) return;
      maps[index] = serializeCurrentMap(activeMapId);
    }

    function applyMapState(state) {
      nodes.length = 0;
      links.length = 0;

      activeMapId = state.id;
      nodeIdCounter = state.nodeIdCounter ?? 0;
      selectedNodeId = state.selectedNodeId ?? null;
      editingNodeId = null;
      draggedNodeId = null;
      panning = false;
      pointerMoved = false;

      app.style.cursor = mapsOverlayOpen ? "default" : "grab";
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
      hideNoteCard();

      const nextCamera = state.camera || {};
      camera.x = nextCamera.x ?? width / 2;
      camera.y = nextCamera.y ?? height / 2;
      camera.targetX = nextCamera.targetX ?? camera.x;
      camera.targetY = nextCamera.targetY ?? camera.y;

      for (const savedNode of state.nodes || []) {
        nodes.push({
          id: savedNode.id,
          parentId: savedNode.parentId ?? null,
          level: savedNode.level ?? 0,
          isCenter: Boolean(savedNode.isCenter),
          label: savedNode.label || (savedNode.isCenter ? "Centro" : "Nodo"),
          note: typeof savedNode.note === "string" ? savedNode.note : "",

          x: savedNode.x ?? 0,
          y: savedNode.y ?? 0,

          vx: 0,
          vy: 0,

          renderX: savedNode.x ?? 0,
          renderY: savedNode.y ?? 0,

          baseRadius: savedNode.isCenter ? 20 : 14,
          visualRadius: savedNode.isCenter ? 20 : 14,
          targetRadius: savedNode.isCenter ? 20 : 14,

          pulseUntil: 0,
          labelFloatSeed: Math.random() * Math.PI * 2
        });
      }

      for (const savedLink of state.links || []) {
        if (getNodeById(savedLink.from) && getNodeById(savedLink.to)) {
          links.push({
            from: savedLink.from,
            to: savedLink.to,
            lastEnergy: 0
          });
        }
      }

      if (!nodes.length) {
        const replacement = createDefaultMapState(state.id);
        const index = getMapIndexById(state.id);
        if (index >= 0) maps[index] = replacement;
        applyMapState(replacement);
        return;
      }

      if (!getNodeById(selectedNodeId)) {
        selectedNodeId = nodes[0].id;
      }
    }

    function updateMapsButton() {
      const totalMaps = Math.max(1, maps.length);
      const title = mapsOverlayOpen
        ? `Cerrar constelacion de mapas (${totalMaps})`
        : `Abrir constelacion de mapas (${totalMaps})`;

      openMapsBtn.title = title;
      openMapsBtn.setAttribute("aria-label", title);
      openMapsBtn.classList.toggle("is-active", mapsOverlayOpen);
    }

    function flushPendingSave() {
      if (saveTimeout !== null) {
        clearTimeout(saveTimeout);
        saveTimeout = null;
      }
    }

    function clearMapsLabel() {
      mapsLabel.textContent = "";
      mapsLabel.classList.remove("is-visible");
    }

    function closeDeleteConfirmation() {
      pendingDeleteMapId = null;
      mapsConfirm.classList.remove("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "true");
    }

    function openDeleteConfirmation(mapId) {
      if (maps.length <= 1) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      const orderedMaps = getOrderedMaps();
      const fallbackIndex = orderedMaps.findIndex(candidate => candidate.id === map.id);

      pendingDeleteMapId = mapId;
      mapsConfirmName.textContent = trimText(getMapName(map, Math.max(0, fallbackIndex)), 40);
      mapsConfirm.classList.add("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "false");
      clearMapsLabel();
      cancelDeleteMapBtn.focus();
      return true;
    }

    function getNextMapIdAfterDelete(mapId) {
      const remainingIds = getOrderedMaps()
        .map(map => map.id)
        .filter(existingId => existingId !== mapId);

      if (!remainingIds.length) return null;

      const nextGreater = remainingIds.find(existingId => existingId > mapId);
      return nextGreater ?? remainingIds[0];
    }

    function deleteMapById(mapId) {
      if (maps.length <= 1) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const nextActiveId = mapId === activeMapId
        ? getNextMapIdAfterDelete(mapId)
        : activeMapId;

      maps = maps.filter(existingMap => existingMap.id !== mapId);
      hoveredMapId = null;
      closeDeleteConfirmation();

      if (mapId === activeMapId && nextActiveId !== null) {
        const nextMap = getMapById(nextActiveId);
        if (nextMap) {
          applyMapState(nextMap);
        }
      }

      saveState(false);
      updateMapsButton();
      return true;
    }

    function closeMapsOverlay() {
      if (!mapsOverlayOpen) return;

      mapsOverlayOpen = false;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      draggedNodeId = null;
      panning = false;

      closeDeleteConfirmation();
      clearMapsLabel();
      hideNoteCard();
      mapsOverlay.classList.remove("is-open");
      mapsOverlay.setAttribute("aria-hidden", "true");
      app.classList.remove("maps-open");
      mapsCtx.clearRect(0, 0, width, height);
      app.style.cursor = "grab";
      updateMapsButton();
    }

    function openMapsOverlay() {
      if (!maps.length) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();
      draggedNodeId = null;
      panning = false;

      mapsOverlayOpen = true;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      closeDeleteConfirmation();
      hideNoteCard();

      mapsOverlay.classList.add("is-open");
      mapsOverlay.setAttribute("aria-hidden", "false");
      app.classList.add("maps-open");
      app.style.cursor = "default";
      updateMapsButton();
    }

    function toggleMapsOverlay() {
      if (mapsOverlayOpen) closeMapsOverlay();
      else openMapsOverlay();
    }

    function switchMapById(mapId) {
      if (mapId === activeMapId) {
        closeMapsOverlay();
        return;
      }

      const nextMap = getMapById(mapId);
      if (!nextMap) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      applyMapState(nextMap);
      saveState(false);
      closeMapsOverlay();
    }

    function createNewMap() {
      const confirmed = window.confirm(
        "Se va a crear un mapa mental nuevo y vacio.\n\nTu mapa actual se guardara y podras volver a el desde la constelacion.\n\nQuieres continuar?"
      );
      if (!confirmed) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const freshMap = createDefaultMapState();
      maps.push(freshMap);
      applyMapState(freshMap);
      saveState(false);
      closeMapsOverlay();
      return true;
    }

    function getNodeById(id) {
      return nodes.find(n => n.id === id);
    }

    function getChildren(parentId) {
      return nodes.filter(n => n.parentId === parentId);
    }

    function getDescendants(nodeId) {
      const result = [];
      const stack = [nodeId];

      while (stack.length) {
        const current = stack.pop();
        const children = nodes.filter(n => n.parentId === current);
        for (const child of children) {
          result.push(child.id);
          stack.push(child.id);
        }
      }

      return result;
    }

    function addChildNode() {
      const parent = getNodeById(selectedNodeId);
      if (!parent) return;

      const siblings = getChildren(parent.id);
      const count = siblings.length;
      const distance = Math.max(110, 142 - parent.level * 8);

      let angle;
      if (parent.isCenter) {
        angle = -Math.PI / 2 + count * 0.92;
      } else {
        const parentOfParent = parent.parentId !== null ? getNodeById(parent.parentId) : null;
        const baseAngle = parentOfParent
          ? Math.atan2(parent.y - parentOfParent.y, parent.x - parentOfParent.x)
          : -Math.PI / 2;
        angle = baseAngle + (-0.75 + count * 0.45);
      }

      const child = createNode({
        x: parent.x + Math.cos(angle) * distance,
        y: parent.y + Math.sin(angle) * distance,
        parentId: parent.id,
        level: parent.level + 1,
        label: "Nuevo"
      });

      selectedNodeId = child.id;
      triggerExpand(child);
      scheduleSave();
    }

    function removeSelectedNode() {
      const node = getNodeById(selectedNodeId);
      if (!node || node.isCenter) return;

      const descendants = getDescendants(node.id);
      const idsToDelete = new Set([node.id, ...descendants]);

      for (let i = nodes.length - 1; i >= 0; i--) {
        if (idsToDelete.has(nodes[i].id)) nodes.splice(i, 1);
      }

      for (let i = links.length - 1; i >= 0; i--) {
        if (idsToDelete.has(links[i].from) || idsToDelete.has(links[i].to)) {
          links.splice(i, 1);
        }
      }

      if (editingNodeId && idsToDelete.has(editingNodeId)) closeEditor(false);

      const fallback = node.parentId ? getNodeById(node.parentId) : nodes[0];
      selectedNodeId = fallback ? fallback.id : null;
      scheduleSave();
    }

    function triggerExpand(node) {
      node.pulseUntil = performance.now() + 320;
    }

    function pointerPosition(e, targetElement = canvas) {
      const rect = targetElement.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function screenToWorld(x, y) {
      return {
        x: x - camera.x,
        y: y - camera.y
      };
    }

    function getNodeAtScreen(x, y) {
      for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        const sx = n.renderX + camera.x;
        const sy = n.renderY + camera.y;
        const dx = x - sx;
        const dy = y - sy;
        const hitRadius = Math.max(18, n.visualRadius + 10);
        if (dx * dx + dy * dy <= hitRadius * hitRadius) return n;
      }
      return null;
    }

    function trimText(text, max) {
      return text.length > max ? text.slice(0, max - 3) + "..." : text;
    }

    function getNodeNote(node) {
      return node && typeof node.note === "string" ? node.note.trim() : "";
    }

    function hideNoteCard() {
      noteCard.classList.remove("is-visible");
      noteCard.setAttribute("aria-hidden", "true");
    }

    function positionFloatingPanel(element, anchorX, anchorY, xOffset = 32) {
      const margin = 16;
      const rect = element.getBoundingClientRect();
      let left = anchorX + xOffset;

      if (left + rect.width > width - margin) {
        left = anchorX - rect.width - xOffset;
      }

      left = clamp(left, margin, Math.max(margin, width - rect.width - margin));

      let top = anchorY - rect.height * 0.34;
      top = clamp(top, margin, Math.max(margin, height - rect.height - margin));

      element.style.left = `${left}px`;
      element.style.top = `${top}px`;
    }

    function updateSelectedNoteCard() {
      if (mapsOverlayOpen || editingNodeId) {
        hideNoteCard();
        return;
      }

      const node = getNodeById(selectedNodeId);
      const note = getNodeNote(node);
      if (!node || !note) {
        hideNoteCard();
        return;
      }

      const title = trimText(getNodeDisplayTitle(node), 44);
      if (noteCardTitle.textContent !== title) {
        noteCardTitle.textContent = title;
      }
      if (noteCardBody.textContent !== note) {
        noteCardBody.textContent = note;
        noteCardBody.scrollTop = 0;
      }
      if (!noteCard.classList.contains("is-visible")) {
        noteCard.classList.add("is-visible");
        noteCard.setAttribute("aria-hidden", "false");
      }

      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      positionFloatingPanel(noteCard, x, y, 28);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function length(x, y) {
      return Math.hypot(x, y) || 1;
    }

    function normalize(x, y) {
      const len = length(x, y);
      return { x: x / len, y: y / len, len };
    }

    function updateNodes() {
      camera.x += (camera.targetX - camera.x) * 0.12;
      camera.y += (camera.targetY - camera.y) * 0.12;

      for (const node of nodes) {
        const pulsing = performance.now() < node.pulseUntil;
        node.targetRadius = node.baseRadius * (pulsing ? 1.48 : (node.id === selectedNodeId ? 1.18 : 1));
        node.visualRadius += (node.targetRadius - node.visualRadius) * 0.15;

        node.x += node.vx;
        node.y += node.vy;

        node.vx *= 0.86;
        node.vy *= 0.86;

        if (Math.abs(node.vx) < 0.002) node.vx = 0;
        if (Math.abs(node.vy) < 0.002) node.vy = 0;

        node.renderX = node.x;
        node.renderY = node.y;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "rgba(15, 26, 34, 1)");
      sky.addColorStop(0.50, "rgba(10, 18, 24, 1)");
      sky.addColorStop(1, "rgba(6, 11, 16, 1)");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      drawLiminalField();
      drawPlanes();
      drawAmbientGlow();
      drawDust();
    }

    function drawLiminalField() {
      const gridSize = 260;
      const startX = -((camera.x * 0.22) % gridSize) - gridSize;
      const startY = -((camera.y * 0.14) % gridSize) - gridSize;

      ctx.strokeStyle = "rgba(190, 214, 230, 0.028)";
      ctx.lineWidth = 1;

      for (let x = startX; x < width + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, -gridSize);
        ctx.lineTo(x, height + gridSize);
        ctx.stroke();
      }

      for (let y = startY; y < height + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(-gridSize, y);
        ctx.lineTo(width + gridSize, y);
        ctx.stroke();
      }
    }

    function drawPlanes() {
      const layers = [
        { y: height * 0.30, amp: 18, px: 0.10, py: 0.06, alpha: 0.055 },
        { y: height * 0.48, amp: 24, px: 0.18, py: 0.09, alpha: 0.045 },
        { y: height * 0.68, amp: 30, px: 0.28, py: 0.12, alpha: 0.038 }
      ];

      for (const layer of layers) {
        ctx.beginPath();

        for (let sx = -80; sx <= width + 80; sx += 18) {
          const wx = sx - camera.x * layer.px;
          const wy = camera.y * layer.py;

          const y =
            layer.y +
            Math.sin(wx * 0.0035 + 1.2) * layer.amp +
            Math.sin(wx * 0.008 + wy * 0.002) * layer.amp * 0.32;

          if (sx === -80) ctx.moveTo(sx, y);
          else ctx.lineTo(sx, y);
        }

        ctx.lineTo(width + 80, height + 100);
        ctx.lineTo(-80, height + 100);
        ctx.closePath();

        const g = ctx.createLinearGradient(0, layer.y - 50, 0, height);
        g.addColorStop(0, `rgba(175, 198, 212, ${layer.alpha})`);
        g.addColorStop(1, "rgba(10, 18, 24, 0)");
        ctx.fillStyle = g;
        ctx.fill();
      }
    }

    function drawAmbientGlow() {
      const gx = width * 0.52 - camera.x * 0.08;
      const gy = height * 0.42 - camera.y * 0.04;
      const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(width, height) * 0.55);
      g.addColorStop(0, "rgba(155, 180, 195, 0.08)");
      g.addColorStop(0.55, "rgba(95, 120, 138, 0.025)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);
    }

    function drawDust() {
      for (let i = 0; i < 32; i++) {
        const x = ((((i * 173.3) - camera.x * (0.06 + (i % 4) * 0.01)) % (width + 180)) + (width + 180)) % (width + 180) - 90;
        const y = ((((i * 91.7) - camera.y * (0.04 + (i % 3) * 0.01)) % (height + 140)) + (height + 140)) % (height + 140) - 70;
        const r = 0.7 + (i % 3) * 0.28;

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(205, 224, 236, ${0.022 + (i % 4) * 0.008})`;
        ctx.fill();
      }
    }

    function organicPointOnLink(a, b, t) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const tangent = normalize(dx, dy);
      const normal = normalize(-dy, dx);
      const dist = tangent.len;

      const baseX = lerp(a.x, b.x, t);
      const baseY = lerp(a.y, b.y, t);

      const envelope = Math.pow(Math.sin(Math.PI * t), 1.2);

      const normalVelA = a.vx * normal.x + a.vy * normal.y;
      const normalVelB = b.vx * normal.x + b.vy * normal.y;
      const tangVelA = a.vx * tangent.x + a.vy * tangent.y;
      const tangVelB = b.vx * tangent.x + b.vy * tangent.y;

      const normalEnergy = lerp(normalVelA, normalVelB, t);
      const tangEnergy = lerp(tangVelA, tangVelB, t);

      const offsetNormal = normalEnergy * envelope * Math.min(18, dist * 0.08);
      const offsetTang = tangEnergy * envelope * Math.min(6, dist * 0.02);

      return {
        x: baseX + normal.x * offsetNormal + tangent.x * offsetTang,
        y: baseY + normal.y * offsetNormal + tangent.y * offsetTang
      };
    }

    function drawLinks() {
      for (const link of links) {
        const aNode = getNodeById(link.from);
        const bNode = getNodeById(link.to);
        if (!aNode || !bNode) continue;

        const a = { x: aNode.renderX + camera.x, y: aNode.renderY + camera.y, vx: aNode.vx, vy: aNode.vy };
        const b = { x: bNode.renderX + camera.x, y: bNode.renderY + camera.y, vx: bNode.vx, vy: bNode.vy };

        const active = aNode.id === selectedNodeId || bNode.id === selectedNodeId;

        const totalEnergy =
          Math.abs(a.vx) + Math.abs(a.vy) + Math.abs(b.vx) + Math.abs(b.vy);

        link.lastEnergy = link.lastEnergy * 0.85 + totalEnergy * 0.15;

        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const segments = Math.max(18, Math.min(42, Math.floor(dist / 10)));

        const points = [];
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          points.push(organicPointOnLink(a, b, t));
        }

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
        ctx.strokeStyle = active ? "rgba(218, 235, 248, 0.42)" : "rgba(150, 182, 205, 0.16)";
        ctx.lineWidth = active ? 1.55 : 1.1;
        ctx.stroke();

        if (link.lastEnergy > 0.02 && active) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length - 1; i++) {
            const mx = (points[i].x + points[i + 1].x) * 0.5;
            const my = (points[i].y + points[i + 1].y) * 0.5;
            ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
          }
          ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
          ctx.strokeStyle = "rgba(235, 245, 252, 0.05)";
          ctx.lineWidth = 4;
          ctx.stroke();
        }
      }
    }

    function drawNode(node, time) {
      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      const selected = node.id === selectedNodeId;
      const displayLabel = getNodeDisplayTitle(node);

      if (selected) {
        const aura = 12 + Math.sin(time * 0.004 + node.labelFloatSeed) * 1.5;
        ctx.beginPath();
        ctx.arc(x, y, node.visualRadius + aura, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(220, 234, 246, 0.08)";
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(x, y, node.visualRadius, 0, Math.PI * 2);
      ctx.fillStyle = node.isCenter
        ? "rgba(235, 241, 246, 0.98)"
        : selected
          ? "rgba(250, 253, 255, 1)"
          : "rgba(190, 205, 218, 0.92)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, node.visualRadius + 2.4, 0, Math.PI * 2);
      ctx.strokeStyle = selected
        ? "rgba(240, 247, 252, 0.22)"
        : "rgba(210, 226, 239, 0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();

      const labelYOffset = node.visualRadius + 18 + Math.sin(time * 0.002 + node.labelFloatSeed) * 1.2;
      ctx.fillStyle = selected ? "#f3f8fc" : "#c7d2dc";
      ctx.font = `${selected ? 13 : 12}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(trimText(displayLabel, selected ? 22 : 18), x, y + labelYOffset);
    }

    function summarizeMap(map, fallbackIndex = 0) {
      const centerNode = getMapCenterNode(map);
      const nodeCount = Math.max(1, map.nodes.length);
      const branchCount = centerNode
        ? map.nodes.filter(node => node.parentId === centerNode.id).length
        : 0;

      return {
        name: getMapName(map, fallbackIndex),
        nodeCount,
        branchCount,
        satelliteCount: clamp(branchCount || Math.ceil(Math.sqrt(nodeCount)), 2, 8),
        visualRadius: clamp(14 + Math.sqrt(nodeCount) * 2.2 + branchCount * 0.75, 17, 32),
        seed: map.id * 0.61803398875
      };
    }

    function getConstellationItemAt(x, y) {
      for (let i = constellationItems.length - 1; i >= 0; i--) {
        const item = constellationItems[i];
        const dx = x - item.x;
        const dy = y - item.y;
        if (dx * dx + dy * dy <= item.hitRadius * item.hitRadius) {
          return item;
        }
      }
      return null;
    }

    function pointInCircle(x, y, cx, cy, radius) {
      const dx = x - cx;
      const dy = y - cy;
      return dx * dx + dy * dy <= radius * radius;
    }

    function getConstellationDeleteControl(item) {
      if (!item || item.kind !== "map" || maps.length <= 1) return null;

      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const baseAngle = item.isActive
        ? -Math.PI / 4
        : Math.atan2(item.y - centerY, item.x - centerX) - 0.18;

      const radius = clamp(item.radius * 0.34, 8, 10.5);
      const distance = item.radius + radius + 7;

      return {
        x: item.x + Math.cos(baseAngle) * distance,
        y: item.y + Math.sin(baseAngle) * distance,
        radius,
        hitRadius: radius + 7
      };
    }

    function resolveConstellationTarget(x, y) {
      if (pendingDeleteMapId !== null) return null;

      if (hoveredMapId !== null) {
        const hoveredItem = constellationItems.find(item => item.kind === "map" && item.mapId === hoveredMapId);
        const hoveredDeleteControl = getConstellationDeleteControl(hoveredItem);
        if (
          hoveredItem &&
          hoveredDeleteControl &&
          pointInCircle(x, y, hoveredDeleteControl.x, hoveredDeleteControl.y, hoveredDeleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: hoveredItem,
            control: hoveredDeleteControl
          };
        }
      }

      const baseItem = getConstellationItemAt(x, y);
      if (!baseItem) return null;

      if (baseItem.kind === "map") {
        const deleteControl = getConstellationDeleteControl(baseItem);
        if (
          deleteControl &&
          pointInCircle(x, y, deleteControl.x, deleteControl.y, deleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: baseItem,
            control: deleteControl
          };
        }
      }

      return {
        kind: baseItem.kind,
        item: baseItem,
        control: null
      };
    }

    function updateMapsLabel(item) {
      if (!item) {
        clearMapsLabel();
        return;
      }

      mapsLabel.textContent = item.label;
      mapsLabel.style.left = `${clamp(item.x, 24, width - 24)}px`;
      mapsLabel.style.top = `${clamp(item.y - item.radius - 18, 28, height - 28)}px`;
      mapsLabel.classList.add("is-visible");
    }

    function drawConstellationBackdrop(time, centerX, centerY) {
      const glow = mapsCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) * 0.44);
      glow.addColorStop(0, "rgba(178, 200, 216, 0.08)");
      glow.addColorStop(0.42, "rgba(62, 84, 102, 0.045)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = glow;
      mapsCtx.fillRect(0, 0, width, height);

      for (let i = 0; i < 28; i++) {
        const seed = i + 1;
        const x = (hash01(seed * 3.7) * (width + 140)) - 70;
        const y = (hash01(seed * 8.9 + 14) * (height + 100)) - 50;
        const driftX = Math.sin(time * 0.00018 + seed * 2.4) * 8;
        const driftY = Math.cos(time * 0.00014 + seed * 1.7) * 6;
        const radius = 0.6 + hash01(seed * 5.1) * 1.1;

        mapsCtx.beginPath();
        mapsCtx.arc(x + driftX, y + driftY, radius, 0, Math.PI * 2);
        mapsCtx.fillStyle = `rgba(212, 228, 239, ${0.02 + hash01(seed * 6.4) * 0.026})`;
        mapsCtx.fill();
      }
    }

    function drawConstellationOrbits(orbits, centerX, centerY) {
      for (const orbit of orbits) {
        mapsCtx.beginPath();
        mapsCtx.ellipse(centerX, centerY, orbit.radius, orbit.radius * orbit.flatten, 0, 0, Math.PI * 2);
        mapsCtx.strokeStyle = "rgba(196, 216, 230, 0.055)";
        mapsCtx.lineWidth = 1;
        mapsCtx.stroke();

        mapsCtx.beginPath();
        mapsCtx.ellipse(centerX, centerY, orbit.radius, orbit.radius * orbit.flatten, 0, orbit.highlightAngle, orbit.highlightAngle + 0.26);
        mapsCtx.strokeStyle = "rgba(224, 238, 247, 0.12)";
        mapsCtx.lineWidth = 1.3;
        mapsCtx.stroke();
      }
    }

    function drawConstellationMap(item, time, hovered) {
      const emphasis = item.isActive ? 1.16 : hovered ? 1.12 : 1;
      const radius = item.radius * emphasis;
      const pulse = 1 + Math.sin(time * 0.0015 + item.summary.seed * 7.1) * (item.isActive ? 0.03 : 0.02);
      const coreRadius = radius * pulse;
      const auraRadius = coreRadius * (item.isActive ? 2.4 : hovered ? 2.1 : 1.85);

      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, auraRadius);
      aura.addColorStop(0, item.isActive ? "rgba(228, 241, 250, 0.18)" : hovered ? "rgba(223, 237, 247, 0.14)" : "rgba(185, 206, 221, 0.06)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, auraRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      const satelliteCount = item.isActive ? Math.min(9, item.summary.satelliteCount + 1) : item.summary.satelliteCount;
      for (let i = 0; i < satelliteCount; i++) {
        const seed = item.summary.seed + i * 1.73;
        const angle = (Math.PI * 2 * i / satelliteCount) + hash01(seed * 3.1) * 0.46 + time * 0.00018 * (0.7 + hash01(seed * 4.9) * 0.4);
        const distance = coreRadius * (1.45 + hash01(seed * 8.4) * 0.45 + (item.isActive ? 0.14 : 0));
        const sx = item.x + Math.cos(angle) * distance;
        const sy = item.y + Math.sin(angle) * distance;
        const satelliteRadius = clamp(coreRadius * (0.16 + hash01(seed * 6.6) * 0.14), 1.2, 4.2);
        const mx = lerp(item.x, sx, 0.48) + Math.sin(seed * 4.2) * coreRadius * 0.08;
        const my = lerp(item.y, sy, 0.48) + Math.cos(seed * 3.6) * coreRadius * 0.08;

        mapsCtx.beginPath();
        mapsCtx.moveTo(item.x, item.y);
        mapsCtx.quadraticCurveTo(mx, my, sx, sy);
        mapsCtx.strokeStyle = item.isActive
          ? "rgba(225, 239, 248, 0.16)"
          : hovered
            ? "rgba(214, 230, 241, 0.12)"
            : "rgba(185, 205, 219, 0.07)";
        mapsCtx.lineWidth = 1;
        mapsCtx.stroke();

        mapsCtx.beginPath();
        mapsCtx.arc(sx, sy, satelliteRadius, 0, Math.PI * 2);
        mapsCtx.fillStyle = item.isActive
          ? "rgba(240, 247, 252, 0.86)"
          : hovered
            ? "rgba(229, 240, 248, 0.74)"
            : "rgba(203, 220, 231, 0.52)";
        mapsCtx.fill();
      }

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius, 0, Math.PI * 2);
      mapsCtx.fillStyle = item.isActive
        ? "rgba(238, 245, 250, 0.98)"
        : hovered
          ? "rgba(229, 239, 247, 0.94)"
          : "rgba(195, 210, 221, 0.88)";
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius + 2.2, 0, Math.PI * 2);
      mapsCtx.strokeStyle = item.isActive
        ? "rgba(239, 246, 251, 0.24)"
        : hovered
          ? "rgba(229, 240, 247, 0.18)"
          : "rgba(204, 223, 234, 0.08)";
      mapsCtx.lineWidth = 1;
      mapsCtx.stroke();
    }

    function drawConstellationPlus(item, hovered) {
      const radius = item.radius * (hovered ? 1.1 : 1);
      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, radius * 2.2);
      aura.addColorStop(0, hovered ? "rgba(225, 238, 247, 0.13)" : "rgba(188, 207, 220, 0.06)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius * 2.2, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(238, 246, 251, 0.76)" : "rgba(207, 224, 235, 0.46)";
      mapsCtx.lineWidth = 1.4;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(item.x - radius * 0.42, item.y);
      mapsCtx.lineTo(item.x + radius * 0.42, item.y);
      mapsCtx.moveTo(item.x, item.y - radius * 0.42);
      mapsCtx.lineTo(item.x, item.y + radius * 0.42);
      mapsCtx.strokeStyle = hovered ? "rgba(241, 248, 252, 0.84)" : "rgba(218, 233, 243, 0.56)";
      mapsCtx.lineWidth = 1.35;
      mapsCtx.stroke();
    }

    function drawConstellationDeleteControl(control, hovered) {
      if (!control) return;

      const radius = control.radius * (hovered ? 1.08 : 1);
      const aura = mapsCtx.createRadialGradient(control.x, control.y, 0, control.x, control.y, radius * 2.5);
      aura.addColorStop(0, hovered ? "rgba(228, 189, 197, 0.14)" : "rgba(128, 91, 99, 0.08)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius * 2.5, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.fillStyle = hovered ? "rgba(26, 12, 15, 0.94)" : "rgba(17, 10, 12, 0.88)";
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(235, 198, 206, 0.44)" : "rgba(172, 129, 137, 0.24)";
      mapsCtx.lineWidth = 1.2;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(control.x - radius * 0.42, control.y);
      mapsCtx.lineTo(control.x + radius * 0.42, control.y);
      mapsCtx.strokeStyle = hovered ? "rgba(248, 228, 232, 0.9)" : "rgba(223, 194, 201, 0.62)";
      mapsCtx.lineWidth = 1.3;
      mapsCtx.stroke();
    }

    function buildConstellationState(time) {
      const orderedMaps = [...maps].sort((a, b) => a.id - b.id);
      const activeMap = getActiveMap() || orderedMaps[0];
      if (!activeMap) {
        return { centerX: width / 2, centerY: height / 2, orbits: [], items: [] };
      }

      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const minDimension = Math.min(width, height);
      const activeSummary = summarizeMap(activeMap, orderedMaps.findIndex(map => map.id === activeMap.id));
      const activeRadius = clamp(activeSummary.visualRadius * 1.45, 28, 50);

      const otherMaps = orderedMaps.filter(map => map.id !== activeMap.id);
      const firstOrbitRadius = Math.max(activeRadius + 74, minDimension * 0.22);
      const orbitGap = Math.max(56, Math.min(96, minDimension * 0.14));
      const minSeparation = Math.max(96, Math.min(142, minDimension * 0.22));

      const orbitRadii = [];
      const orbitCapacities = [];
      let capacityTotal = 0;
      let nextRadius = firstOrbitRadius;

      while (capacityTotal < otherMaps.length || orbitRadii.length === 0) {
        orbitRadii.push(nextRadius);
        orbitCapacities.push(Math.max(4, Math.floor((Math.PI * 2 * nextRadius) / minSeparation)));
        capacityTotal += orbitCapacities[orbitCapacities.length - 1];
        nextRadius += orbitGap;
      }

      orbitCapacities[orbitCapacities.length - 1] = Math.max(1, orbitCapacities[orbitCapacities.length - 1] - 1);
      capacityTotal = orbitCapacities.reduce((sum, value) => sum + value, 0);

      while (capacityTotal < otherMaps.length) {
        orbitRadii.push(nextRadius);
        orbitCapacities.push(Math.max(3, Math.floor((Math.PI * 2 * nextRadius) / minSeparation) - 1));
        capacityTotal = orbitCapacities.reduce((sum, value) => sum + value, 0);
        nextRadius += orbitGap * 0.92;
      }

      const orbitItems = [];
      const orbits = [];
      let cursor = 0;

      for (let orbitIndex = 0; orbitIndex < orbitRadii.length; orbitIndex++) {
        const radius = orbitRadii[orbitIndex];
        const flatten = 0.92;
        const isOuter = orbitIndex === orbitRadii.length - 1;
        const mapCount = Math.min(otherMaps.length - cursor, orbitCapacities[orbitIndex]);
        const slotCount = mapCount + (isOuter ? 1 : 0);
        const speed = Math.max(0.0000009, 0.0000023 - orbitIndex * 0.00000024);
        const rotation = time * speed;
        const baseAngle = -Math.PI / 2 + orbitIndex * 0.42;

        orbits.push({
          radius,
          flatten,
          highlightAngle: baseAngle + rotation + 0.22
        });

        if (isOuter) {
          const newAngle = baseAngle + rotation;
          orbitItems.push({
            kind: "new",
            label: "Nuevo mapa",
            x: centerX + Math.cos(newAngle) * radius,
            y: centerY + Math.sin(newAngle) * radius * flatten,
            radius: clamp(18 + minDimension * 0.008, 18, 24),
            hitRadius: clamp(32 + minDimension * 0.016, 32, 42)
          });
        }

        for (let i = 0; i < mapCount; i++) {
          const slotIndex = i + (isOuter ? 1 : 0);
          const angle = baseAngle + rotation + ((Math.PI * 2) * slotIndex / slotCount);
          const map = otherMaps[cursor++];
          const summary = summarizeMap(map, orderedMaps.findIndex(candidate => candidate.id === map.id));

          orbitItems.push({
            kind: "map",
            mapId: map.id,
            label: summary.name,
            summary,
            x: centerX + Math.cos(angle) * radius,
            y: centerY + Math.sin(angle) * radius * flatten,
            radius: summary.visualRadius,
            hitRadius: summary.visualRadius + 16,
            isActive: false
          });
        }
      }

      orbitItems.push({
        kind: "map",
        mapId: activeMap.id,
        label: activeSummary.name,
        summary: activeSummary,
        x: centerX,
        y: centerY,
        radius: activeRadius,
        hitRadius: activeRadius + 18,
        isActive: true
      });

      return {
        centerX,
        centerY,
        orbits,
        items: orbitItems
      };
    }

    function drawConstellation(time) {
      mapsCtx.clearRect(0, 0, width, height);

      const layout = buildConstellationState(time);
      constellationItems = layout.items;

      const hoveredTarget = overlayPointer.inside
        ? resolveConstellationTarget(overlayPointer.x, overlayPointer.y)
        : null;
      const hoveredItem = hoveredTarget ? hoveredTarget.item : null;
      const hoveredDeleteControl = hoveredTarget && hoveredTarget.kind === "delete"
        ? hoveredTarget.control
        : null;

      hoveredMapId = hoveredItem && hoveredItem.kind === "map" ? hoveredItem.mapId : null;

      drawConstellationBackdrop(time, layout.centerX, layout.centerY);
      drawConstellationOrbits(layout.orbits, layout.centerX, layout.centerY);

      for (const item of constellationItems) {
        const hovered = hoveredItem === item;
        if (item.kind === "new") {
          drawConstellationPlus(item, hovered);
        } else {
          drawConstellationMap(item, time, hovered);
        }
      }

      if (!pendingDeleteMapId && hoveredItem && hoveredItem.kind === "map") {
        drawConstellationDeleteControl(
          getConstellationDeleteControl(hoveredItem),
          Boolean(hoveredDeleteControl)
        );
      }

      if (pendingDeleteMapId !== null) {
        hoveredMapId = null;
        clearMapsLabel();
        mapsOverlay.style.cursor = "default";
        return;
      }

      updateMapsLabel(
        hoveredTarget && hoveredTarget.kind === "delete"
          ? hoveredTarget.item
          : hoveredItem
      );
      mapsOverlay.style.cursor = hoveredTarget ? "pointer" : "default";
    }

    function render(time) {
      ctx.clearRect(0, 0, width, height);
      drawBackground();
      updateNodes();
      drawLinks();

      for (const node of nodes) {
        drawNode(node, time);
      }

      if (editingNodeId && !mapsOverlayOpen) positionEditor();
      else if (!mapsOverlayOpen) updateSelectedNoteCard();
      else hideNoteCard();

      if (mapsOverlayOpen) drawConstellation(time);
      else mapsCtx.clearRect(0, 0, width, height);
      requestAnimationFrame(render);
    }

    function positionEditor() {
      const node = getNodeById(editingNodeId);
      if (!node) return;
      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      editor.style.display = "block";
      editor.classList.add("is-visible");
      positionFloatingPanel(editor, x, y, 34);
    }

    function openEditor(node) {
      editingNodeId = node.id;
      nodeInput.value = getNodeDisplayTitle(node);
      nodeNoteInput.value = node.note || "";
      hideNoteCard();
      positionEditor();
      nodeInput.focus();
      nodeInput.select();
    }

    function closeEditor(save = true) {
      if (editingNodeId) {
        const node = getNodeById(editingNodeId);
        if (node && save) {
          const nextLabel = nodeInput.value.trim();
          const nextNote = nodeNoteInput.value.trim();
          let changed = false;

          const resolvedLabel = nextLabel || getDefaultNodeLabel(node);
          if (node.label !== resolvedLabel) {
            node.label = resolvedLabel;
            changed = true;
          }

          if ((node.note || "") !== nextNote) {
            node.note = nextNote;
            changed = true;
          }

          if (changed) {
            scheduleSave();
          }
        }
      }
      editingNodeId = null;
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
    }

    function restoreWorkspace(restoredMaps, nextActiveMapId, nextMapIdCounter, shouldResave = false) {
      maps = restoredMaps;
      mapIdCounter = Math.max(nextMapIdCounter, ...maps.map(map => map.id));
      activeMapId = maps.some(map => map.id === nextActiveMapId) ? nextActiveMapId : maps[0].id;

      applyMapState(getActiveMap());
      updateMapsButton();

      if (shouldResave) {
        saveState(false);
      }

      return true;
    }

    function saveState(syncActiveMap = true) {
      try {
        if (syncActiveMap) {
          syncActiveMapInMemory();
        }

        const state = {
          version: STORAGE_VERSION,
          activeMapId,
          mapIdCounter,
          maps
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.error("No se pudo guardar el estado:", error);
      }
    }

    function loadState() {
      try {
        const currentRaw = localStorage.getItem(STORAGE_KEY);
        if (currentRaw) {
          const state = JSON.parse(currentRaw);
          if (state && Array.isArray(state.maps)) {
            const restoredMaps = state.maps.map((map, index) =>
              sanitizeStoredMap(map, Number.isFinite(map && map.id) ? map.id : index + 1)
            );

            if (restoredMaps.length) {
              const needsResave =
                state.version !== STORAGE_VERSION ||
                !Number.isFinite(state.mapIdCounter) ||
                !Number.isFinite(state.activeMapId) ||
                state.maps.some(map => !Number.isFinite(map && map.id));

              return restoreWorkspace(
                restoredMaps,
                state.activeMapId,
                state.mapIdCounter ?? 0,
                needsResave
              );
            }
          }
        }

        const legacyMultiRaw = localStorage.getItem(LEGACY_MULTI_STORAGE_KEY);
        if (legacyMultiRaw) {
          const state = JSON.parse(legacyMultiRaw);
          if (state && Array.isArray(state.maps)) {
            const restoredMaps = state.maps.map((map, index) =>
              sanitizeStoredMap(map, index + 1)
            );

            if (restoredMaps.length) {
              const activeIndex = clamp(state.activeMapIndex ?? 0, 0, restoredMaps.length - 1);
              return restoreWorkspace(
                restoredMaps,
                restoredMaps[activeIndex].id,
                restoredMaps.length,
                true
              );
            }
          }
        }

        const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!legacyRaw) return false;

        const legacyState = JSON.parse(legacyRaw);
        if (!legacyState || !Array.isArray(legacyState.nodes) || !Array.isArray(legacyState.links)) {
          return false;
        }

        const restoredMap = sanitizeStoredMap(legacyState, 1);
        return restoreWorkspace([restoredMap], restoredMap.id, 1, true);
      } catch (error) {
        console.error("No se pudo cargar el estado:", error);
        return false;
      }
    }

    function scheduleSave() {
      flushPendingSave();
      saveTimeout = setTimeout(() => {
        saveTimeout = null;
        saveState(true);
      }, 140);
    }

    canvas.addEventListener("mousedown", (e) => {
      if (mapsOverlayOpen) return;

      closeEditor(true);
      pointerMoved = false;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);

      if (node) {
        draggedNodeId = node.id;
        const world = screenToWorld(x, y);
        dragOffsetX = world.x - node.x;
        dragOffsetY = world.y - node.y;
      } else {
        panning = true;
        panLastX = x;
        panLastY = y;
        app.style.cursor = "grabbing";
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);

      if (draggedNodeId) {
        pointerMoved = true;
        const world = screenToWorld(x, y);
        const node = getNodeById(draggedNodeId);
        if (!node) return;

        const nextX = world.x - dragOffsetX;
        const nextY = world.y - dragOffsetY;

        node.vx = (nextX - node.x) * 0.32;
        node.vy = (nextY - node.y) * 0.32;
        node.x = nextX;
        node.y = nextY;
        return;
      }

      if (panning) {
        pointerMoved = true;
        const dx = x - panLastX;
        const dy = y - panLastY;

        camera.targetX += dx;
        camera.targetY += dy;
        camera.x += dx;
        camera.y += dy;

        panLastX = x;
        panLastY = y;
        return;
      }

      const hoverNode = getNodeAtScreen(x, y);
      app.style.cursor = hoverNode ? "pointer" : "grab";
    });

    canvas.addEventListener("mouseup", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      const clickedEmpty = !draggedNodeId && !pointerMoved && panning && !node;

      if (draggedNodeId && !pointerMoved && node) {
        selectedNodeId = node.id;
        triggerExpand(node);
      }

      if (clickedEmpty && selectedNodeId !== null) {
        selectedNodeId = null;
      }

      if (draggedNodeId || pointerMoved || clickedEmpty) {
        scheduleSave();
      }

      draggedNodeId = null;
      panning = false;
      app.style.cursor = "grab";
    });

    canvas.addEventListener("mouseleave", () => {
      if (mapsOverlayOpen) return;

      if (draggedNodeId || panning) {
        scheduleSave();
      }
      draggedNodeId = null;
      panning = false;
      app.style.cursor = "default";
    });

    canvas.addEventListener("dblclick", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      if (node) {
        selectedNodeId = node.id;
        triggerExpand(node);
        openEditor(node);
      }
    });

    mapsOverlay.addEventListener("mousemove", (e) => {
      if (!mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;
    });

    mapsOverlay.addEventListener("mouseleave", () => {
      overlayPointer.inside = false;
      hoveredMapId = null;
      clearMapsLabel();
      mapsOverlay.style.cursor = "default";
    });

    mapsOverlay.addEventListener("click", (e) => {
      if (!mapsOverlayOpen) return;

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      const { x, y } = pointerPosition(e, mapsOverlay);
      const target = resolveConstellationTarget(x, y);

      if (!target) {
        closeMapsOverlay();
        return;
      }

      if (target.kind === "delete") {
        openDeleteConfirmation(target.item.mapId);
        return;
      }

      if (target.kind === "new") {
        createNewMap();
        return;
      }

      switchMapById(target.item.mapId);
    });

    mapsConfirmPanel.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    cancelDeleteMapBtn.addEventListener("click", () => {
      closeDeleteConfirmation();
    });

    confirmDeleteMapBtn.addEventListener("click", () => {
      if (pendingDeleteMapId !== null) {
        deleteMapById(pendingDeleteMapId);
      }
    });

    addNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      addChildNode();
    });

    removeNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      removeSelectedNode();
    });

    openMapsBtn.addEventListener("click", () => {
      closeEditor(true);
      toggleMapsOverlay();
    });

    nodeInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
        return;
      }

      if (e.key === "Enter") {
        e.preventDefault();
        nodeNoteInput.focus();
        nodeNoteInput.setSelectionRange(nodeNoteInput.value.length, nodeNoteInput.value.length);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    nodeNoteInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (!mapsOverlayOpen || e.key !== "Escape") return;

      e.preventDefault();

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      closeMapsOverlay();
    });

    window.addEventListener("resize", resize);

    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
