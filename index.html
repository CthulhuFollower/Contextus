      mapsOverlay.style.cursor = "grabbing";
    });

    mapsOverlay.addEventListener("mouseup", () => {
      const moved = overlayPointerMoved;
      const draggedMap = draggedOverlayMapId !== null;
      const draggedMapId = draggedOverlayMapId;
      const draggedMapStart = { x: overlayMapDragStartX, y: overlayMapDragStartY };
      if (!overlayPanning && !draggedMap) return;

      overlayPanning = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayMapDragStartX = 0;
      overlayMapDragStartY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      overlaySuppressClick = moved;
      overlayPointerMoved = false;
      mapsOverlay.style.cursor = "default";

      if (draggedMap && moved) {
        const map = getMapById(draggedMapId);
        commitLocalTransaction("moveConstellationMap", {
          mapId: draggedMapId,
          from: draggedMapStart,
          to: cloneConstellationPosition(map && map.constellationPosition)
        }, { syncActiveMap: false });
      } else if (moved) {
        commitLocalTransaction("updateViewFrame", createViewFramePayload("mapsOverlayMouseup"), { syncActiveMap: false });
      }
    });

    mapsOverlay.addEventListener("mouseleave", () => {
      const draggedMap = draggedOverlayMapId !== null;
      const draggedMapId = draggedOverlayMapId;
      const draggedMapStart = { x: overlayMapDragStartX, y: overlayMapDragStartY };
      const moved = overlayPointerMoved;
      overlayPointer.inside = false;
      hoveredMapId = null;
      overlayPanning = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayMapDragStartX = 0;
      overlayMapDragStartY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      overlayPointerMoved = false;
      clearMapsLabel();
      mapsOverlay.style.cursor = "default";

      if (draggedMap && moved) {
        const map = getMapById(draggedMapId);
        commitLocalTransaction("moveConstellationMap", {
          mapId: draggedMapId,
          from: draggedMapStart,
          to: cloneConstellationPosition(map && map.constellationPosition)
        }, { syncActiveMap: false });
      } else if (moved) {
        commitLocalTransaction("updateViewFrame", createViewFramePayload("mapsOverlayMouseleave"), { syncActiveMap: false });
      }
    });

    centerMapsBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isOverlayEntering()) return;
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      centerMapsCameraOnActive(false);
      updateMapsCenterButton();
      commitLocalTransaction("updateViewFrame", createViewFramePayload("centerMapsCamera"), { syncActiveMap: false });
    });

    centerMapsBtn.addEventListener("mousedown", (e) => {
      e.stopPropagation();
    });

    mapsOverlay.addEventListener("click", (e) => {
      if (!mapsOverlayOpen || isOverlayEntering()) return;

      if (overlaySuppressClick) {
        overlaySuppressClick = false;
        return;
      }

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      const { x, y } = pointerPosition(e, mapsOverlay);
      const target = resolveConstellationTarget(x, y);

      if (isOverlayCreating()) {
        if (!target) {
          createMapInConstellationAtWorldPoint(screenToConstellationWorld(x, y));
          return;
        }

        if (target.kind === "new") {
          cancelOverlayCreateMode();
          return;
        }

        cancelOverlayCreateMode();
        return;
      }

      if (!target) {
        overlaySelectedMapId = null;
        hoveredMapId = null;
        clearMapsLabel();
        updateMapsCenterButton();
        return;
      }

      if (target.kind === "delete") {
        openDeleteConfirmation(target.item.mapId);
        return;
      }

      if (target.kind === "new") {
        createNewMap();
        return;
      }

      if (overlaySelectedMapId === target.item.mapId) {
        startOverlayEntryTransition(target.item.mapId);
        return;
      }

      overlaySelectedMapId = target.item.mapId;
      hoveredMapId = target.item.mapId;
      updateMapsCenterButton();
    });

    mapsOverlay.addEventListener("dblclick", (e) => {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering() || isOverlayCreating()) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      const target = resolveConstellationTarget(x, y);
      if (target) return;

      createMapInConstellationAtWorldPoint(screenToConstellationWorld(x, y));
    });

    mapsOverlay.addEventListener("contextmenu", (e) => {
      if (!mapsOverlayOpen || !isOverlayCreating()) return;
      e.preventDefault();
      cancelOverlayCreateMode();
    });

    mapsConfirmPanel.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    cancelDeleteMapBtn.addEventListener("click", () => {
      closeDeleteConfirmation();
    });

    confirmDeleteMapBtn.addEventListener("click", () => {
      if (pendingDeleteMapId !== null) {
        deleteMapById(pendingDeleteMapId);
      }
    });

    addNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      addChildNode();
    });

    removeNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      removeSelectedNode();
    });

    openMapsBtn.addEventListener("click", () => {
      closeEditor(true);
      toggleMapsOverlay();
    });

    nodeInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
        return;
      }

      if (e.key === "Enter") {
        e.preventDefault();
        nodeNoteInput.focus();
        nodeNoteInput.setSelectionRange(nodeNoteInput.value.length, nodeNoteInput.value.length);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    nodeNoteInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Alt") {
        altRevealActive = true;
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key !== "Alt") return;
      altRevealActive = false;
      hideAdjacentNoteCards();
    });

    window.addEventListener("blur", () => {
      altRevealActive = false;
      hideAdjacentNoteCards();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) return;
      altRevealActive = false;
      hideAdjacentNoteCards();
    });

    window.addEventListener("keydown", (e) => {
      if (!mapsOverlayOpen) return;

      if (e.key === "Enter" && pendingDeleteMapId === null && !isOverlayEntering() && !isOverlayCreating() && overlaySelectedMapId !== null) {
        e.preventDefault();
        startOverlayEntryTransition(overlaySelectedMapId);
        return;
      }

      if (e.key !== "Escape") return;

      e.preventDefault();

      if (isOverlayEntering()) {
        cancelOverlayEntryTransition();
        return;
      }

      if (isOverlayCreating()) {
        cancelOverlayCreateMode();
        return;
      }

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      closeMapsOverlay();
    });

    window.addEventListener("resize", resize);

    registerServiceWorker();
    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
