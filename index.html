      const diagonalNegativeThickness = coreRadius * 0.054 * flareAsymmetry.diagonalNegativeThickness;
      const diagonalPositiveAlpha = spikeAlpha * flareAsymmetry.diagonalPositiveAlpha;
      const diagonalNegativeAlpha = spikeAlpha * flareAsymmetry.diagonalNegativeAlpha;

      mapsCtx.save();
      mapsCtx.globalCompositeOperation = "lighter";

      drawStarFlareArm(item.x, item.y, spikeLength * 1.06, verticalThickness * 2.8, Math.PI / 2, star.haloColor, verticalSpikeAlpha * 0.2, 0);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.86, verticalThickness * 1.38, Math.PI / 2, star.haloColor, verticalSpikeAlpha * 0.46, 0.08);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.42, verticalThickness * 0.34, Math.PI / 2, hotCoreColor, verticalSpikeAlpha * 0.58, verticalSpikeAlpha * 0.84);

      drawStarFlareArm(item.x, item.y, spikeLength * 0.88, horizontalThickness * 2.3, 0, star.haloColor, horizontalSpikeAlpha * 0.16, 0);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.72, horizontalThickness * 1.16, 0, star.haloColor, horizontalSpikeAlpha * 0.36, 0.05);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.34, horizontalThickness * 0.3, 0, hotCoreColor, horizontalSpikeAlpha * 0.44, horizontalSpikeAlpha * 0.66);

      const diagonalVisibility = star.starType === "blue"
        ? 1
        : star.starVariant === "giant"
          ? 0.98
          : star.starType === "yellow"
            ? 0.9
            : star.starType === "orange"
              ? 0.84
              : 0.78;

      drawStarFlareArm(
        item.x,
        item.y,
        spikeLength * 0.54,
        diagonalPositiveThickness,
        Math.PI / 4,
        star.haloColor,
        diagonalPositiveAlpha * 0.3 * diagonalVisibility,
        diagonalPositiveAlpha * 0.065 * diagonalVisibility
      );
      drawStarFlareArm(
        item.x,
        item.y,
        spikeLength * 0.46,
        diagonalNegativeThickness,
        -Math.PI / 4,
        star.haloColor,
        diagonalNegativeAlpha * 0.22 * diagonalVisibility,
        diagonalNegativeAlpha * 0.05 * diagonalVisibility
      );

      mapsCtx.restore();

      const whiteCoreRadius = coreRadius * star.whiteCoreScale * (0.94 + twinkle.core * 0.16 + twinkle.bloom * 0.12);
      const whiteCoreGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coreRadius * 0.96);
      whiteCoreGlow.addColorStop(0, `rgba(255, 255, 255, ${whiteCoreAlpha})`);
      whiteCoreGlow.addColorStop(0.24, `rgba(255, 255, 255, ${whiteCoreAlpha * 0.72})`);
      whiteCoreGlow.addColorStop(0.46, rgba(hotCoreColor, 0.26));
      whiteCoreGlow.addColorStop(1, "rgba(255,255,255,0)");
      mapsCtx.fillStyle = whiteCoreGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius * 0.96, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, whiteCoreRadius, 0, Math.PI * 2);
      mapsCtx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, whiteCoreAlpha + 0.02)})`;
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius + 1.2, 0, Math.PI * 2);
      mapsCtx.strokeStyle = rgba(
        star.outlineColor,
        star.outlineAlpha * (item.isActive ? 1.18 : hovered ? 1.06 : 0.92)
      );
      mapsCtx.lineWidth = 0.8;
      mapsCtx.stroke();
    }

    function drawConstellationPlus(item, hovered) {
      const radius = item.radius * (hovered ? 1.1 : 1);
      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, radius * 2.2);
      aura.addColorStop(0, hovered ? "rgba(225, 238, 247, 0.13)" : "rgba(188, 207, 220, 0.06)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius * 2.2, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(238, 246, 251, 0.76)" : "rgba(207, 224, 235, 0.46)";
      mapsCtx.lineWidth = 1.4;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(item.x - radius * 0.42, item.y);
      mapsCtx.lineTo(item.x + radius * 0.42, item.y);
      mapsCtx.moveTo(item.x, item.y - radius * 0.42);
      mapsCtx.lineTo(item.x, item.y + radius * 0.42);
      mapsCtx.strokeStyle = hovered ? "rgba(241, 248, 252, 0.84)" : "rgba(218, 233, 243, 0.56)";
      mapsCtx.lineWidth = 1.35;
      mapsCtx.stroke();
    }

    function drawConstellationDeleteControl(control, hovered) {
      if (!control) return;

      const radius = control.radius * (hovered ? 1.08 : 1);
      const aura = mapsCtx.createRadialGradient(control.x, control.y, 0, control.x, control.y, radius * 2.5);
      aura.addColorStop(0, hovered ? "rgba(228, 189, 197, 0.14)" : "rgba(128, 91, 99, 0.08)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius * 2.5, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.fillStyle = hovered ? "rgba(26, 12, 15, 0.94)" : "rgba(17, 10, 12, 0.88)";
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(235, 198, 206, 0.44)" : "rgba(172, 129, 137, 0.24)";
      mapsCtx.lineWidth = 1.2;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(control.x - radius * 0.42, control.y);
      mapsCtx.lineTo(control.x + radius * 0.42, control.y);
      mapsCtx.strokeStyle = hovered ? "rgba(248, 228, 232, 0.9)" : "rgba(223, 194, 201, 0.62)";
      mapsCtx.lineWidth = 1.3;
      mapsCtx.stroke();
    }

    function buildConstellationState(time) {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) {
        return { items: [] };
      }

      const items = [];
      const visualScale = getConstellationVisualScale();
      const selectedMapId = getConstellationFocusMapId();

      for (let index = 0; index < orderedMaps.length; index++) {
        const map = orderedMaps[index];
        const summary = summarizeMap(map, index);
        const star = getMapStarProfile(map);
        const worldPoint = getConstellationMapWorldPoint(map, index, orderedMaps.length);
        const driftX = draggedOverlayMapId === map.id
          ? overlayDraggedMapDriftX
          : Math.sin(time * 0.00018 + map.id * 0.9) * 6;
        const driftY = draggedOverlayMapId === map.id
          ? overlayDraggedMapDriftY
          : Math.cos(time * 0.00022 + map.id * 1.1) * 8;
        const point = projectConstellationPoint(worldPoint.x + driftX, worldPoint.y + driftY);
        const isActive = selectedMapId !== null && map.id === selectedMapId;
        const radius = clamp(
          summary.visualRadius * star.starScale * (isActive ? 1.16 : 1) * visualScale,
          14,
          star.starVariant === "giant" ? 78 : 58
        );

        items.push({
          kind: "map",
          mapId: map.id,
          label: summary.name,
          summary,
          star,
          x: point.x,
          y: point.y,
          worldX: worldPoint.x,
          worldY: worldPoint.y,
          driftX,
          driftY,
          radius,
          hitRadius: clamp(radius + 18, 30, star.starVariant === "giant" ? 102 : 74),
          isActive
        });
      }

      items.push({
        kind: "new",
        label: "Nuevo mapa",
        x: width - Math.max(76, width * 0.1),
        y: Math.max(82, height * 0.16) + Math.sin(time * 0.0004) * 4,
        radius: clamp(18 + Math.min(width, height) * 0.008, 18, 24),
        hitRadius: clamp(32 + Math.min(width, height) * 0.016, 32, 42)
      });

      return {
        items
      };
    }

    function drawConstellation(time) {
      mapsCtx.clearRect(0, 0, width, height);
      mapsCamera.x += (mapsCamera.targetX - mapsCamera.x) * 0.12;
      mapsCamera.y += (mapsCamera.targetY - mapsCamera.y) * 0.12;
      mapsCamera.zoom += (mapsCamera.targetZoom - mapsCamera.zoom) * 0.14;
      updateMapsCenterButton();

      const layout = buildConstellationState(time);
      constellationItems = layout.items;

      const hoveredTarget = overlayPointer.inside
        ? resolveConstellationTarget(overlayPointer.x, overlayPointer.y)
        : null;
      const hoveredItem = hoveredTarget ? hoveredTarget.item : null;
      const hoveredDeleteControl = hoveredTarget && hoveredTarget.kind === "delete"
        ? hoveredTarget.control
        : null;

      hoveredMapId = hoveredItem && hoveredItem.kind === "map" ? hoveredItem.mapId : null;

      drawConstellationBackdrop(time);

      for (const item of constellationItems) {
        const hovered = hoveredItem === item;
        if (item.kind === "new") {
          drawConstellationPlus(item, hovered);
        } else {
          drawConstellationMap(item, time, hovered);
        }
      }

      if (!pendingDeleteMapId && hoveredItem && hoveredItem.kind === "map") {
        drawConstellationDeleteControl(
          getConstellationDeleteControl(hoveredItem),
          Boolean(hoveredDeleteControl)
        );
      }

      if (pendingDeleteMapId !== null) {
        hoveredMapId = null;
        clearMapsLabel();
        mapsOverlay.style.cursor = "default";
        return;
      }

      updateMapsLabel(
        hoveredTarget && hoveredTarget.kind === "delete"
          ? hoveredTarget.item
          : hoveredItem
      );
      mapsOverlay.style.cursor = (overlayPanning || draggedOverlayMapId !== null)
        ? "grabbing"
        : hoveredTarget
          ? "pointer"
          : "default";
    }

    function render(time) {
      ctx.clearRect(0, 0, width, height);
      drawBackground();
      updateNodes();
      drawLinks();

      for (const node of nodes) {
        drawNode(node, time);
      }

      if (editingNodeId && !mapsOverlayOpen) positionEditor();
      else if (!mapsOverlayOpen) updateSelectedNoteCard();
      else hideNoteCard();

      if (mapsOverlayOpen) drawConstellation(time);
      else mapsCtx.clearRect(0, 0, width, height);
      requestAnimationFrame(render);
    }

    function positionEditor() {
      const node = getNodeById(editingNodeId);
      if (!node) return;
      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      editor.style.display = "block";
      editor.classList.add("is-visible");
      positionFloatingPanel(editor, x, y, 34);
    }

    function openEditor(node) {
      editingNodeId = node.id;
      nodeInput.value = getNodeDisplayTitle(node);
      nodeNoteInput.value = node.note || "";
      hideNoteCard();
      positionEditor();
      nodeInput.focus();
      nodeInput.select();
    }

    function closeEditor(save = true) {
      if (editingNodeId) {
        const node = getNodeById(editingNodeId);
        if (node && save) {
          const nextLabel = nodeInput.value.trim();
          const nextNote = nodeNoteInput.value.trim();
          let changed = false;

          const resolvedLabel = nextLabel || getDefaultNodeLabel(node);
          if (node.label !== resolvedLabel) {
            node.label = resolvedLabel;
            changed = true;
          }

          if ((node.note || "") !== nextNote) {
            node.note = nextNote;
            changed = true;
          }

          if (changed) {
            scheduleSave();
          }
        }
      }
      editingNodeId = null;
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
    }

    function restoreWorkspace(restoredMaps, nextActiveMapId, nextMapIdCounter, nextMapsViewState = null, shouldResave = false) {
      maps = restoredMaps;
      mapIdCounter = Math.max(nextMapIdCounter, ...maps.map(map => map.id));
      activeMapId = maps.some(map => map.id === nextActiveMapId) ? nextActiveMapId : maps[0].id;

      applyMapState(getActiveMap());
      applyMapsViewState(nextMapsViewState);
      updateMapsButton();

      if (shouldResave) {
        saveState(false);
      }

      return true;
    }

    function saveState(syncActiveMap = true) {
      try {
        if (syncActiveMap) {
          syncActiveMapInMemory();
        }

        const state = {
          version: STORAGE_VERSION,
          activeMapId,
          mapIdCounter,
          mapsView: captureMapsViewState(),
          maps
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.error("No se pudo guardar el estado:", error);
      }
    }

    function loadState() {
      try {
        const currentRaw = localStorage.getItem(STORAGE_KEY);
        if (currentRaw) {
          const state = JSON.parse(currentRaw);
          if (state && Array.isArray(state.maps)) {
            const restoredMaps = state.maps.map((map, index) =>
              sanitizeStoredMap(map, Number.isFinite(map && map.id) ? map.id : index + 1)
            );

            if (restoredMaps.length) {
              const needsResave =
                state.version !== STORAGE_VERSION ||
                !Number.isFinite(state.mapIdCounter) ||
                !Number.isFinite(state.activeMapId) ||
                state.maps.some(map => !Number.isFinite(map && map.id)) ||
                state.maps.some(map => !readStoredStarIdentity(map)) ||
                !sanitizeMapsViewState(state.mapsView);

              return restoreWorkspace(
                restoredMaps,
                state.activeMapId,
                state.mapIdCounter ?? 0,
                sanitizeMapsViewState(state.mapsView),
                needsResave
              );
            }
          }
        }

        const legacyMultiRaw = localStorage.getItem(LEGACY_MULTI_STORAGE_KEY);
        if (legacyMultiRaw) {
          const state = JSON.parse(legacyMultiRaw);
          if (state && Array.isArray(state.maps)) {
            const restoredMaps = state.maps.map((map, index) =>
              sanitizeStoredMap(map, index + 1)
            );

            if (restoredMaps.length) {
              const activeIndex = clamp(state.activeMapIndex ?? 0, 0, restoredMaps.length - 1);
              return restoreWorkspace(
                restoredMaps,
                restoredMaps[activeIndex].id,
                restoredMaps.length,
                null,
                true
              );
            }
          }
        }

        const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!legacyRaw) return false;

        const legacyState = JSON.parse(legacyRaw);
        if (!legacyState || !Array.isArray(legacyState.nodes) || !Array.isArray(legacyState.links)) {
          return false;
        }

        const restoredMap = sanitizeStoredMap(legacyState, 1);
        return restoreWorkspace([restoredMap], restoredMap.id, 1, null, true);
      } catch (error) {
        console.error("No se pudo cargar el estado:", error);
        return false;
      }
    }

    function scheduleSave() {
      flushPendingSave();
      saveTimeout = setTimeout(() => {
        saveTimeout = null;
        saveState(true);
      }, 140);
    }

    canvas.addEventListener("mousedown", (e) => {
      if (mapsOverlayOpen) return;

      closeEditor(true);
      pointerMoved = false;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);

      if (node) {
        draggedNodeId = node.id;
        const world = screenToWorld(x, y);
        dragOffsetX = world.x - node.x;
        dragOffsetY = world.y - node.y;
      } else {
        panning = true;
        panLastX = x;
        panLastY = y;
        app.style.cursor = "grabbing";
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);

      if (draggedNodeId) {
        pointerMoved = true;
        const world = screenToWorld(x, y);
        const node = getNodeById(draggedNodeId);
        if (!node) return;

        const nextX = world.x - dragOffsetX;
        const nextY = world.y - dragOffsetY;

        node.vx = (nextX - node.x) * 0.32;
        node.vy = (nextY - node.y) * 0.32;
        node.x = nextX;
        node.y = nextY;
        return;
      }

      if (panning) {
        pointerMoved = true;
        const dx = x - panLastX;
        const dy = y - panLastY;

        camera.targetX += dx;
        camera.targetY += dy;
        camera.x += dx;
        camera.y += dy;

        panLastX = x;
        panLastY = y;
        return;
      }

      const hoverNode = getNodeAtScreen(x, y);
      app.style.cursor = hoverNode ? "pointer" : "grab";
    });

    canvas.addEventListener("mouseup", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      const clickedEmpty = !draggedNodeId && !pointerMoved && panning && !node;

      if (draggedNodeId && !pointerMoved && node) {
        selectedNodeId = node.id;
        triggerExpand(node);
      }

      if (clickedEmpty && selectedNodeId !== null) {
        selectedNodeId = null;
      }

      if (draggedNodeId || pointerMoved || clickedEmpty) {
        scheduleSave();
      }

      draggedNodeId = null;
      panning = false;
      app.style.cursor = "grab";
    });

    canvas.addEventListener("mouseleave", () => {
      if (mapsOverlayOpen) return;

      if (draggedNodeId || panning) {
        scheduleSave();
      }
      draggedNodeId = null;
      panning = false;
      app.style.cursor = "default";
    });

    canvas.addEventListener("dblclick", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      if (node) {
        selectedNodeId = node.id;
        triggerExpand(node);
        openEditor(node);
      }
    });

    mapsOverlay.addEventListener("mousemove", (e) => {
      if (!mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      if (overlayPanning) {
        const dx = x - overlayPanLastX;
        const dy = y - overlayPanLastY;

        if (dx !== 0 || dy !== 0) {
          overlayPointerMoved = true;
          mapsCamera.targetX -= dx / Math.max(mapsCamera.zoom, 0.0001);
          mapsCamera.targetY -= dy / Math.max(mapsCamera.zoom, 0.0001);
          mapsCamera.x = mapsCamera.targetX;
          mapsCamera.y = mapsCamera.targetY;
        }

        overlayPanLastX = x;
        overlayPanLastY = y;
        return;
      }

      if (draggedOverlayMapId !== null) {
        const world = screenToConstellationWorld(x, y);
        const nextX = world.x - overlayMapDragOffsetX - overlayDraggedMapDriftX;
        const nextY = world.y - overlayMapDragOffsetY - overlayDraggedMapDriftY;

        if (setMapConstellationPosition(draggedOverlayMapId, nextX, nextY)) {
          overlayPointerMoved = true;
        }
      }
    });

    mapsOverlay.addEventListener("wheel", (e) => {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null) return;

      e.preventDefault();

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      const worldBefore = screenToConstellationWorld(
        x,
        y,
        mapsCamera.targetZoom,
        mapsCamera.targetX,
        mapsCamera.targetY
      );
      const zoomFactor = Math.exp(-e.deltaY * 0.0012);
      const nextZoom = clamp(mapsCamera.targetZoom * zoomFactor, MAPS_ZOOM_MIN, MAPS_ZOOM_MAX);

      mapsCamera.targetZoom = nextZoom;
      mapsCamera.targetX = worldBefore.x - (x - width * 0.5) / nextZoom;
      mapsCamera.targetY = worldBefore.y - (y - height * 0.5) / nextZoom;
    }, { passive: false });

    mapsOverlay.addEventListener("mousedown", (e) => {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      const target = resolveConstellationTarget(x, y);
      if (target) {
        if (target.kind === "map") {
          const world = screenToConstellationWorld(x, y);
          draggedOverlayMapId = target.item.mapId;
          overlayMapDragOffsetX = world.x - (target.item.worldX + target.item.driftX);
          overlayMapDragOffsetY = world.y - (target.item.worldY + target.item.driftY);
          overlayDraggedMapDriftX = target.item.driftX;
          overlayDraggedMapDriftY = target.item.driftY;
          overlayPointerMoved = false;
          mapsOverlay.style.cursor = "grabbing";
        }
        return;
      }

      overlayPanning = true;
      overlayPointerMoved = false;
      overlayPanLastX = x;
      overlayPanLastY = y;
      mapsOverlay.style.cursor = "grabbing";
    });

    mapsOverlay.addEventListener("mouseup", () => {
      const moved = overlayPointerMoved;
      const draggedMap = draggedOverlayMapId !== null;
      if (!overlayPanning && !draggedMap) return;

      overlayPanning = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      overlaySuppressClick = moved;
      overlayPointerMoved = false;
      mapsOverlay.style.cursor = "default";

      if (draggedMap && moved) {
        saveState(false);
      }
    });

    mapsOverlay.addEventListener("mouseleave", () => {
      const draggedMap = draggedOverlayMapId !== null;
      const moved = overlayPointerMoved;
      overlayPointer.inside = false;
      hoveredMapId = null;
      overlayPanning = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      overlayPointerMoved = false;
      clearMapsLabel();
      mapsOverlay.style.cursor = "default";

      if (draggedMap && moved) {
        saveState(false);
      }
    });

    centerMapsBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      centerMapsCameraOnActive(false);
      updateMapsCenterButton();
    });

    centerMapsBtn.addEventListener("mousedown", (e) => {
      e.stopPropagation();
    });

    mapsOverlay.addEventListener("click", (e) => {
      if (!mapsOverlayOpen) return;

      if (overlaySuppressClick) {
        overlaySuppressClick = false;
        return;
      }

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      const { x, y } = pointerPosition(e, mapsOverlay);
      const target = resolveConstellationTarget(x, y);

      if (!target) {
        overlaySelectedMapId = null;
        hoveredMapId = null;
        clearMapsLabel();
        updateMapsCenterButton();
        return;
      }

      if (target.kind === "delete") {
        openDeleteConfirmation(target.item.mapId);
        return;
      }

      if (target.kind === "new") {
        createNewMap();
        return;
      }

      switchMapById(target.item.mapId);
    });

    mapsConfirmPanel.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    cancelDeleteMapBtn.addEventListener("click", () => {
      closeDeleteConfirmation();
    });

    confirmDeleteMapBtn.addEventListener("click", () => {
      if (pendingDeleteMapId !== null) {
        deleteMapById(pendingDeleteMapId);
      }
    });

    addNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      addChildNode();
    });

    removeNodeBtn.addEventListener("click", () => {
      if (mapsOverlayOpen) return;
      closeEditor(true);
      removeSelectedNode();
    });

    openMapsBtn.addEventListener("click", () => {
      closeEditor(true);
      toggleMapsOverlay();
    });

    nodeInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
        return;
      }

      if (e.key === "Enter") {
        e.preventDefault();
        nodeNoteInput.focus();
        nodeNoteInput.setSelectionRange(nodeNoteInput.value.length, nodeNoteInput.value.length);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    nodeNoteInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        closeEditor(true);
      }

      if (e.key === "Escape") {
        e.preventDefault();
        closeEditor(false);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (!mapsOverlayOpen || e.key !== "Escape") return;

      e.preventDefault();

      if (pendingDeleteMapId !== null) {
        closeDeleteConfirmation();
        return;
      }

      closeMapsOverlay();
    });

    window.addEventListener("resize", resize);

    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
