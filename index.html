        const y = ((((i * 91.7) - camera.y * (0.04 + (i % 3) * 0.01)) % (height + 140)) + (height + 140)) % (height + 140) - 70;
        const r = 0.7 + (i % 3) * 0.28;

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(205, 224, 236, ${0.022 + (i % 4) * 0.008})`;
        ctx.fill();
      }
    }

    function organicPointOnLink(a, b, t) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const tangent = normalize(dx, dy);
      const normal = normalize(-dy, dx);
      const dist = tangent.len;

      const baseX = lerp(a.x, b.x, t);
      const baseY = lerp(a.y, b.y, t);

      const envelope = Math.pow(Math.sin(Math.PI * t), 1.2);

      const normalVelA = a.vx * normal.x + a.vy * normal.y;
      const normalVelB = b.vx * normal.x + b.vy * normal.y;
      const tangVelA = a.vx * tangent.x + a.vy * tangent.y;
      const tangVelB = b.vx * tangent.x + b.vy * tangent.y;

      const normalEnergy = lerp(normalVelA, normalVelB, t);
      const tangEnergy = lerp(tangVelA, tangVelB, t);

      const offsetNormal = normalEnergy * envelope * Math.min(18, dist * 0.08);
      const offsetTang = tangEnergy * envelope * Math.min(6, dist * 0.02);

      return {
        x: baseX + normal.x * offsetNormal + tangent.x * offsetTang,
        y: baseY + normal.y * offsetNormal + tangent.y * offsetTang
      };
    }

    function drawLinks() {
      const zoom = camera.zoom;
      for (const link of links) {
        const aNode = getNodeById(link.from);
        const bNode = getNodeById(link.to);
        if (!aNode || !bNode) continue;

        const aPoint = projectWorldPoint(aNode.renderX, aNode.renderY);
        const bPoint = projectWorldPoint(bNode.renderX, bNode.renderY);
        const a = { x: aPoint.x, y: aPoint.y, vx: aNode.vx * zoom, vy: aNode.vy * zoom };
        const b = { x: bPoint.x, y: bPoint.y, vx: bNode.vx * zoom, vy: bNode.vy * zoom };

        const active = aNode.id === selectedNodeId || bNode.id === selectedNodeId;

        const totalEnergy =
          Math.abs(a.vx) + Math.abs(a.vy) + Math.abs(b.vx) + Math.abs(b.vy);

        link.lastEnergy = link.lastEnergy * 0.85 + totalEnergy * 0.15;

        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const segments = Math.max(18, Math.min(42, Math.floor(dist / 10)));

        const points = [];
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          points.push(organicPointOnLink(a, b, t));
        }

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
        ctx.strokeStyle = active ? "rgba(218, 235, 248, 0.42)" : "rgba(150, 182, 205, 0.16)";
        ctx.lineWidth = Math.max(0.45, (active ? 1.55 : 1.1) * zoom);
        ctx.stroke();

        if (link.lastEnergy > 0.02 && active) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length - 1; i++) {
            const mx = (points[i].x + points[i + 1].x) * 0.5;
            const my = (points[i].y + points[i + 1].y) * 0.5;
            ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
          }
          ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
          ctx.strokeStyle = "rgba(235, 245, 252, 0.05)";
          ctx.lineWidth = Math.max(1, 4 * zoom);
          ctx.stroke();
        }
      }
    }

    function smoothNoise2D(x, y, seed) {
      const ix = Math.floor(x);
      const iy = Math.floor(y);
      const fx = x - ix;
      const fy = y - iy;
      const sx = fx * fx * (3 - 2 * fx);
      const sy = fy * fy * (3 - 2 * fy);

      const v00 = hash01(ix * 127.1 + iy * 311.7 + seed * 17.3);
      const v10 = hash01((ix + 1) * 127.1 + iy * 311.7 + seed * 17.3);
      const v01 = hash01(ix * 127.1 + (iy + 1) * 311.7 + seed * 17.3);
      const v11 = hash01((ix + 1) * 127.1 + (iy + 1) * 311.7 + seed * 17.3);

      return lerp(lerp(v00, v10, sx), lerp(v01, v11, sx), sy);
    }

    function fbmNoise2D(x, y, seed, octaves = 4) {
      let value = 0;
      let amplitude = 0.5;
      let frequency = 1;
      let amplitudeSum = 0;

      for (let i = 0; i < octaves; i++) {
        value += smoothNoise2D(x * frequency, y * frequency, seed + i * 23.7) * amplitude;
        amplitudeSum += amplitude;
        amplitude *= 0.5;
        frequency *= 2;
      }

      return amplitudeSum > 0 ? value / amplitudeSum : 0;
    }

    function getCenterStarProfile() {
      const activeMap = getActiveMap();
      if (activeMap) return getMapStarProfile(activeMap);

      return {
        starType: "orange",
        starVariant: null,
        starScale: 1,
        starLuminosity: 1,
        ...getStarTypeTemplate("orange")
      };
    }

    function getCenterStarSurfacePalette(star) {
      const isCool = star.starType === "blue" || star.starType === "white";
      const deepShadowTarget = isCool ? [8, 12, 32] : [16, 5, 4];
      const emberTarget = star.starType === "blue"
        ? [26, 48, 106]
        : star.starType === "white"
          ? [58, 62, 92]
          : [42, 14, 8];
      const midTarget = star.starType === "blue"
        ? [176, 205, 255]
        : star.starType === "white"
          ? mixColor(star.coreColor, [255, 255, 255], 0.52)
          : [255, 214, 148];
      const hotTarget = star.starType === "blue"
        ? [224, 238, 255]
        : star.starType === "white"
          ? [255, 255, 255]
          : [255, 236, 182];
      const deepShadow = mixColor(star.haloColor, deepShadowTarget, 0.72);
      const emberDark = mixColor(star.haloColor, emberTarget, 0.44);
      const moltenBase = mixColor(star.haloColor, star.coreColor, 0.34);
      const moltenMid = mixColor(star.coreColor, midTarget, 0.2);
      const moltenHot = mixColor(star.coreColor, hotTarget, isCool ? 0.42 : 0.34);
      const whiteHot = mixColor(moltenHot, [255, 255, 246], 0.54);
      const rim = mixColor(star.haloColor, [0, 0, 0], 0.28);

      return {
        deepShadow,
        emberDark,
        moltenBase,
        moltenMid,
        moltenHot,
        whiteHot,
        rim
      };
    }

    function ensureCenterStarSurfaceCache(signature) {
      if (!centerStarSurfaceCache.canvas) {
        centerStarSurfaceCache.canvas = document.createElement("canvas");
        centerStarSurfaceCache.canvas.width = centerStarSurfaceCache.size;
        centerStarSurfaceCache.canvas.height = centerStarSurfaceCache.size;
        centerStarSurfaceCache.ctx = centerStarSurfaceCache.canvas.getContext("2d");
        centerStarSurfaceCache.ctx.imageSmoothingEnabled = true;
        centerStarSurfaceCache.imageData = centerStarSurfaceCache.ctx.createImageData(
          centerStarSurfaceCache.size,
          centerStarSurfaceCache.size
        );
      }

      if (centerStarSurfaceCache.signature !== signature) {
        centerStarSurfaceCache.signature = signature;
        centerStarSurfaceCache.lastUpdateTime = -Infinity;
      }

      return centerStarSurfaceCache;
    }

    function updateCenterStarSurface(time, star, mapId) {
      const signature = `${mapId}:${star.starType}:${star.starVariant || "base"}:${star.starScale}:${star.starLuminosity}`;
      const cache = ensureCenterStarSurfaceCache(signature);
      if (time - cache.lastUpdateTime < 33) {
        return cache.canvas;
      }

      cache.lastUpdateTime = time;
      cache.seed = mapId * 0.173 + (star.starVariant === "giant" ? 13.7 : 5.4);

      const palette = getCenterStarSurfacePalette(star);
      const size = cache.size;
      const imageData = cache.imageData;
      const data = imageData.data;
      const t = time * 0.000055;
      const flowT = time * 0.000095;
      const seed = cache.seed;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const u = x / (size - 1);
          const v = y / (size - 1);
          const nx = (u - 0.5) * 2;
          const ny = (v - 0.5) * 2;
          const r = Math.hypot(nx, ny);
          const mask = 1 - smoothstep(0.74, 1.08, r);

          const warpA = fbmNoise2D(nx * 1.65 + flowT * 0.62, ny * 1.65 - flowT * 0.44, seed + 1.3, 3);
          const warpB = fbmNoise2D(nx * 1.95 - flowT * 0.52, ny * 1.95 + flowT * 0.58, seed + 9.1, 3);
          const deepLayer = fbmNoise2D(
            nx * 2.05 + (warpA - 0.5) * 1.85 + t * 1.18,
            ny * 2.05 + (warpB - 0.5) * 1.85 - t * 0.82,
            seed + 19.4,
            4
          );
          const detailLayer = fbmNoise2D(
            nx * 5.35 - t * 1.72 + (warpB - 0.5) * 2.6,
            ny * 5.35 + t * 1.48 + (warpA - 0.5) * 2.1,
            seed + 43.2,
            3
          );
          const contourWave = Math.abs(
            Math.sin(
              (deepLayer * 3.8 + detailLayer * 2.6 + warpA * 1.25 - warpB * 0.72) * Math.PI
            )
          );
          const trenchMask = Math.pow(1 - contourWave, 2.25);
          const heat = clamp(deepLayer * 0.68 + detailLayer * 0.2 + contourWave * 0.22, 0, 1.22);
          const hotMask = smoothstep(0.56, 0.92, heat);
          const midMask = smoothstep(0.26, 0.72, heat);
          const whiteMask = Math.pow(smoothstep(0.82, 1.08, heat), 1.2) * 0.42;

          let color = mixColor(palette.deepShadow, palette.emberDark, clamp(heat * 1.08, 0, 1));
          color = mixColor(color, palette.moltenBase, midMask * 0.86);
          color = mixColor(color, palette.moltenMid, hotMask * 0.72);
          color = mixColor(color, palette.moltenHot, hotMask * 0.52 + contourWave * 0.16);
          color = mixColor(color, palette.whiteHot, whiteMask);
          color = mixColor(color, palette.deepShadow, trenchMask * 0.62);

          const rimDarkening = smoothstep(0.54, 1, r) * 0.42;
          color = mixColor(color, palette.rim, rimDarkening);

          const alpha = Math.round(clamp(mask * 255, 0, 255));
          const idx = (y * size + x) * 4;
          data[idx] = color[0];
          data[idx + 1] = color[1];
          data[idx + 2] = color[2];
          data[idx + 3] = alpha;
        }
      }

      cache.ctx.putImageData(imageData, 0, 0);
      return cache.canvas;
    }

    function createCenterStarNeutralGlowTexture(THREE) {
      const canvas = document.createElement("canvas");
      const textureSize = 512;
      const textureCenter = textureSize * 0.5;
      canvas.width = textureSize;
      canvas.height = textureSize;

      const textureCtx = canvas.getContext("2d");
      const gradient = textureCtx.createRadialGradient(
        textureCenter,
        textureCenter,
        0,
        textureCenter,
        textureCenter,
        textureCenter
      );
      gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
      gradient.addColorStop(0.2, "rgba(255, 255, 255, 0.9)");
      gradient.addColorStop(0.46, "rgba(255, 255, 255, 0.42)");
      gradient.addColorStop(0.72, "rgba(255, 255, 255, 0.13)");
      gradient.addColorStop(0.92, "rgba(255, 255, 255, 0.025)");
      gradient.addColorStop(1, "rgba(255, 255, 255, 0)");
      textureCtx.fillStyle = gradient;
      textureCtx.fillRect(0, 0, canvas.width, canvas.height);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function getCenterStarWebGLPixelRatio() {
      return clamp(dpr || window.devicePixelRatio || 1, 1, CENTER_STAR_WEBGL_PIXEL_RATIO_MAX);
    }

    function syncCenterStarWebGLRendererScale() {
      const renderer = centerStarWebGL.renderer;
      if (!renderer) return;

      const pixelRatio = getCenterStarWebGLPixelRatio();
      if (centerStarWebGL.pixelRatio === pixelRatio) return;

      renderer.setPixelRatio(pixelRatio);
      renderer.setSize(CENTER_STAR_WEBGL_RENDER_SIZE, CENTER_STAR_WEBGL_RENDER_SIZE, false);
      centerStarWebGL.pixelRatio = pixelRatio;
    }

    function ensureCenterStarNeutralGlowTexture(THREE, estrella) {
      if (!THREE || !estrella || !estrella.glowMaterial) return;

      if (!centerStarWebGL.glowTexture) {
        centerStarWebGL.glowTexture = createCenterStarNeutralGlowTexture(THREE);
      }

      const currentGlowTexture = estrella.glowMaterial.uniforms.colorTexture.value;
      if (currentGlowTexture === centerStarWebGL.glowTexture) return;

      estrella.glowMaterial.uniforms.colorTexture.value = centerStarWebGL.glowTexture;
      estrella.glowMaterial.needsUpdate = true;
      currentGlowTexture?.dispose?.();
      centerStarWebGL.paletteSignature = "";
    }

    function ensureCenterStarWebGL() {
      if (centerStarWebGL.status !== "idle") return;

      centerStarWebGL.status = "loading";
      Promise.all([
        import("three"),
        import("./motor-estrella-offline.js")
      ])
        .then(async ([THREE, starModule]) => {
          const renderer = new THREE.WebGLRenderer({
            alpha: true,
            antialias: true,
            premultipliedAlpha: false,
            preserveDrawingBuffer: true
          });
          const pixelRatio = getCenterStarWebGLPixelRatio();
          renderer.setPixelRatio(pixelRatio);
          renderer.setSize(CENTER_STAR_WEBGL_RENDER_SIZE, CENTER_STAR_WEBGL_RENDER_SIZE, false);
          renderer.setClearColor(0x000000, 0);
          renderer.outputColorSpace = THREE.SRGBColorSpace;
          renderer.toneMapping = THREE.ACESFilmicToneMapping;
          renderer.toneMappingExposure = 1.18;

          const scene = new THREE.Scene();
          const camera3d = new THREE.PerspectiveCamera(CENTER_STAR_WEBGL_CAMERA_FOV, 1, 0.1, 100);
          camera3d.position.set(0, 0.15, CENTER_STAR_WEBGL_CAMERA_DISTANCE);

          const estrella = new starModule.EstrellaAnimada({
            radius: CENTER_STAR_WEBGL_RADIUS,
            starType: "G"
          });
          estrella.setCoronaVisible(false);

          scene.add(estrella.object3d);

          centerStarWebGL.THREE = THREE;
          centerStarWebGL.renderer = renderer;
          centerStarWebGL.scene = scene;
          centerStarWebGL.camera = camera3d;
          centerStarWebGL.estrella = estrella;
          centerStarWebGL.paletteSignature = "";
          centerStarWebGL.pixelRatio = pixelRatio;

          await estrella.ready;
          ensureCenterStarNeutralGlowTexture(THREE, estrella);
          centerStarWebGL.status = "ready";
        })
        .catch((error) => {
          centerStarWebGL.status = "failed";
          console.warn("No se pudo iniciar la estrella WebGL:", error);
        });
    }

    function getCenterStarVisualMetrics(star) {
      const starScale = Number.isFinite(star && star.starScale) ? star.starScale : 1;
      const starLuminosity = Number.isFinite(star && star.starLuminosity) ? star.starLuminosity : 1;
      const isBlue = star && star.starType === "blue";
      const isWhite = star && star.starType === "white";
      const isGiant = star && star.starVariant === "giant";
      const externalGlow = getCenterStarExternalGlowProfile(star);
      const coreScale = clamp(starScale, 0.84, isGiant ? 1.68 : 1.5);
      const luminosityLift = starLuminosity - 1;
      const glowScale = clamp(
        4.5 +
          luminosityLift * 2.05 +
          (coreScale - 1) * 0.68 +
          (isGiant ? 0.24 : 0) +
          (isBlue || isWhite ? 0.1 : 0) +
          externalGlow.scaleBoost,
        4.15,
        5.72
      );
      const glowAlphaScale = clamp(0.9 + luminosityLift * 0.78 + externalGlow.alphaBoost, 0.82, 1.44);
      const rotationSpeed = 0.016 * clamp(star && star.orbitSpeed ? star.orbitSpeed : 1, 0.66, 1.18) / Math.sqrt(coreScale);

      return {
        coreScale,
        glowScale,
        glowAlphaScale,
        rotationSpeed
      };
    }

    function getCenterStarExternalGlowProfile(star) {
      const type = star && star.starType;
      const variant = star && star.starVariant;

      if (type === "orange") {
        return {
          scaleBoost: 0.58,
          alphaBoost: 0.34,
          alphaMultiplier: 1.12,
          colorTarget: [255, 158, 74],
          colorMix: 0.44,
          canvasRadius: 1.1
        };
      }

      if (type === "yellow") {
        return {
          scaleBoost: 0.44,
          alphaBoost: 0.26,
          alphaMultiplier: 1.08,
          colorTarget: [255, 206, 112],
          colorMix: 0.36,
          canvasRadius: 1.07
        };
      }

      if (type === "red") {
        return {
          scaleBoost: variant === "giant" ? 0.68 : 0.52,
          alphaBoost: variant === "giant" ? 0.38 : 0.36,
          alphaMultiplier: variant === "giant" ? 1.16 : 1.12,
          colorTarget: [255, 104, 82],
          colorMix: 0.4,
          canvasRadius: variant === "giant" ? 1.14 : 1.1
        };
      }

      if (type === "white" && variant === "warm") {
        return {
          scaleBoost: 0.34,
          alphaBoost: 0.22,
          alphaMultiplier: 1.06,
          colorTarget: [255, 226, 158],
          colorMix: 0.34,
          canvasRadius: 1.05
        };
      }

      return {
        scaleBoost: 0,
        alphaBoost: 0,
        alphaMultiplier: 1,
        colorTarget: null,
        colorMix: 0,
        canvasRadius: 1
      };
    }

    function getCenterStarExternalGlowColor(star) {
      const externalGlow = getCenterStarExternalGlowProfile(star);
      if (!externalGlow.colorTarget) return star.haloColor;
      return mixColor(star.haloColor, externalGlow.colorTarget, externalGlow.colorMix);
    }

    function drawCenterStarExternalGlow(x, y, starRadius, star, metrics, selected, time) {
      const externalGlow = getCenterStarExternalGlowProfile(star);
      const glowColor = getCenterStarExternalGlowColor(star);
      const pulse = 1 + Math.sin(time * 0.0014 + star.starScale * 6.7) * 0.025;
      const haloRadius =
        starRadius *
        (2.08 + externalGlow.scaleBoost * 0.58 + Math.max(0, metrics.glowScale - 4.5) * 0.12) *
        externalGlow.canvasRadius *
        pulse *
        (selected ? 1.06 : 1);
      const haloAlpha = clamp(
        (0.058 + externalGlow.alphaBoost * 0.1) * metrics.glowAlphaScale * (selected ? 1.08 : 1),
        0.045,
        0.18
      );

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const halo = ctx.createRadialGradient(x, y, starRadius * 0.58, x, y, haloRadius);
      halo.addColorStop(0, rgba(glowColor, haloAlpha * 0.62));
      halo.addColorStop(0.25, rgba(glowColor, haloAlpha));
      halo.addColorStop(0.54, rgba(glowColor, haloAlpha * 0.34));
      halo.addColorStop(0.82, rgba(glowColor, haloAlpha * 0.08));
      halo.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(x, y, haloRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function getCenterStarWebGLPalette(star) {
      const isBlue = star.starType === "blue";
      const isWhite = star.starType === "white";
      const isGiant = star.starVariant === "giant";
      const externalGlow = getCenterStarExternalGlowProfile(star);
      const metrics = getCenterStarVisualMetrics(star);
      const bright = mixColor(star.coreColor, [255, 255, 255], isBlue ? 0.34 : isWhite ? 0.46 : 0.18);
      const dark = isWhite
        ? mixColor(star.haloColor, star.coreColor, 0.22)
        : mixColor(star.haloColor, star.coreColor, isGiant ? 0.42 : 0.34);
      let glow = isBlue
        ? mixColor(star.haloColor, star.coreColor, 0.38)
        : isWhite
          ? mixColor(star.haloColor, star.coreColor, 0.32)
          : mixColor(star.haloColor, star.coreColor, 0.18);
      glow = externalGlow.colorTarget
        ? mixColor(glow, externalGlow.colorTarget, externalGlow.colorMix)
        : glow;
      const glowAlpha =
        (isBlue ? 1.34 : isWhite ? 1.24 : isGiant ? 1.12 : 1.04) *
        externalGlow.alphaMultiplier *
        metrics.glowAlphaScale;

      return { bright, dark, glow, glowAlpha };
    }

    function setThreeColorFromRgb(color, rgb) {
      color.setRGB(rgb[0] / 255, rgb[1] / 255, rgb[2] / 255);
    }

    function syncCenterStarWebGLPalette(star) {
      const estrella = centerStarWebGL.estrella;
      if (!estrella) return;

      ensureCenterStarNeutralGlowTexture(centerStarWebGL.THREE, estrella);

      const signature = [
        star.starType,
        star.starVariant || "base",
        star.starScale,
        star.starLuminosity,
        star.coreColor.join(","),
        star.haloColor.join(",")
      ].join(":");

      if (centerStarWebGL.paletteSignature === signature) return;

      const palette = getCenterStarWebGLPalette(star);
      const metrics = getCenterStarVisualMetrics(star);
      setThreeColorFromRgb(estrella.surfaceMaterial.uniforms.colorBright.value, palette.bright);
      setThreeColorFromRgb(estrella.surfaceMaterial.uniforms.colorDark.value, palette.dark);
      estrella.options.glowScale = metrics.glowScale;
      estrella.setRadius(CENTER_STAR_WEBGL_RADIUS);
      estrella.setRotationSpeed(metrics.rotationSpeed);
      estrella.glowMaterial.uniforms.colorMultiplier.value.set(
        palette.glow[0] / 255,
        palette.glow[1] / 255,
        palette.glow[2] / 255,
        1
      );
      estrella.glowMaterial.uniforms.alphaMultiplier.value = palette.glowAlpha;
      centerStarWebGL.paletteSignature = signature;
    }

    function drawCenterStarWebGLNode(node, x, y, selected, time, radiusScale = 1) {
      ensureCenterStarWebGL();

      if (centerStarWebGL.status !== "ready") {
        return null;
      }

      const star = getCenterStarProfile();
      const metrics = getCenterStarVisualMetrics(star);
      syncCenterStarWebGLPalette(star);
      syncCenterStarWebGLRendererScale();

      const starRadius = node.visualRadius * radiusScale * CENTER_STAR_BASE_SIZE * metrics.coreScale * (selected ? 1.92 : 1.82);
      const renderSize = CENTER_STAR_WEBGL_RENDER_SIZE;
      const imageSize = (starRadius / CENTER_STAR_WEBGL_SOURCE_CORE_RADIUS) * renderSize;

      drawCenterStarExternalGlow(x, y, starRadius, star, metrics, selected, time);

      centerStarWebGL.estrella.update(time * 0.001, centerStarWebGL.camera);
      centerStarWebGL.renderer.clear();
      centerStarWebGL.renderer.render(centerStarWebGL.scene, centerStarWebGL.camera);

      ctx.drawImage(
        centerStarWebGL.renderer.domElement,
        x - imageSize * 0.5,
        y - imageSize * 0.5,
        imageSize,
        imageSize
      );

      return starRadius;
    }

    function drawCenterStarNode(node, x, y, selected, time, radiusScale = 1) {
      const webglStarRadius = drawCenterStarWebGLNode(node, x, y, selected, time, radiusScale);
      if (webglStarRadius !== null) {
        return webglStarRadius;
      }

      const star = getCenterStarProfile();
      const metrics = getCenterStarVisualMetrics(star);
      const starRadius = node.visualRadius * radiusScale * CENTER_STAR_BASE_SIZE * metrics.coreScale * (selected ? 1.92 : 1.82);
      const surfaceCanvas = updateCenterStarSurface(time, star, activeMapId || 1);
      const haloPulse = 1 + Math.sin(time * 0.0018 + node.labelFloatSeed) * 0.025;
      const externalGlow = getCenterStarExternalGlowProfile(star);
      const auraRadius =
        starRadius *
        star.auraScale *
        0.9 *
        haloPulse *
        externalGlow.canvasRadius *
        clamp(metrics.glowScale / 5, 0.84, 1.18);
      const auraAlphaScale = 1 + externalGlow.alphaBoost * 0.8;
      const externalGlowColor = getCenterStarExternalGlowColor(star);

      const aura = ctx.createRadialGradient(x, y, 0, x, y, auraRadius);
      aura.addColorStop(0, rgba(externalGlowColor, 0.18 * star.starLuminosity * metrics.glowAlphaScale * auraAlphaScale));
      aura.addColorStop(0.34, rgba(externalGlowColor, 0.09 * star.starLuminosity * metrics.glowAlphaScale * auraAlphaScale));
      aura.addColorStop(0.7, rgba(externalGlowColor, 0.028 * auraAlphaScale));
      aura.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(x, y, auraRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, starRadius, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(surfaceCanvas, x - starRadius, y - starRadius, starRadius * 2, starRadius * 2);

      const internalGlow = ctx.createRadialGradient(
        x - starRadius * 0.24,
        y - starRadius * 0.26,
        starRadius * 0.08,
        x,
        y,
        starRadius * 1.08
      );
      internalGlow.addColorStop(0, "rgba(255, 255, 255, 0.1)");
      internalGlow.addColorStop(0.18, rgba(mixColor(star.coreColor, [255, 255, 255], 0.38), 0.08));
      internalGlow.addColorStop(0.7, "rgba(0,0,0,0)");
      ctx.fillStyle = internalGlow;
      ctx.beginPath();
      ctx.arc(x, y, starRadius * 1.08, 0, Math.PI * 2);
      ctx.fill();

      const limbShadow = ctx.createRadialGradient(
        x - starRadius * 0.18,
        y - starRadius * 0.16,
        starRadius * 0.22,
        x,
        y,
        starRadius * 1.05
      );
      limbShadow.addColorStop(0, "rgba(0,0,0,0)");
      limbShadow.addColorStop(0.66, "rgba(28, 6, 4, 0.08)");
      limbShadow.addColorStop(0.88, "rgba(18, 4, 3, 0.22)");
      limbShadow.addColorStop(1, "rgba(6, 1, 1, 0.38)");
      ctx.fillStyle = limbShadow;
      ctx.beginPath();
      ctx.arc(x, y, starRadius * 1.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const rim = ctx.createRadialGradient(x, y, starRadius * 0.68, x, y, starRadius * 1.16);
      rim.addColorStop(0, "rgba(0,0,0,0)");
      rim.addColorStop(0.76, rgba(mixColor(star.haloColor, [255, 255, 255], 0.08), 0.12));
      rim.addColorStop(1, rgba(mixColor(star.haloColor, [255, 255, 255], 0.16), 0.3));
      ctx.fillStyle = rim;
      ctx.beginPath();
      ctx.arc(x, y, starRadius * 1.16, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, starRadius, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(mixColor(star.haloColor, [255, 255, 255], 0.22), selected ? 0.42 : 0.28);
      ctx.lineWidth = 1;
      ctx.stroke();

      return starRadius;
    }

    function drawNode(node, time) {
      const point = projectWorldPoint(node.renderX, node.renderY);
      const x = point.x;
      const y = point.y;
      const zoom = camera.zoom;
      const scaledVisualRadius = node.visualRadius * zoom;
      const selected = node.id === selectedNodeId;
      const displayLabel = getNodeDisplayTitle(node);
      let renderedRadius = scaledVisualRadius;

      if (selected && !node.isCenter) {
        const aura = (12 + Math.sin(time * 0.004 + node.labelFloatSeed) * 1.5) * zoom;
        ctx.beginPath();
        ctx.arc(x, y, scaledVisualRadius + aura, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(220, 234, 246, 0.08)";
        ctx.fill();
      }

      if (node.isCenter) {
        renderedRadius = drawCenterStarNode(node, x, y, selected, time, zoom);
      } else {
        ctx.beginPath();
        ctx.arc(x, y, scaledVisualRadius, 0, Math.PI * 2);
        ctx.fillStyle = selected
          ? "rgba(250, 253, 255, 1)"
          : "rgba(190, 205, 218, 0.92)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, scaledVisualRadius + 2.4 * zoom, 0, Math.PI * 2);
        ctx.strokeStyle = selected
          ? "rgba(240, 247, 252, 0.22)"
          : "rgba(210, 226, 239, 0.08)";
        ctx.lineWidth = Math.max(0.6, zoom);
        ctx.stroke();
      }

      const labelScale = clamp(Math.pow(zoom, 0.86), 0.6, 1.9);
      const labelYOffset = renderedRadius + 18 * labelScale + Math.sin(time * 0.002 + node.labelFloatSeed) * 1.2 * labelScale;
      ctx.fillStyle = selected ? "#f3f8fc" : "#c7d2dc";
      ctx.font = `${(selected ? 13 : 12) * labelScale}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(trimText(displayLabel, selected ? 22 : 18), x, y + labelYOffset);
    }

    function summarizeMap(map, fallbackIndex = 0) {
      const cached = constellationSummaryCache.get(map.id);
      if (cached && cached.mapRef === map && cached.fallbackIndex === fallbackIndex) {
        return cached.summary;
      }

      const centerNode = getMapCenterNode(map);
      const nodeCount = Math.max(1, map.nodes.length);
      const branchCount = centerNode
        ? map.nodes.filter(node => node.parentId === centerNode.id).length
        : 0;

      const summary = {
        name: getMapName(map, fallbackIndex),
        nodeCount,
        branchCount,
        satelliteCount: clamp(branchCount || Math.ceil(Math.sqrt(nodeCount)), 2, 8),
        visualRadius: clamp(14 + Math.sqrt(nodeCount) * 2.2 + branchCount * 0.75, 17, 32),
        seed: map.id * 0.61803398875
      };

      constellationSummaryCache.set(map.id, {
        mapRef: map,
        fallbackIndex,
        summary
      });
      return summary;
    }

    function getConstellationItemAt(x, y) {
      for (let i = constellationItems.length - 1; i >= 0; i--) {
        const item = constellationItems[i];
        if (item.kind === "map" && item.isVisible === false) continue;
        const dx = x - item.x;
        const dy = y - item.y;
        if (dx * dx + dy * dy <= item.hitRadius * item.hitRadius) {
          return item;
        }
      }
      return null;
    }

    function pointInCircle(x, y, cx, cy, radius) {
      const dx = x - cx;
      const dy = y - cy;
      return dx * dx + dy * dy <= radius * radius;
    }

    function getConstellationDeleteControl(item) {
      if (!item || item.kind !== "map" || maps.length <= 1) return null;

      const baseAngle = (-Math.PI / 4) + Math.sin(item.summary.seed * 7.4) * 0.12;

      const radius = clamp(item.radius * 0.34, 8, 10.5);
      const distance = item.radius + radius + 7;

      return {
        x: item.x + Math.cos(baseAngle) * distance,
        y: item.y + Math.sin(baseAngle) * distance,
        radius,
        hitRadius: radius + 7
      };
    }

    function getConstellationPlaneMetrics(totalMaps) {
      const planeWidth = Math.max(width * 1.5, 420 + Math.max(0, totalMaps - 1) * 280);
      const planeHeight = Math.max(height * 1.35, 900);
      const padX = Math.max(160, Math.min(300, planeWidth * 0.12));
      const laneOffsets = [
        -planeHeight * 0.24,
        0,
        planeHeight * 0.24
      ];

      return {
        planeWidth,
        planeHeight,
        padX,
        laneOffsets
      };
    }

    function getFallbackConstellationMapWorldPoint(map, index, totalMaps) {
      const metrics = getConstellationPlaneMetrics(totalMaps);
      const progress = totalMaps <= 1 ? 0.5 : index / (totalMaps - 1);
      const laneIndex = Math.min(
        metrics.laneOffsets.length - 1,
        Math.floor(hash01(map.id * 4.7) * metrics.laneOffsets.length)
      );
      const spread = totalMaps <= 1
        ? 0
        : (hash01(map.id * 8.4) - 0.5) * Math.min((metrics.planeWidth - metrics.padX * 2) / totalMaps, 120);

      return {
        x: (-metrics.planeWidth * 0.5) + metrics.padX + ((metrics.planeWidth - metrics.padX * 2) * progress) + spread,
        y: metrics.laneOffsets[laneIndex] + (hash01(map.id * 5.9) - 0.5) * Math.min(metrics.planeHeight * 0.15, 110)
      };
    }

    function getConstellationMapWorldPoint(map, index, totalMaps) {
      return cloneConstellationPosition(map && map.constellationPosition)
        || getFallbackConstellationMapWorldPoint(map, index, totalMaps);
    }

    function getConstellationScreenRadiusForMap(map, fallbackIndex = 0, zoom = mapsCamera.zoom) {
      const summary = summarizeMap(map, fallbackIndex);
      const star = getMapStarProfile(map);
      return clamp(
        summary.visualRadius * star.starScale * getConstellationVisualScale(zoom),
        14,
        getConstellationMaxRadiusForStar(star)
      );
    }

    function findConstellationSpawnScreenPoint(map) {
      const candidateRadius = getConstellationScreenRadiusForMap(map, maps.length, mapsCamera.zoom);
      const occupiedItems = constellationItems.filter(item => item.kind === "map" || item.kind === "new");
      const margin = candidateRadius + 36;
      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const seedAngle = hash01(map.id * 13.7 + maps.length * 1.91) * Math.PI * 2;
      const baseRadius = Math.max(candidateRadius * 3.2, Math.min(width, height) * 0.18);
      const ringStep = Math.max(candidateRadius * 2.2, Math.min(width, height) * 0.13);
      let bestCandidate = {
        x: clamp(centerX + Math.cos(seedAngle) * baseRadius, margin, width - margin),
        y: clamp(centerY + Math.sin(seedAngle) * baseRadius * 0.82, margin, height - margin)
      };
      let bestScore = -Infinity;

      for (let ring = 0; ring < 7; ring++) {
        const ringRadius = baseRadius + ringStep * ring;
        const steps = 10 + ring * 6;

        for (let step = 0; step < steps; step++) {
          const angle = seedAngle + (step / steps) * Math.PI * 2 + ring * 0.24;
          const candidateX = clamp(centerX + Math.cos(angle) * ringRadius, margin, width - margin);
          const candidateY = clamp(centerY + Math.sin(angle) * ringRadius * 0.82, margin, height - margin);
          let clearance = Infinity;

          for (const item of occupiedItems) {
            const dx = candidateX - item.x;
            const dy = candidateY - item.y;
            const itemRadius = item.kind === "map"
              ? item.hitRadius
              : item.hitRadius + 12;
            const gap = Math.hypot(dx, dy) - (itemRadius + candidateRadius + 24);
            clearance = Math.min(clearance, gap);
          }

          if (!occupiedItems.length) {
            clearance = Infinity;
          }

          const distanceFromCenter = Math.hypot(candidateX - centerX, candidateY - centerY);
          const score = clearance - distanceFromCenter * 0.04;

          if (clearance > 18) {
            return {
              x: candidateX,
              y: candidateY
            };
          }

          if (score > bestScore) {
            bestScore = score;
            bestCandidate = {
              x: candidateX,
              y: candidateY
            };
          }
        }
      }

      return bestCandidate;
    }

    function findConstellationSpawnWorldPoint(map) {
      const screenPoint = findConstellationSpawnScreenPoint(map);
      return screenToConstellationWorld(
        screenPoint.x,
        screenPoint.y,
        mapsCamera.zoom,
        mapsCamera.x,
        mapsCamera.y
      );
    }

    function getDefaultMapsViewState() {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) {
        return {
          x: 0,
          y: 0,
          targetX: 0,
          targetY: 0,
          zoom: 1,
          targetZoom: 1
        };
      }

      const activeIndex = Math.max(0, orderedMaps.findIndex(map => map.id === activeMapId));
      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);

      return {
        x: point.x,
        y: point.y,
        targetX: point.x,
        targetY: point.y,
        zoom: 1,
        targetZoom: 1
      };
    }

    function applyMapsViewState(viewState) {
      const nextView = sanitizeMapsViewState(viewState) || getDefaultMapsViewState();
      mapsCamera.x = nextView.x;
      mapsCamera.y = nextView.y;
      mapsCamera.targetX = nextView.targetX;
      mapsCamera.targetY = nextView.targetY;
      mapsCamera.zoom = nextView.zoom;
      mapsCamera.targetZoom = nextView.targetZoom;
    }

    function captureMapsViewState() {
      const x = Number.isFinite(mapsCamera.targetX) ? mapsCamera.targetX : mapsCamera.x;
      const y = Number.isFinite(mapsCamera.targetY) ? mapsCamera.targetY : mapsCamera.y;
      const zoom = clamp(
        Number.isFinite(mapsCamera.targetZoom) ? mapsCamera.targetZoom : mapsCamera.zoom,
        MAPS_ZOOM_MIN,
        MAPS_ZOOM_MAX
      );

      return {
        x,
        y,
        targetX: x,
        targetY: y,
        zoom,
        targetZoom: zoom
      };
    }

    function settleMapsCamera() {
      const settledView = captureMapsViewState();
      applyMapsViewState(settledView);
    }

    function holdMapsCameraAtCurrentView() {
      const x = Number.isFinite(mapsCamera.x) ? mapsCamera.x : 0;
      const y = Number.isFinite(mapsCamera.y) ? mapsCamera.y : 0;
      const zoom = clamp(
        Number.isFinite(mapsCamera.zoom) ? mapsCamera.zoom : 1,
        MAPS_ZOOM_MIN,
        MAPS_ZOOM_MAX
      );

      mapsCamera.x = x;
      mapsCamera.y = y;
      mapsCamera.targetX = x;
      mapsCamera.targetY = y;
      mapsCamera.zoom = zoom;
      mapsCamera.targetZoom = zoom;
    }

    function projectConstellationPoint(worldX, worldY) {
      return {
        x: (width * 0.5) + (worldX - mapsCamera.x) * mapsCamera.zoom,
        y: (height * 0.5) + (worldY - mapsCamera.y) * mapsCamera.zoom
      };
    }

    function screenToConstellationWorld(
      screenX,
      screenY,
      zoom = mapsCamera.zoom,
      cameraX = mapsCamera.x,
      cameraY = mapsCamera.y
    ) {
      const safeZoom = Math.max(zoom, 0.0001);
      return {
        x: cameraX + (screenX - width * 0.5) / safeZoom,
        y: cameraY + (screenY - height * 0.5) / safeZoom
      };
    }

    function getConstellationVisualScale(zoom = mapsCamera.zoom) {
      return clamp(Math.pow(Math.max(zoom, 0.0001), 0.58), 0.56, 2.05);
    }

    function getConstellationMaxRadiusForStar(star) {
      const starScale = Number.isFinite(star && star.starScale) ? star.starScale : 1;
      const starLuminosity = Number.isFinite(star && star.starLuminosity) ? star.starLuminosity : 1;
      const scaledLimit =
        58 +
        Math.max(0, starScale - 1.18) * 42 +
        Math.max(0, starLuminosity - 1.08) * 34;
      const giantFloor = star && star.starVariant === "giant" ? 82 : 58;
      return clamp(Math.max(scaledLimit, giantFloor), 58, 88);
    }

    function getConstellationHitRadiusForStar(star, radius) {
      return clamp(radius + 18, 30, getConstellationMaxRadiusForStar(star) + 24);
    }

    function centerMapsCameraOnActive(snap = false) {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) return;

      const focusMapId = getConstellationFocusMapId();
      if (focusMapId === null) return;

      const activeIndex = orderedMaps.findIndex(map => map.id === focusMapId);
      if (activeIndex < 0) return;

      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);

      mapsCamera.targetX = point.x;
      mapsCamera.targetY = point.y;

      if (snap) {
        mapsCamera.x = point.x;
        mapsCamera.y = point.y;
      }
    }

    function shouldShowCenterMapsButton() {
      const orderedMaps = getOrderedMaps();
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering() || !orderedMaps.length) return false;

      const focusMapId = getConstellationFocusMapId();
      if (focusMapId === null) return false;

      const activeIndex = orderedMaps.findIndex(map => map.id === focusMapId);
      if (activeIndex < 0) return false;

      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);
      const dx = mapsCamera.x - point.x;
      const dy = mapsCamera.y - point.y;
      return Math.hypot(dx, dy) > Math.max(120, Math.min(width, height) * 0.12);
    }

    function updateMapsCenterButton() {
      centerMapsBtn.classList.toggle("is-visible", shouldShowCenterMapsButton());
    }

    function resolveConstellationTarget(x, y) {
      if (pendingDeleteMapId !== null) return null;

      if (hoveredMapId !== null) {
        const hoveredItem = constellationItems.find(item => item.kind === "map" && item.mapId === hoveredMapId);
        const hoveredDeleteControl = getConstellationDeleteControl(hoveredItem);
        if (
          hoveredItem &&
          hoveredDeleteControl &&
          pointInCircle(x, y, hoveredDeleteControl.x, hoveredDeleteControl.y, hoveredDeleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: hoveredItem,
            control: hoveredDeleteControl
          };
        }
      }

      const baseItem = getConstellationItemAt(x, y);
      if (!baseItem) return null;

      if (baseItem.kind === "map") {
        const deleteControl = getConstellationDeleteControl(baseItem);
        if (
          deleteControl &&
          pointInCircle(x, y, deleteControl.x, deleteControl.y, deleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: baseItem,
            control: deleteControl
          };
        }
      }

      return {
        kind: baseItem.kind,
        item: baseItem,
        control: null
      };
    }

    function updateMapsLabel(item) {
      if (!item) {
        clearMapsLabel();
        return;
      }

      mapsLabel.textContent = item.label;
      mapsLabel.style.color = item.star ? rgba(item.star.outlineColor, 0.98) : "";
      mapsLabel.style.textShadow = item.star
        ? `0 0 22px ${rgba(item.star.haloColor, 0.32)}`
        : "";
      mapsLabel.style.left = `${clamp(item.x, 24, width - 24)}px`;
      mapsLabel.style.top = `${clamp(item.y - item.radius - 18, 28, height - 28)}px`;
      mapsLabel.classList.add("is-visible");
    }

    function drawConstellationBackdrop(time) {
      drawUniverseBackdrop(mapsCtx, mapsCamera, time, "d1");
    }

    function drawStarFlareArm(x, y, length, thickness, angle, color, alpha, whiteAlpha = 0) {
      mapsCtx.save();
      mapsCtx.translate(x, y);
      mapsCtx.rotate(angle);
      mapsCtx.scale(length, thickness);

      const flare = mapsCtx.createRadialGradient(0, 0, 0, 0, 0, 1);
      flare.addColorStop(0, "rgba(0,0,0,0)");
      flare.addColorStop(0.07, "rgba(0,0,0,0)");
      flare.addColorStop(0.12, `rgba(255, 255, 255, ${whiteAlpha * 0.22})`);
      flare.addColorStop(0.18, rgba(color, alpha * 0.72));
      flare.addColorStop(0.3, rgba(color, alpha * 0.96));
      flare.addColorStop(0.5, rgba(color, alpha * 0.24));
      flare.addColorStop(1, "rgba(0,0,0,0)");

      mapsCtx.fillStyle = flare;
      mapsCtx.beginPath();
      mapsCtx.arc(0, 0, 1, 0, Math.PI * 2);
      mapsCtx.fill();
      mapsCtx.restore();
    }

    function getConstellationTwinkle(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00062;
      const seed = item.summary.seed + item.mapId * 0.173;
      const baseAmplitude = star.starVariant === "giant"
        ? 0.085
        : star.starType === "blue"
          ? 0.19
          : star.starType === "white"
            ? 0.18
            : star.starType === "yellow"
              ? 0.168
              : star.starType === "orange"
                ? 0.146
                : 0.132;
      const stateDamping = item.isActive ? 0.94 : hovered ? 1.08 : 1.42;
      const amplitude = baseAmplitude * stateDamping;

      const slow = Math.sin(t * (0.74 + hash01(seed * 5.1) * 0.32) + seed * 6.2);
      const mid = Math.sin(
        t * (1.42 + hash01(seed * 8.4) * 0.7) +
        seed * 14.8 +
        Math.sin(t * 0.21 + seed * 1.7) * 0.22
      );
      const fast = Math.sin(t * (3.08 + hash01(seed * 11.7) * 1.18) + seed * 27.1);
      const shimmer = Math.sin(t * (6.2 + hash01(seed * 16.3) * 1.9) + seed * 39.6);
      const glint = Math.pow(
        Math.max(0, Math.sin(t * (0.92 + hash01(seed * 3.6) * 0.44) + seed * 9.7)),
        6
      ) * amplitude * 0.88;
      const flash = Math.pow(
        Math.max(0, Math.sin(t * (1.34 + hash01(seed * 7.2) * 0.72) + seed * 18.6)),
        10
      ) * amplitude * 1.8;

      const brightness = clamp(
        1 +
          slow * amplitude * 0.72 +
          mid * amplitude * 0.58 +
          fast * amplitude * 0.28 +
          shimmer * amplitude * 0.16 +
          glint * 1.22 +
          flash,
        0.76,
        1.72
      );
      const aura = clamp(
        1 +
          slow * amplitude * 1.02 +
          mid * amplitude * 0.82 +
          fast * amplitude * 0.28 +
          shimmer * amplitude * 0.13 +
          glint * 1.6 +
          flash * 1.34,
        0.68,
        2.1
      );
      const core = clamp(
        1 +
          slow * amplitude * 0.48 +
          mid * amplitude * 0.34 +
          shimmer * amplitude * 0.18 +
          glint * 1.02 +
          flash * 0.82,
        0.86,
        1.48
      );
      const scale = clamp(
        1 +
          slow * amplitude * 0.08 +
          mid * amplitude * 0.06 +
          fast * amplitude * 0.04 +
          glint * 0.1 +
          flash * 0.14,
        0.95,
        1.18
      );
      const bloom = clamp(
        Math.max(0, brightness - 1) * 0.95 + glint * 0.9 + flash * 1.4,
        0,
        0.86
      );

      return {
        brightness,
        aura,
        core,
        scale,
        bloom
      };
    }

    function getConstellationHaloBreath(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00019;
      const seed = item.summary.seed + item.mapId * 0.317;
      const baseAmplitude = star.starVariant === "giant"
        ? 0.092
        : star.starType === "blue"
          ? 0.078
          : star.starType === "white"
            ? 0.074
            : star.starType === "yellow"
              ? 0.07
              : star.starType === "orange"
                ? 0.064
                : 0.06;
      const stateDamping = item.isActive ? 0.9 : hovered ? 0.95 : 1;
      const amplitude = baseAmplitude * stateDamping;

      const main = Math.sin(t * (0.86 + hash01(seed * 4.7) * 0.18) + seed * 5.3);
      const secondary = Math.sin(t * (1.34 + hash01(seed * 8.3) * 0.26) + seed * 11.9);
      const envelope = Math.sin(t * (0.34 + hash01(seed * 12.9) * 0.08) + seed * 2.7);

      const radius = clamp(
        1 +
          main * amplitude * 0.6 +
          secondary * amplitude * 0.24 +
          envelope * amplitude * 0.3,
        0.92,
        1.16
      );
      const alpha = clamp(
        1 +
          main * amplitude * 0.22 +
          secondary * amplitude * 0.1 +
          envelope * amplitude * 0.08,
        0.94,
        1.09
      );
      const bloom = clamp(
        1 +
          main * amplitude * 0.18 +
          envelope * amplitude * 0.1,
        0.96,
        1.1
      );

      return {
        radius,
        alpha,
        bloom
      };
    }

    function getConstellationFlareAsymmetry(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00031;
      const seed = item.summary.seed + item.mapId * 0.541;
      const baseAmplitude = star.starType === "blue"
        ? 0.2
        : star.starType === "white"
          ? 0.18
          : star.starType === "yellow"
            ? 0.17
            : star.starType === "orange"
              ? 0.145
              : star.starVariant === "giant"
                ? 0.14
                : 0.125;
      const stateDamping = item.isActive ? 0.92 : hovered ? 0.96 : 1;
      const amplitude = baseAmplitude * stateDamping;

      const primary = Math.sin(t * (1.04 + hash01(seed * 4.3) * 0.2) + seed * 6.1);
      const secondary = Math.sin(
        t * (1.72 + hash01(seed * 8.1) * 0.28) +
        seed * 13.4 +
        Math.sin(t * 0.27 + seed * 2.1) * 0.16
      );
      const balance = clamp(
        primary * amplitude * 0.7 + secondary * amplitude * 0.38,
        -0.24,
        0.24
      );
      const diagonal = clamp(
        Math.sin(t * (1.26 + hash01(seed * 10.4) * 0.22) + seed * 9.8) * amplitude * 0.42 +
        Math.sin(t * (2.08 + hash01(seed * 14.7) * 0.34) + seed * 17.2) * amplitude * 0.2,
        -0.14,
        0.14
      );

      return {
        verticalAlpha: 1 + balance,
        horizontalAlpha: 1 - balance * 0.92,
        verticalThickness: clamp(1 + balance * 0.38, 0.9, 1.12),
        horizontalThickness: clamp(1 - balance * 0.34, 0.9, 1.12),
        diagonalPositiveAlpha: 1 + diagonal,
        diagonalNegativeAlpha: 1 - diagonal * 0.94,
        diagonalPositiveThickness: clamp(1 + diagonal * 0.28, 0.92, 1.08),
        diagonalNegativeThickness: clamp(1 - diagonal * 0.24, 0.92, 1.08)
      };
    }

    function getOverlayCreateStarProfile() {
      if (!overlayCreateState) return null;
      const identity = overlayCreateState.starIdentity;
      return {
        ...identity,
        ...getStarTypeTemplate(identity.starType, identity.starVariant)
      };
    }

    function getOverlayCreateGhostItem(target = null) {
      if (!overlayCreateState || !overlayPointer.inside) return null;

      const star = getOverlayCreateStarProfile();
      if (!star) return null;

      const summary = {
        name: "Nuevo mapa",
        nodeCount: 5,
        branchCount: 4,
        satelliteCount: 4,
        visualRadius: clamp(14 + Math.sqrt(5) * 2.2 + 4 * 0.75, 17, 32),
        seed: overlayCreateState.seed
      };
      const radius = clamp(
        summary.visualRadius * star.starScale * getConstellationVisualScale(),
        14,
        getConstellationMaxRadiusForStar(star)
      );
      const blocked = Boolean(target);
      const worldPoint = screenToConstellationWorld(overlayPointer.x, overlayPointer.y);

      return {
        kind: "map",
        mapId: overlayCreateState.previewMapId,
        label: blocked ? "Busca un espacio vacio" : "Click para crear",
        summary,
        star,
        x: overlayPointer.x,
        y: overlayPointer.y,
        worldX: worldPoint.x,
        worldY: worldPoint.y,
        driftX: 0,
        driftY: 0,
        radius,
        hitRadius: radius + 12,
        isActive: false,
        isGhost: true,
        isValid: !blocked
      };
    }

    function drawConstellationMap(item, time, hovered) {
      mapsCtx.save();
      if (item.isGhost) {
        mapsCtx.globalAlpha *= item.isValid ? 0.64 : 0.26;
      }

      const star = item.star;
      const emphasis = item.isActive ? 1.16 : hovered ? 1.12 : 1;
      const radius = item.radius * emphasis;
      const pulse =
        1 +
        Math.sin(time * 0.0015 * star.orbitSpeed + item.summary.seed * 7.1) *
          (star.pulseScale + (item.isActive ? 0.006 : hovered ? 0.003 : 0));
      const twinkle = getConstellationTwinkle(item, time, hovered);
      const haloBreath = getConstellationHaloBreath(item, time, hovered);
      const flareAsymmetry = getConstellationFlareAsymmetry(item, time, hovered);
      const coreRadius = radius * pulse * twinkle.scale;
      const auraRadius = coreRadius * star.auraScale * (item.isActive ? 1.1 : hovered ? 1.05 : 1) * (0.96 + twinkle.aura * 0.12) * haloBreath.radius;
      const auraAlpha = star.auraAlpha * star.starLuminosity * twinkle.aura * haloBreath.alpha * (item.isActive ? 1.42 : hovered ? 1.24 : 1.08);
      const bodyRadius = coreRadius * 1.52 * (0.98 + twinkle.brightness * 0.05);
      const coronaRadius = coreRadius * 2.05 * (0.96 + twinkle.aura * 0.1) * (0.98 + (haloBreath.radius - 1) * 1.1);
      const hotCoreColor = mixColor(star.coreColor, [255, 255, 255], 0.52);
      const warmCoreColor = mixColor(star.coreColor, [255, 255, 255], 0.22);
      const whiteCoreAlpha = Math.min(
        1,
        star.whiteCoreAlpha * twinkle.core + (item.isActive ? 0.05 : hovered ? 0.025 : 0)
      );

      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, auraRadius);
      aura.addColorStop(0, rgba(star.haloColor, auraAlpha));
      aura.addColorStop(0.28, rgba(star.haloColor, auraAlpha * 0.56));
      aura.addColorStop(0.56, rgba(star.haloColor, auraAlpha * 0.14));
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, auraRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      const coronaGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coronaRadius);
      coronaGlow.addColorStop(0, rgba(star.haloColor, auraAlpha * 0.5));
      coronaGlow.addColorStop(0.18, rgba(star.haloColor, auraAlpha * 0.28));
      coronaGlow.addColorStop(0.74, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = coronaGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coronaRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      if (twinkle.bloom > 0.02) {
        const twinkleBloomRadius = coronaRadius * haloBreath.bloom * (1.02 + twinkle.bloom * 0.28);
        const twinkleBloom = mapsCtx.createRadialGradient(
          item.x,
          item.y,
          0,
          item.x,
          item.y,
          twinkleBloomRadius
        );
        twinkleBloom.addColorStop(0, rgba(hotCoreColor, twinkle.bloom * 0.28));
        twinkleBloom.addColorStop(0.18, rgba(star.haloColor, twinkle.bloom * 0.2));
        twinkleBloom.addColorStop(0.52, rgba(star.haloColor, twinkle.bloom * 0.08));
        twinkleBloom.addColorStop(1, "rgba(0,0,0,0)");
        mapsCtx.fillStyle = twinkleBloom;
        mapsCtx.beginPath();
        mapsCtx.arc(item.x, item.y, twinkleBloomRadius, 0, Math.PI * 2);
        mapsCtx.fill();
      }

      const bodyGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, bodyRadius);
      bodyGlow.addColorStop(0, rgba(hotCoreColor, star.bodyAlpha * twinkle.brightness * 0.98));
      bodyGlow.addColorStop(0.22, rgba(warmCoreColor, star.bodyAlpha * twinkle.brightness * 0.8));
      bodyGlow.addColorStop(0.48, rgba(star.coreColor, star.bodyAlpha * twinkle.brightness * 0.52));
      bodyGlow.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = bodyGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, bodyRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      const stellarCore = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coreRadius * 1.08);
      stellarCore.addColorStop(0, `rgba(255, 255, 255, ${whiteCoreAlpha})`);
      stellarCore.addColorStop(0.1, `rgba(255, 255, 255, ${whiteCoreAlpha * 0.92})`);
      stellarCore.addColorStop(0.24, rgba(hotCoreColor, clamp(0.96 * twinkle.core, 0, 1)));
      stellarCore.addColorStop(0.46, rgba(warmCoreColor, clamp(0.88 * twinkle.core, 0, 1)));
      stellarCore.addColorStop(0.72, rgba(star.coreColor, star.bodyAlpha * twinkle.brightness * 0.74));
      stellarCore.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = stellarCore;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius * 1.08, 0, Math.PI * 2);
      mapsCtx.fill();

      const spikeAlpha = star.spikeAlpha * star.starLuminosity * twinkle.brightness * (1 + twinkle.bloom * 0.3) * (item.isActive ? 1.24 : hovered ? 1.12 : 1);
      const spikeLength = coreRadius * star.spikeLength * (1 + twinkle.bloom * 0.16) * (item.isActive ? 1.1 : hovered ? 1.05 : 1);
      const verticalThickness = coreRadius * 0.095 * flareAsymmetry.verticalThickness;
      const horizontalThickness = coreRadius * 0.068 * flareAsymmetry.horizontalThickness;
      const verticalSpikeAlpha = spikeAlpha * flareAsymmetry.verticalAlpha;
      const horizontalSpikeAlpha = spikeAlpha * flareAsymmetry.horizontalAlpha;
      const diagonalPositiveThickness = coreRadius * 0.062 * flareAsymmetry.diagonalPositiveThickness;
      const diagonalNegativeThickness = coreRadius * 0.054 * flareAsymmetry.diagonalNegativeThickness;
      const diagonalPositiveAlpha = spikeAlpha * flareAsymmetry.diagonalPositiveAlpha;
      const diagonalNegativeAlpha = spikeAlpha * flareAsymmetry.diagonalNegativeAlpha;

      mapsCtx.save();
      mapsCtx.globalCompositeOperation = "lighter";

      drawStarFlareArm(item.x, item.y, spikeLength * 1.06, verticalThickness * 2.8, Math.PI / 2, star.haloColor, verticalSpikeAlpha * 0.2, 0);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.86, verticalThickness * 1.38, Math.PI / 2, star.haloColor, verticalSpikeAlpha * 0.46, 0.08);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.42, verticalThickness * 0.34, Math.PI / 2, hotCoreColor, verticalSpikeAlpha * 0.58, verticalSpikeAlpha * 0.84);

      drawStarFlareArm(item.x, item.y, spikeLength * 0.88, horizontalThickness * 2.3, 0, star.haloColor, horizontalSpikeAlpha * 0.16, 0);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.72, horizontalThickness * 1.16, 0, star.haloColor, horizontalSpikeAlpha * 0.36, 0.05);
      drawStarFlareArm(item.x, item.y, spikeLength * 0.34, horizontalThickness * 0.3, 0, hotCoreColor, horizontalSpikeAlpha * 0.44, horizontalSpikeAlpha * 0.66);

      const diagonalVisibility = star.starType === "blue"
        ? 1
        : star.starType === "white"
          ? 0.96
          : star.starVariant === "giant"
            ? 0.98
            : star.starType === "yellow"
              ? 0.9
              : star.starType === "orange"
                ? 0.84
                : 0.78;

      drawStarFlareArm(
        item.x,
        item.y,
        spikeLength * 0.54,
        diagonalPositiveThickness,
        Math.PI / 4,
        star.haloColor,
        diagonalPositiveAlpha * 0.3 * diagonalVisibility,
        diagonalPositiveAlpha * 0.065 * diagonalVisibility
      );
      drawStarFlareArm(
        item.x,
        item.y,
        spikeLength * 0.46,
        diagonalNegativeThickness,
        -Math.PI / 4,
        star.haloColor,
        diagonalNegativeAlpha * 0.22 * diagonalVisibility,
        diagonalNegativeAlpha * 0.05 * diagonalVisibility
      );

      mapsCtx.restore();

      const whiteCoreRadius = coreRadius * star.whiteCoreScale * (0.94 + twinkle.core * 0.16 + twinkle.bloom * 0.12);
      const whiteCoreGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coreRadius * 0.96);
      whiteCoreGlow.addColorStop(0, `rgba(255, 255, 255, ${whiteCoreAlpha})`);
      whiteCoreGlow.addColorStop(0.24, `rgba(255, 255, 255, ${whiteCoreAlpha * 0.72})`);
      whiteCoreGlow.addColorStop(0.46, rgba(hotCoreColor, 0.26));
      whiteCoreGlow.addColorStop(1, "rgba(255,255,255,0)");
      mapsCtx.fillStyle = whiteCoreGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius * 0.96, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, whiteCoreRadius, 0, Math.PI * 2);
      mapsCtx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, whiteCoreAlpha + 0.02)})`;
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius + 1.2, 0, Math.PI * 2);
      mapsCtx.strokeStyle = rgba(
        star.outlineColor,
        star.outlineAlpha * (item.isActive ? 1.18 : hovered ? 1.06 : 0.92)
      );
      mapsCtx.lineWidth = 0.8;
      mapsCtx.stroke();

      if (item.isGhost) {
        mapsCtx.beginPath();
        mapsCtx.arc(item.x, item.y, coreRadius + 8, 0, Math.PI * 2);
        mapsCtx.strokeStyle = item.isValid
          ? "rgba(225, 236, 244, 0.34)"
          : "rgba(234, 168, 178, 0.28)";
        mapsCtx.lineWidth = 1;
        mapsCtx.stroke();
      }

      mapsCtx.restore();
    }

    function drawConstellationPlus(item, hovered) {
      const radius = item.radius * (hovered ? 1.1 : 1);
      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, radius * 2.2);
      aura.addColorStop(0, hovered ? "rgba(225, 238, 247, 0.13)" : "rgba(188, 207, 220, 0.06)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius * 2.2, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(238, 246, 251, 0.76)" : "rgba(207, 224, 235, 0.46)";
      mapsCtx.lineWidth = 1.4;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(item.x - radius * 0.42, item.y);
      mapsCtx.lineTo(item.x + radius * 0.42, item.y);
      mapsCtx.moveTo(item.x, item.y - radius * 0.42);
      mapsCtx.lineTo(item.x, item.y + radius * 0.42);
      mapsCtx.strokeStyle = hovered ? "rgba(241, 248, 252, 0.84)" : "rgba(218, 233, 243, 0.56)";
      mapsCtx.lineWidth = 1.35;
      mapsCtx.stroke();
    }

    function drawConstellationDeleteControl(control, hovered) {
      if (!control) return;

      const radius = control.radius * (hovered ? 1.08 : 1);
      const aura = mapsCtx.createRadialGradient(control.x, control.y, 0, control.x, control.y, radius * 2.5);
      aura.addColorStop(0, hovered ? "rgba(228, 189, 197, 0.14)" : "rgba(128, 91, 99, 0.08)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius * 2.5, 0, Math.PI * 2);
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.fillStyle = hovered ? "rgba(26, 12, 15, 0.94)" : "rgba(17, 10, 12, 0.88)";
      mapsCtx.fill();

      mapsCtx.beginPath();
      mapsCtx.arc(control.x, control.y, radius, 0, Math.PI * 2);
      mapsCtx.strokeStyle = hovered ? "rgba(235, 198, 206, 0.44)" : "rgba(172, 129, 137, 0.24)";
      mapsCtx.lineWidth = 1.2;
      mapsCtx.stroke();

      mapsCtx.beginPath();
      mapsCtx.moveTo(control.x - radius * 0.42, control.y);
      mapsCtx.lineTo(control.x + radius * 0.42, control.y);
      mapsCtx.strokeStyle = hovered ? "rgba(248, 228, 232, 0.9)" : "rgba(223, 194, 201, 0.62)";
      mapsCtx.lineWidth = 1.3;
      mapsCtx.stroke();
    }

    function buildConstellationState(time) {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) {
        return { items: [] };
      }

      const items = [];
      const visualScale = getConstellationVisualScale();
      const selectedMapId = getConstellationFocusMapId();

      for (let index = 0; index < orderedMaps.length; index++) {
        const map = orderedMaps[index];
        const summary = summarizeMap(map, index);
        const star = getMapStarProfile(map);
        const worldPoint = getConstellationMapWorldPoint(map, index, orderedMaps.length);
        const driftX = draggedOverlayMapId === map.id
          ? overlayDraggedMapDriftX
          : Math.sin(time * 0.00018 + map.id * 0.9) * 6;
        const driftY = draggedOverlayMapId === map.id
          ? overlayDraggedMapDriftY
          : Math.cos(time * 0.00022 + map.id * 1.1) * 8;
        const point = projectConstellationPoint(worldPoint.x + driftX, worldPoint.y + driftY);
        const isActive = selectedMapId !== null && map.id === selectedMapId;
        const radius = clamp(
          summary.visualRadius * star.starScale * (isActive ? 1.16 : 1) * visualScale,
          14,
          getConstellationMaxRadiusForStar(star)
        );
        const renderPadding = Math.max(180, radius * 6.4);
        const isVisible =
          point.x + renderPadding >= 0 &&
          point.x - renderPadding <= width &&
          point.y + renderPadding >= 0 &&
          point.y - renderPadding <= height;

        items.push({
          kind: "map",
          mapId: map.id,
          label: summary.name,
          summary,
          star,
          x: point.x,
          y: point.y,
          worldX: worldPoint.x,
          worldY: worldPoint.y,
          driftX,
          driftY,
          radius,
          hitRadius: getConstellationHitRadiusForStar(star, radius),
          isActive,
          isVisible
        });
      }

      items.push({
        kind: "new",
        label: "Nuevo mapa",
        x: width - Math.max(76, width * 0.1),
        y: Math.max(82, height * 0.16) + Math.sin(time * 0.0004) * 4,
        radius: clamp(18 + Math.min(width, height) * 0.008, 18, 24),
        hitRadius: clamp(32 + Math.min(width, height) * 0.016, 32, 42)
      });

      return {
        items
      };
    }

    function drawConstellation(time) {
      mapsCtx.clearRect(0, 0, width, height);
      let enterProgress = 0;
      let enterFadeProgress = 0;

      if (overlayEnterState) {
        if (overlayEnterState.startedAt === null) {
          overlayEnterState.startedAt = time;
        }

        const rawProgress = clamp((time - overlayEnterState.startedAt) / MAPS_ENTER_DURATION, 0, 1);
        enterProgress = Math.pow(rawProgress, 1.55);
        enterFadeProgress = clamp((rawProgress - 0.58) / 0.42, 0, 1);
        mapsCamera.x = lerp(overlayEnterState.startX, overlayEnterState.targetX, enterProgress);
        mapsCamera.y = lerp(overlayEnterState.startY, overlayEnterState.targetY, enterProgress);
        mapsCamera.zoom = lerp(overlayEnterState.startZoom, overlayEnterState.targetZoom, enterProgress);
        mapsCamera.targetX = mapsCamera.x;
        mapsCamera.targetY = mapsCamera.y;
        mapsCamera.targetZoom = mapsCamera.zoom;

        if (rawProgress >= 1) {
          const enteringMapId = overlayEnterState.mapId;
          overlayEnterState = null;
          app.classList.remove("maps-entering");
          switchMapById(enteringMapId);
          return;
        }
      }

      if (!overlayEnterState) {
        mapsCamera.x += (mapsCamera.targetX - mapsCamera.x) * 0.12;
        mapsCamera.y += (mapsCamera.targetY - mapsCamera.y) * 0.12;
        mapsCamera.zoom += (mapsCamera.targetZoom - mapsCamera.zoom) * 0.14;
      }
      updateMapsCenterButton();

      const layout = buildConstellationState(time);
      constellationItems = layout.items;

      const hoveredTarget = overlayPointer.inside && !overlayEnterState
        ? resolveConstellationTarget(overlayPointer.x, overlayPointer.y)
        : null;
      const hoveredItem = hoveredTarget ? hoveredTarget.item : null;
      const hoveredDeleteControl = hoveredTarget && hoveredTarget.kind === "delete"
        ? hoveredTarget.control
        : null;
      const selectedItem = overlaySelectedMapId !== null
        ? constellationItems.find(item => item.kind === "map" && item.mapId === overlaySelectedMapId)
        : null;
      const createGhost = getOverlayCreateGhostItem(overlayCreateState ? hoveredTarget : null);

      hoveredMapId = hoveredItem && hoveredItem.kind === "map" ? hoveredItem.mapId : null;

      drawConstellationBackdrop(time);

      for (const item of constellationItems) {
        const hovered = hoveredItem === item;
        if (item.kind === "new") {
          drawConstellationPlus(item, hovered);
        } else if (item.isVisible !== false) {
          drawConstellationMap(item, time, hovered);
        }
      }

      if (!pendingDeleteMapId && !overlayEnterState && !overlayCreateState && hoveredItem && hoveredItem.kind === "map") {
        drawConstellationDeleteControl(
          getConstellationDeleteControl(hoveredItem),
          Boolean(hoveredDeleteControl)
        );
      }

      if (createGhost) {
        drawConstellationMap(createGhost, time, false);
      }

      if (overlayEnterState && selectedItem && selectedItem.kind === "map") {
        mapsCtx.fillStyle = `rgba(2, 4, 8, ${0.12 + enterFadeProgress * 0.56})`;
        mapsCtx.fillRect(0, 0, width, height);

        mapsCtx.save();
        mapsCtx.globalCompositeOperation = "lighter";
        const enterGlowRadius = selectedItem.radius * (4.8 + enterProgress * 2.8);
        const enterGlow = mapsCtx.createRadialGradient(
          selectedItem.x,
          selectedItem.y,
          0,
          selectedItem.x,
          selectedItem.y,
          enterGlowRadius
        );
        enterGlow.addColorStop(0, rgba(selectedItem.star.haloColor, 0.16 + enterFadeProgress * 0.18));
        enterGlow.addColorStop(0.26, rgba(selectedItem.star.haloColor, 0.08 + enterFadeProgress * 0.1));
        enterGlow.addColorStop(0.68, "rgba(0,0,0,0)");
        mapsCtx.fillStyle = enterGlow;
        mapsCtx.beginPath();
        mapsCtx.arc(selectedItem.x, selectedItem.y, enterGlowRadius, 0, Math.PI * 2);
        mapsCtx.fill();
        mapsCtx.restore();

        drawConstellationMap(selectedItem, time, false);
      }

      if (pendingDeleteMapId !== null) {
        hoveredMapId = null;
        clearMapsLabel();
        mapsOverlay.style.cursor = "default";
        return;
      }

      updateMapsLabel(
        createGhost
          ? createGhost
          : hoveredTarget && hoveredTarget.kind === "delete"
            ? hoveredTarget.item
            : hoveredItem || selectedItem
      );
      mapsOverlay.style.cursor = (overlayPanning || draggedOverlayMapId !== null)
        ? "grabbing"
        : overlayCreateState
          ? createGhost && createGhost.isValid
            ? "copy"
            : "not-allowed"
        : overlayEnterState
          ? "default"
          : hoveredTarget
          ? "pointer"
          : "default";
    }

    function render(time) {
      ctx.clearRect(0, 0, width, height);
      drawBackground(time);
      updateNodes();
      drawLinks();

      for (const node of nodes) {
        drawNode(node, time);
      }

      if (editingNodeId && !mapsOverlayOpen) positionEditor();
      else if (!mapsOverlayOpen) updateSelectedNoteCard();
      else hideNoteCard();
      updateAdjacentNoteCards();

      if (mapsOverlayOpen) drawConstellation(time);
      else mapsCtx.clearRect(0, 0, width, height);
      requestAnimationFrame(render);
    }

    function positionEditor() {
      const node = getNodeById(editingNodeId);
      if (!node) return;
      const point = projectWorldPoint(node.renderX, node.renderY);
      editor.style.display = "block";
      editor.classList.add("is-visible");
      positionFloatingPanel(editor, point.x, point.y, 34);
    }

    function openEditor(node) {
      editingNodeId = node.id;
      nodeInput.value = getNodeDisplayTitle(node);
      nodeNoteInput.value = node.note || "";
      hideNoteCard();
      positionEditor();
      nodeInput.focus();
      nodeInput.select();
    }

    function closeEditor(save = true) {
      if (editingNodeId) {
        const node = getNodeById(editingNodeId);
        if (node && save) {
          const nextLabel = nodeInput.value.trim();
          const nextNote = nodeNoteInput.value.trim();
          const previousLabel = node.label;
          const previousNote = node.note || "";
          let changed = false;

          const resolvedLabel = nextLabel || getDefaultNodeLabel(node);
          if (node.label !== resolvedLabel) {
            node.label = resolvedLabel;
            changed = true;
          }

          if ((node.note || "") !== nextNote) {
            node.note = nextNote;
            changed = true;
          }

          if (changed) {
            commitLocalTransaction("editNode", {
              mapId: activeMapId,
              nodeId: node.id,
              previousLabel,
              previousNote,
              label: node.label,
              note: node.note || ""
            }, { syncActiveMap: true });
          }
        }
      }
      editingNodeId = null;
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
    }

    function restoreWorkspace(restoredMaps, nextActiveMapId, nextMapIdCounter, nextMapsViewState = null, shouldResave = false) {
      maps = restoredMaps;
      invalidateConstellationVisualCaches();
      mapIdCounter = Math.max(nextMapIdCounter, ...maps.map(map => map.id));
      activeMapId = maps.some(map => map.id === nextActiveMapId) ? nextActiveMapId : maps[0].id;

      applyMapState(getActiveMap());
      applyMapsViewState(nextMapsViewState);
      updateMapsButton();

      if (shouldResave) {
        saveState(false);
      }

      return true;
    }

    function saveState(syncActiveMap = true) {
      try {
        const state = captureWorkspaceState(syncActiveMap);
        return saveLocalSnapshot(state).catch((error) => {
          console.error("No se pudo guardar el estado local:", error);
        });
      } catch (error) {
        console.error("No se pudo preparar el estado local:", error);
        return Promise.resolve();
      }
    }

    function scheduleSave(reason = "view") {
      flushPendingSave();
      saveTimeout = setTimeout(() => {
        saveTimeout = null;
        commitLocalTransaction("updateViewFrame", createViewFramePayload(reason), { syncActiveMap: true });
      }, 140);
    }

    canvas.addEventListener("wheel", (e) => {
      if (mapsOverlayOpen) return;

      e.preventDefault();

      const { x, y } = pointerPosition(e);
      const worldBefore = screenToWorld(
        x,
        y,
        camera.targetZoom,
        camera.targetX,
        camera.targetY
      );
      const zoomFactor = Math.exp(-e.deltaY * 0.0012);
      const nextZoom = clamp(camera.targetZoom * zoomFactor, D0_ZOOM_MIN, D0_ZOOM_MAX);

      camera.targetZoom = nextZoom;
      camera.targetX = x - worldBefore.x * nextZoom;
      camera.targetY = y - worldBefore.y * nextZoom;
      scheduleSave("mainCanvasWheel");
    }, { passive: false });

    canvas.addEventListener("mousedown", (e) => {
      if (mapsOverlayOpen) return;

      closeEditor(true);
      pointerMoved = false;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);

      if (node) {
        draggedNodeId = node.id;
        const world = screenToWorld(x, y);
        dragOffsetX = world.x - node.x;
        dragOffsetY = world.y - node.y;
        dragStartX = node.x;
        dragStartY = node.y;
      } else {
        panning = true;
        panLastX = x;
        panLastY = y;
        app.style.cursor = "grabbing";
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);

      if (draggedNodeId) {
        pointerMoved = true;
        const world = screenToWorld(x, y);
        const node = getNodeById(draggedNodeId);
        if (!node) return;

        const nextX = world.x - dragOffsetX;
        const nextY = world.y - dragOffsetY;

        node.vx = (nextX - node.x) * 0.32;
        node.vy = (nextY - node.y) * 0.32;
        node.x = nextX;
        node.y = nextY;
        return;
      }

      if (panning) {
        pointerMoved = true;
        const dx = x - panLastX;
        const dy = y - panLastY;

        camera.targetX += dx;
        camera.targetY += dy;
        camera.x += dx;
        camera.y += dy;

        panLastX = x;
        panLastY = y;
        return;
      }

      const hoverNode = getNodeAtScreen(x, y);
      app.style.cursor = hoverNode ? "pointer" : "grab";
    });

    canvas.addEventListener("mouseup", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      const clickedEmpty = !draggedNodeId && !pointerMoved && panning && !node;

      if (draggedNodeId && !pointerMoved && node) {
        selectedNodeId = node.id;
        triggerExpand(node);
      }

      if (clickedEmpty && selectedNodeId !== null) {
        selectedNodeId = null;
      }

      if (draggedNodeId && pointerMoved) {
        const movedNode = getNodeById(draggedNodeId);
        if (movedNode) {
          commitLocalTransaction("moveNode", {
            mapId: activeMapId,
            nodeId: movedNode.id,
            from: { x: dragStartX, y: dragStartY },
            to: { x: movedNode.x, y: movedNode.y }
          }, { syncActiveMap: true });
        }
      } else if (draggedNodeId || pointerMoved || clickedEmpty) {
        commitLocalTransaction("updateViewFrame", createViewFramePayload("mainCanvasMouseup"), { syncActiveMap: true });
      }

      draggedNodeId = null;
      dragStartX = 0;
      dragStartY = 0;
      panning = false;
      app.style.cursor = "grab";
    });

    canvas.addEventListener("mouseleave", () => {
      if (mapsOverlayOpen) return;

      if (draggedNodeId && pointerMoved) {
        const movedNode = getNodeById(draggedNodeId);
        if (movedNode) {
          commitLocalTransaction("moveNode", {
            mapId: activeMapId,
            nodeId: movedNode.id,
            from: { x: dragStartX, y: dragStartY },
            to: { x: movedNode.x, y: movedNode.y }
          }, { syncActiveMap: true });
        }
      } else if (draggedNodeId || panning) {
        commitLocalTransaction("updateViewFrame", createViewFramePayload("mainCanvasMouseleave"), { syncActiveMap: true });
      }
      draggedNodeId = null;
      dragStartX = 0;
      dragStartY = 0;
      panning = false;
      app.style.cursor = "default";
    });

    canvas.addEventListener("dblclick", (e) => {
      if (mapsOverlayOpen) return;

      const { x, y } = pointerPosition(e);
      const node = getNodeAtScreen(x, y);
      if (node) {
        selectedNodeId = node.id;
        triggerExpand(node);
        openEditor(node);
      }
    });

    mapsOverlay.addEventListener("mousemove", (e) => {
      if (!mapsOverlayOpen || isOverlayEntering()) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      if (overlayPanning) {
        const dx = x - overlayPanLastX;
        const dy = y - overlayPanLastY;

        if (dx !== 0 || dy !== 0) {
          overlayPointerMoved = true;
          mapsCamera.targetX -= dx / Math.max(mapsCamera.zoom, 0.0001);
          mapsCamera.targetY -= dy / Math.max(mapsCamera.zoom, 0.0001);
          mapsCamera.x = mapsCamera.targetX;
          mapsCamera.y = mapsCamera.targetY;
        }

        overlayPanLastX = x;
        overlayPanLastY = y;
        return;
      }

      if (draggedOverlayMapId !== null) {
        const world = screenToConstellationWorld(x, y);
        const nextX = world.x - overlayMapDragOffsetX - overlayDraggedMapDriftX;
        const nextY = world.y - overlayMapDragOffsetY - overlayDraggedMapDriftY;

        if (setMapConstellationPosition(draggedOverlayMapId, nextX, nextY)) {
          overlayPointerMoved = true;
        }
      }
    });

    mapsOverlay.addEventListener("wheel", (e) => {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering()) return;

      e.preventDefault();

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      const worldBefore = screenToConstellationWorld(
        x,
        y,
        mapsCamera.targetZoom,
        mapsCamera.targetX,
        mapsCamera.targetY
      );
      const zoomFactor = Math.exp(-e.deltaY * 0.0012);
      const nextZoom = clamp(mapsCamera.targetZoom * zoomFactor, MAPS_ZOOM_MIN, MAPS_ZOOM_MAX);

      mapsCamera.targetZoom = nextZoom;
      mapsCamera.targetX = worldBefore.x - (x - width * 0.5) / nextZoom;
      mapsCamera.targetY = worldBefore.y - (y - height * 0.5) / nextZoom;
      scheduleSave("mapsOverlayWheel");
    }, { passive: false });

    mapsOverlay.addEventListener("mousedown", (e) => {
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || isOverlayEntering()) return;

      const { x, y } = pointerPosition(e, mapsOverlay);
      overlayPointer.x = x;
      overlayPointer.y = y;
      overlayPointer.inside = true;

      if (isOverlayCreating()) {
        return;
      }

      const target = resolveConstellationTarget(x, y);
      if (target) {
        if (target.kind === "map") {
          const world = screenToConstellationWorld(x, y);
          draggedOverlayMapId = target.item.mapId;
          overlayMapDragOffsetX = world.x - (target.item.worldX + target.item.driftX);
          overlayMapDragOffsetY = world.y - (target.item.worldY + target.item.driftY);
          overlayMapDragStartX = target.item.worldX;
          overlayMapDragStartY = target.item.worldY;
          overlayDraggedMapDriftX = target.item.driftX;
          overlayDraggedMapDriftY = target.item.driftY;
          overlayPointerMoved = false;
          mapsOverlay.style.cursor = "grabbing";
        }
        return;
      }

      overlayPanning = true;
      overlayPointerMoved = false;
      overlayPanLastX = x;
      overlayPanLastY = y;
