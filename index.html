<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama Orgánico Sobrio</title>
  <style>
    :root {
      --bg-top: #0f1a22;
      --bg-mid: #0a1218;
      --bg-deep: #060b10;

      --node: rgba(190, 205, 218, 0.92);
      --node-center: rgba(235, 241, 246, 0.98);
      --node-selected: rgba(250, 253, 255, 1);

      --line: rgba(150, 182, 205, 0.16);
      --line-active: rgba(218, 235, 248, 0.42);

      --text: #d7e1e9;

      --tool-bg: rgba(11, 20, 28, 0.42);
      --tool-border: rgba(200, 228, 246, 0.12);
      --tool-bg-hover: rgba(18, 31, 42, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-deep));
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
    }

    canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    .floating-tools {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
    }

    .maps-entry {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 90;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--tool-border);
      background: var(--tool-bg);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(10px);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.02);
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    .tool-btn:hover {
      background: var(--tool-bg-hover);
      transform: scale(1.04);
    }

    .tool-btn:active {
      transform: scale(0.98);
    }

    #scene {
      transition: filter 0.34s ease, transform 0.34s ease, opacity 0.34s ease;
    }

    .constellation-btn {
      position: relative;
      overflow: hidden;
    }

    .constellation-btn::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 32% 35%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 68% 40%, rgba(239, 247, 252, 0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 40% 68%, rgba(239, 247, 252, 0.9) 0 1.6px, transparent 2.2px),
        radial-gradient(circle at 72% 72%, rgba(239, 247, 252, 0.82) 0 1.4px, transparent 2px);
      opacity: 0.92;
    }

    .constellation-btn::after {
      content: "";
      position: absolute;
      inset: 10px 9px;
      border: 1px solid rgba(228, 240, 249, 0.14);
      border-left: none;
      border-bottom: none;
      transform: skewY(6deg) rotate(5deg);
      opacity: 0.5;
    }

    .maps-open #scene {
      filter: blur(11px) saturate(0.54) brightness(0.48);
      transform: scale(1.028);
      opacity: 0.92;
    }

    .maps-open .floating-tools {
      opacity: 0.14;
      filter: blur(4px);
      pointer-events: none;
    }

    .maps-open .constellation-btn {
      background: rgba(18, 31, 42, 0.78);
      border-color: rgba(216, 232, 244, 0.18);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.22),
        0 0 0 1px rgba(210, 228, 240, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .maps-open .editor,
    .maps-open .note-card {
      opacity: 0;
      pointer-events: none;
    }

    .maps-overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      background:
        radial-gradient(circle at 50% 44%, rgba(160, 186, 206, 0.14), rgba(12, 20, 28, 0.12) 24%, rgba(7, 12, 18, 0.58) 58%, rgba(4, 8, 12, 0.82) 100%),
        linear-gradient(180deg, rgba(9, 16, 22, 0.36), rgba(4, 8, 12, 0.74));
    }

    .maps-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .maps-overlay canvas {
      position: absolute;
      inset: 0;
    }

    .maps-label {
      position: absolute;
      z-index: 2;
      display: none;
      min-width: 100px;
      max-width: 220px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(206, 225, 239, 0.1);
      background: rgba(8, 14, 20, 0.7);
      color: #e9f2f8;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 16px));
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    }

    .maps-label.is-visible {
      display: block;
    }

    .maps-center-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 2;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(210, 228, 240, 0.1);
      background: rgba(7, 12, 18, 0.48);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(8px) scale(0.92);
      transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      pointer-events: none;
      cursor: pointer;
    }

    .maps-center-btn.is-visible {
      opacity: 0.82;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .maps-center-btn:hover {
      background: rgba(11, 18, 26, 0.72);
      border-color: rgba(220, 235, 245, 0.16);
    }

    .maps-center-btn::before,
    .maps-center-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      border-radius: 999px;
    }

    .maps-center-btn::before {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(234, 243, 248, 0.56);
    }

    .maps-center-btn::after {
      width: 3px;
      height: 3px;
      background: rgba(244, 249, 252, 0.8);
      box-shadow: 0 0 10px rgba(245, 249, 252, 0.18);
    }

    .maps-confirm {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .maps-confirm.is-visible {
      display: flex;
    }

    .maps-confirm-panel {
      width: min(360px, calc(100vw - 32px));
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(194, 220, 239, 0.13);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.96), rgba(6, 10, 15, 0.9)),
        rgba(8, 14, 20, 0.92);
      box-shadow:
        0 24px 44px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.03);
      text-align: center;
      pointer-events: auto;
      backdrop-filter: blur(18px);
    }

    .maps-confirm-kicker {
      margin: 0 0 10px;
      color: rgba(214, 226, 235, 0.74);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .maps-confirm-name {
      margin: 0 0 10px;
      color: #eff7fb;
      font-size: 16px;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }

    .maps-confirm-copy {
      margin: 0 0 16px;
      color: rgba(196, 211, 221, 0.78);
      font-size: 12px;
      line-height: 1.6;
    }

    .maps-confirm-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .maps-confirm-btn {
      min-width: 112px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(196, 220, 238, 0.12);
      background: rgba(11, 19, 26, 0.72);
      color: #d8e3eb;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    .maps-confirm-btn:hover {
      transform: translateY(-1px);
      background: rgba(17, 29, 39, 0.82);
      border-color: rgba(208, 226, 239, 0.18);
    }

    .maps-confirm-btn:focus-visible {
      outline: none;
      border-color: rgba(220, 235, 245, 0.22);
      box-shadow:
        0 0 0 1px rgba(220, 235, 245, 0.12),
        0 0 0 4px rgba(213, 228, 239, 0.05);
    }

    .maps-confirm-btn.is-danger {
      background: rgba(32, 15, 18, 0.88);
      border-color: rgba(221, 168, 176, 0.18);
      color: rgba(247, 228, 232, 0.92);
    }

    .maps-confirm-btn.is-danger:hover {
      background: rgba(48, 18, 23, 0.92);
      border-color: rgba(236, 182, 191, 0.28);
    }

    .editor {
      position: absolute;
      z-index: 60;
      display: none;
      width: min(360px, calc(100vw - 32px));
    }

    .editor.is-visible {
      display: block;
    }

    .editor-panel,
    .note-card {
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(194, 220, 239, 0.12);
      background:
        linear-gradient(180deg, rgba(12, 19, 27, 0.92), rgba(7, 12, 18, 0.84)),
        rgba(8, 14, 20, 0.9);
      backdrop-filter: blur(18px);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .editor-head,
    .note-card-title {
      margin: 0 0 10px;
      color: rgba(224, 236, 245, 0.9);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .editor input,
    .editor textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(190, 220, 245, 0.12);
      background: rgba(8, 14, 20, 0.82);
      color: var(--text);
      outline: none;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .editor input {
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .editor textarea {
      min-height: 150px;
      max-height: 42vh;
      resize: none;
      white-space: pre-wrap;
    }

    .editor input:focus,
    .editor textarea:focus {
      border-color: rgba(214, 232, 244, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 0 0 1px rgba(215, 233, 244, 0.08);
    }

    .editor input::placeholder,
    .editor textarea::placeholder {
      color: #708393;
    }

    .editor-foot {
      margin-top: 10px;
      color: rgba(160, 178, 191, 0.74);
      font-size: 11px;
      text-align: right;
      letter-spacing: 0.02em;
    }

    .note-card {
      position: absolute;
      z-index: 55;
      display: none;
      width: min(320px, calc(100vw - 32px));
      pointer-events: none;
    }

    .note-card.is-visible {
      display: block;
    }

    .note-card-body {
      max-height: min(220px, 34vh);
      overflow: auto;
      color: rgba(223, 234, 242, 0.88);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      scrollbar-width: thin;
      scrollbar-color: rgba(173, 196, 213, 0.28) transparent;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div class="floating-tools">
      <button id="addNodeBtn" class="tool-btn" title="Agregar nodo">+</button>
      <button id="removeNodeBtn" class="tool-btn" title="Eliminar nodo">−</button>
    </div>

    <div class="maps-entry">
      <button id="openMapsBtn" class="tool-btn constellation-btn" title="Abrir constelacion de mapas" aria-label="Abrir constelacion de mapas"></button>
    </div>

    <div id="mapsOverlay" class="maps-overlay" aria-hidden="true">
      <canvas id="mapsScene"></canvas>
      <div id="mapsLabel" class="maps-label" aria-hidden="true"></div>
      <button id="centerMapsBtn" class="maps-center-btn" type="button" aria-label="Centrar" title="Centrar"></button>
      <div id="mapsConfirm" class="maps-confirm" aria-hidden="true">
        <div id="mapsConfirmPanel" class="maps-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="mapsConfirmName">
          <div class="maps-confirm-kicker">Borrar mapa</div>
          <div id="mapsConfirmName" class="maps-confirm-name"></div>
          <div class="maps-confirm-copy">Esta accion no se puede deshacer.</div>
          <div class="maps-confirm-actions">
            <button id="cancelDeleteMapBtn" class="maps-confirm-btn" type="button">Cancelar</button>
            <button id="confirmDeleteMapBtn" class="maps-confirm-btn is-danger" type="button">Borrar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="editor" class="editor">
      <div class="editor-panel">
        <div class="editor-head">Nodo</div>
        <input id="nodeInput" type="text" maxlength="64" placeholder="Titulo breve" />
        <textarea id="nodeNoteInput" maxlength="1800" placeholder="Desarrolla la idea con mas detalle..."></textarea>
        <div class="editor-foot">Esc cancela. Ctrl+Enter guarda.</div>
      </div>
    </div>

    <div id="noteCard" class="note-card" aria-hidden="true">
      <div id="noteCardTitle" class="note-card-title"></div>
      <div id="noteCardBody" class="note-card-body"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "sobrio-tree-state-v3";
    const LEGACY_MULTI_STORAGE_KEY = "sobrio-tree-state-v2";
    const LEGACY_STORAGE_KEY = "sobrio-tree-state-v1";
    const STORAGE_VERSION = 7;

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const mapsCanvas = document.getElementById("mapsScene");
    const mapsCtx = mapsCanvas.getContext("2d");
    const app = document.getElementById("app");

    const addNodeBtn = document.getElementById("addNodeBtn");
    const removeNodeBtn = document.getElementById("removeNodeBtn");
    const openMapsBtn = document.getElementById("openMapsBtn");
    const mapsOverlay = document.getElementById("mapsOverlay");
    const mapsLabel = document.getElementById("mapsLabel");
    const centerMapsBtn = document.getElementById("centerMapsBtn");
    const mapsConfirm = document.getElementById("mapsConfirm");
    const mapsConfirmPanel = document.getElementById("mapsConfirmPanel");
    const mapsConfirmName = document.getElementById("mapsConfirmName");
    const cancelDeleteMapBtn = document.getElementById("cancelDeleteMapBtn");
    const confirmDeleteMapBtn = document.getElementById("confirmDeleteMapBtn");

    const editor = document.getElementById("editor");
    const nodeInput = document.getElementById("nodeInput");
    const nodeNoteInput = document.getElementById("nodeNoteInput");
    const noteCard = document.getElementById("noteCard");
    const noteCardTitle = document.getElementById("noteCardTitle");
    const noteCardBody = document.getElementById("noteCardBody");

    let width = 0;
    let height = 0;
    let dpr = Math.max(1, window.devicePixelRatio || 1);

    const nodes = [];
    const links = [];
    let maps = [];
    let activeMapId = null;
    let mapIdCounter = 0;

    let nodeIdCounter = 0;
    let selectedNodeId = null;
    let editingNodeId = null;

    let draggedNodeId = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let pointerMoved = false;

    let panning = false;
    let panLastX = 0;
    let panLastY = 0;

    let saveTimeout = null;
    let workspaceLoaded = false;
    let mapsOverlayOpen = false;
    let constellationItems = [];
    let hoveredMapId = null;
    let overlaySelectedMapId = null;
    let pendingDeleteMapId = null;
    let overlayPanning = false;
    let overlayPanLastX = 0;
    let overlayPanLastY = 0;
    let overlayPointerMoved = false;
    let overlaySuppressClick = false;
    let draggedOverlayMapId = null;
    let overlayMapDragOffsetX = 0;
    let overlayMapDragOffsetY = 0;
    let overlayDraggedMapDriftX = 0;
    let overlayDraggedMapDriftY = 0;

    const overlayPointer = {
      x: 0,
      y: 0,
      inside: false
    };

    const camera = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0
    };

    const mapsCamera = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      zoom: 1,
      targetZoom: 1
    };

    const MAPS_ZOOM_MIN = 0.08;
    const MAPS_ZOOM_MAX = 18;
    const STAR_TYPE_WEIGHTS = [
      { type: "yellow", weight: 36 },
      { type: "orange", weight: 28 },
      { type: "red", weight: 22 },
      { type: "blue", weight: 14 }
    ];
    const STAR_RED_GIANT_PROBABILITY = 0.12;
    const STAR_TYPE_PROFILES = {
      blue: {
        coreColor: [118, 162, 255],
        haloColor: [58, 108, 255],
        outlineColor: [199, 221, 255],
        scaleRange: [1.15, 1.42],
        luminosityRange: [1.04, 1.22],
        auraScale: 3.12,
        auraAlpha: 0.17,
        bodyAlpha: 0.64,
        whiteCoreAlpha: 0.96,
        whiteCoreScale: 0.33,
        spikeAlpha: 0.44,
        spikeLength: 4.2,
        outlineAlpha: 0.18,
        pulseScale: 0.016,
        orbitSpeed: 1.08
      },
      yellow: {
        coreColor: [255, 205, 86],
        haloColor: [255, 170, 48],
        outlineColor: [255, 226, 162],
        scaleRange: [0.94, 1.14],
        luminosityRange: [0.98, 1.12],
        auraScale: 2.84,
        auraAlpha: 0.16,
        bodyAlpha: 0.6,
        whiteCoreAlpha: 0.96,
        whiteCoreScale: 0.34,
        spikeAlpha: 0.38,
        spikeLength: 3.6,
        outlineAlpha: 0.16,
        pulseScale: 0.015,
        orbitSpeed: 0.98
      },
      orange: {
        coreColor: [255, 162, 78],
        haloColor: [255, 116, 46],
        outlineColor: [255, 211, 174],
        scaleRange: [0.9, 1.08],
        luminosityRange: [0.94, 1.06],
        auraScale: 2.7,
        auraAlpha: 0.15,
        bodyAlpha: 0.58,
        whiteCoreAlpha: 0.94,
        whiteCoreScale: 0.32,
        spikeAlpha: 0.34,
        spikeLength: 3.35,
        outlineAlpha: 0.145,
        pulseScale: 0.014,
        orbitSpeed: 0.94
      },
      red: {
        coreColor: [255, 108, 93],
        haloColor: [230, 73, 69],
        outlineColor: [255, 204, 195],
        scaleRange: [0.86, 1.06],
        luminosityRange: [0.92, 1.04],
        auraScale: 2.58,
        auraAlpha: 0.145,
        bodyAlpha: 0.55,
        whiteCoreAlpha: 0.92,
        whiteCoreScale: 0.29,
        spikeAlpha: 0.28,
        spikeLength: 3.1,
        outlineAlpha: 0.13,
        pulseScale: 0.013,
        orbitSpeed: 0.88
      }
    };

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.max(1, window.devicePixelRatio || 1);

      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      mapsCanvas.width = width * dpr;
      mapsCanvas.height = height * dpr;
      mapsCanvas.style.width = width + "px";
      mapsCanvas.style.height = height + "px";
      mapsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (!workspaceLoaded) {
        workspaceLoaded = true;
        const restored = loadState();
        if (!restored) {
          const freshMap = createDefaultMapState();
          maps = [freshMap];
          activeMapId = freshMap.id;
          applyMapState(freshMap);
          applyMapsViewState(null);
          updateMapsButton();
          saveState(false);
        }
      }
    }

    function createNode({ x, y, parentId = null, level = 0, isCenter = false, label = "", note = "" }) {
      const id = ++nodeIdCounter;
      const node = {
        id,
        parentId,
        level,
        isCenter,
        label: label || (isCenter ? "Centro" : "Nodo"),
        note: typeof note === "string" ? note : "",

        x,
        y,

        vx: 0,
        vy: 0,

        renderX: x,
        renderY: y,

        baseRadius: isCenter ? 20 : 14,
        visualRadius: isCenter ? 20 : 14,
        targetRadius: isCenter ? 20 : 14,

        pulseUntil: 0,
        labelFloatSeed: Math.random() * Math.PI * 2
      };

      nodes.push(node);

      if (parentId !== null) {
        links.push({
          from: parentId,
          to: id,
          lastEnergy: 0
        });
      }

      return node;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function hash01(seed) {
      const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453123;
      return x - Math.floor(x);
    }

    function rgba(color, alpha) {
      return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    }

    function mixColor(colorA, colorB, amount = 0.5) {
      const t = clamp(amount, 0, 1);
      return [
        Math.round(lerp(colorA[0], colorB[0], t)),
        Math.round(lerp(colorA[1], colorB[1], t)),
        Math.round(lerp(colorA[2], colorB[2], t))
      ];
    }

    function roundValue(value, precision = 3) {
      return Number(value.toFixed(precision));
    }

    function randomInRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function getStarTypeTemplate(starType, starVariant = null) {
      const base = STAR_TYPE_PROFILES[starType] || STAR_TYPE_PROFILES.yellow;
      if (starType !== "red" || starVariant !== "giant") {
        return base;
      }

      return {
        ...base,
        scaleRange: [1.35, 1.85],
        luminosityRange: [1.02, 1.18],
        auraScale: 3.5,
        auraAlpha: 0.18,
        bodyAlpha: 0.6,
        whiteCoreAlpha: 0.9,
        whiteCoreScale: 0.26,
        spikeAlpha: 0.24,
        spikeLength: 4.4,
        outlineAlpha: 0.12,
        pulseScale: 0.011,
        orbitSpeed: 0.72
      };
    }

    function pickWeightedStarType() {
      const totalWeight = STAR_TYPE_WEIGHTS.reduce((sum, entry) => sum + entry.weight, 0);
      let roll = Math.random() * totalWeight;

      for (const entry of STAR_TYPE_WEIGHTS) {
        roll -= entry.weight;
        if (roll <= 0) {
          return entry.type;
        }
      }

      return STAR_TYPE_WEIGHTS[STAR_TYPE_WEIGHTS.length - 1].type;
    }

    function createRandomStarIdentity() {
      const starType = pickWeightedStarType();
      const starVariant = starType === "red" && Math.random() < STAR_RED_GIANT_PROBABILITY
        ? "giant"
        : null;
      const template = getStarTypeTemplate(starType, starVariant);

      return {
        starType,
        starVariant,
        starScale: roundValue(randomInRange(template.scaleRange[0], template.scaleRange[1])),
        starLuminosity: roundValue(randomInRange(template.luminosityRange[0], template.luminosityRange[1]))
      };
    }

    function readStoredStarIdentity(rawMap) {
      const starType = typeof (rawMap && rawMap.starType) === "string"
        ? rawMap.starType
        : null;
      if (!STAR_TYPE_PROFILES[starType]) return null;

      const starVariant = starType === "red" && rawMap && rawMap.starVariant === "giant"
        ? "giant"
        : null;
      const template = getStarTypeTemplate(starType, starVariant);
      const scale = Number(rawMap && rawMap.starScale);
      const luminosity = Number(rawMap && rawMap.starLuminosity);

      if (!Number.isFinite(scale) || !Number.isFinite(luminosity)) {
        return null;
      }

      return {
        starType,
        starVariant,
        starScale: roundValue(clamp(scale, template.scaleRange[0], template.scaleRange[1])),
        starLuminosity: roundValue(clamp(luminosity, template.luminosityRange[0], template.luminosityRange[1]))
      };
    }

    function sanitizeStarIdentity(rawMap) {
      return readStoredStarIdentity(rawMap) || createRandomStarIdentity();
    }

    function getMapStarProfile(map) {
      const identity = sanitizeStarIdentity(map);
      const template = getStarTypeTemplate(identity.starType, identity.starVariant);

      return {
        ...identity,
        ...template
      };
    }

    function allocateMapId() {
      mapIdCounter += 1;
      return mapIdCounter;
    }

    function getMapIndexById(mapId) {
      return maps.findIndex(map => map.id === mapId);
    }

    function getMapById(mapId) {
      const index = getMapIndexById(mapId);
      return index >= 0 ? maps[index] : null;
    }

    function getOrderedMaps() {
      return [...maps].sort((a, b) => a.id - b.id);
    }

    function getActiveMapIndex() {
      return getMapIndexById(activeMapId);
    }

    function getActiveMap() {
      return getMapById(activeMapId);
    }

    function getOverlaySelectedMap() {
      if (!Number.isFinite(overlaySelectedMapId)) return null;
      return getMapById(overlaySelectedMapId);
    }

    function getConstellationFocusMapId() {
      if (!mapsOverlayOpen) return activeMapId;
      const selectedMap = getOverlaySelectedMap();
      return selectedMap ? selectedMap.id : null;
    }

    function getMapCenterNode(map) {
      return map.nodes.find(node => node.isCenter) || map.nodes[0] || null;
    }

    function getDefaultNodeLabel(node) {
      return node && node.isCenter ? "Centro" : "Nodo";
    }

    function getNodeDisplayTitle(node) {
      if (!node) return "";
      const label = typeof node.label === "string" ? node.label.trim() : "";
      return label || getDefaultNodeLabel(node);
    }

    function getMapName(map, fallbackIndex = 0) {
      const centerNode = getMapCenterNode(map);
      return getNodeDisplayTitle(centerNode) || `Mapa ${fallbackIndex + 1}`;
    }

    function createDefaultMapState(mapId = allocateMapId()) {
      let nextNodeId = 0;
      const mapNodes = [];
      const mapLinks = [];
      const starIdentity = createRandomStarIdentity();

      function addMapNode({ x, y, parentId = null, level = 0, isCenter = false, label = "", note = "" }) {
        const id = ++nextNodeId;
        mapNodes.push({
          id,
          parentId,
          level,
          isCenter,
          label: label || (isCenter ? "Centro" : "Nodo"),
          note: typeof note === "string" ? note : "",
          x,
          y
        });

        if (parentId !== null) {
          mapLinks.push({
            from: parentId,
            to: id
          });
        }

        return { id };
      }

      const center = addMapNode({
        x: 0,
        y: 0,
        level: 0,
        isCenter: true,
        label: "Centro"
      });

      const count = 4;
      const radius = 160;

      for (let i = 0; i < count; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i / count);
        addMapNode({
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          parentId: center.id,
          level: 1,
          label: "Nodo"
        });
      }

      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter: nextNodeId,
        selectedNodeId: center.id,
        constellationPosition: null,
        camera: {
          x: width / 2,
          y: height / 2,
          targetX: width / 2,
          targetY: height / 2
        },
        nodes: mapNodes,
        links: mapLinks
      };
    }

    function sanitizeStoredMap(rawMap, fallbackId) {
      const rawNodes = Array.isArray(rawMap && rawMap.nodes) ? rawMap.nodes : [];
      const rawLinks = Array.isArray(rawMap && rawMap.links) ? rawMap.links : [];
      const mapId = Number.isFinite(rawMap && rawMap.id) ? rawMap.id : fallbackId;

      const validNodeIds = new Set();
      const sanitizedNodes = [];
      let maxNodeId = 0;

      for (const rawNode of rawNodes) {
        if (!rawNode) continue;

        const nodeId = Number.isFinite(rawNode.id) ? rawNode.id : maxNodeId + 1;
        maxNodeId = Math.max(maxNodeId, nodeId);
        validNodeIds.add(nodeId);

        sanitizedNodes.push({
          id: nodeId,
          parentId: rawNode.parentId ?? null,
          level: rawNode.level ?? 0,
          isCenter: Boolean(rawNode.isCenter),
          label: rawNode.label || (rawNode.isCenter ? "Centro" : "Nodo"),
          note: typeof rawNode.note === "string" ? rawNode.note : "",
          x: rawNode.x ?? 0,
          y: rawNode.y ?? 0
        });
      }

      for (const node of sanitizedNodes) {
        if (node.parentId !== null && !validNodeIds.has(node.parentId)) {
          node.parentId = null;
        }
      }

      const sanitizedLinks = [];
      for (const rawLink of rawLinks) {
        if (!rawLink) continue;

        if (validNodeIds.has(rawLink.from) && validNodeIds.has(rawLink.to)) {
          sanitizedLinks.push({
            from: rawLink.from,
            to: rawLink.to
          });
        }
      }

      if (!sanitizedNodes.length) {
        return createDefaultMapState(mapId);
      }

      const starIdentity = sanitizeStarIdentity(rawMap);

      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter: Math.max(rawMap && rawMap.nodeIdCounter ? rawMap.nodeIdCounter : 0, maxNodeId),
        selectedNodeId: validNodeIds.has(rawMap && rawMap.selectedNodeId)
          ? rawMap.selectedNodeId
          : sanitizedNodes[0].id,
        constellationPosition: sanitizeConstellationPosition(rawMap && rawMap.constellationPosition),
        camera: {
          x: rawMap && rawMap.camera ? rawMap.camera.x ?? width / 2 : width / 2,
          y: rawMap && rawMap.camera ? rawMap.camera.y ?? height / 2 : height / 2,
          targetX: rawMap && rawMap.camera ? rawMap.camera.targetX ?? (rawMap.camera.x ?? width / 2) : width / 2,
          targetY: rawMap && rawMap.camera ? rawMap.camera.targetY ?? (rawMap.camera.y ?? height / 2) : height / 2
        },
        nodes: sanitizedNodes,
        links: sanitizedLinks
      };
    }

    function serializeCurrentMap(mapId = activeMapId) {
      const existingMap = getMapById(mapId);
      const starIdentity = sanitizeStarIdentity(existingMap);
      return {
        id: mapId,
        starType: starIdentity.starType,
        starVariant: starIdentity.starVariant,
        starScale: starIdentity.starScale,
        starLuminosity: starIdentity.starLuminosity,
        nodeIdCounter,
        selectedNodeId,
        constellationPosition: cloneConstellationPosition(existingMap && existingMap.constellationPosition),
        camera: {
          x: camera.x,
          y: camera.y,
          targetX: camera.targetX,
          targetY: camera.targetY
        },
        nodes: nodes.map(node => ({
          id: node.id,
          parentId: node.parentId,
          level: node.level,
          isCenter: node.isCenter,
          label: node.label,
          note: node.note,
          x: node.x,
          y: node.y
        })),
        links: links.map(link => ({
          from: link.from,
          to: link.to
        }))
      };
    }

    function syncActiveMapInMemory() {
      const index = getActiveMapIndex();
      if (index < 0) return;
      maps[index] = serializeCurrentMap(activeMapId);
    }

    function sanitizeConstellationPosition(rawPosition) {
      if (!rawPosition) return null;
      const x = Number(rawPosition.x);
      const y = Number(rawPosition.y);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
      return { x, y };
    }

    function cloneConstellationPosition(position) {
      const sanitized = sanitizeConstellationPosition(position);
      return sanitized ? { x: sanitized.x, y: sanitized.y } : null;
    }

    function sanitizeMapsViewState(rawView) {
      if (!rawView) return null;

      const x = Number(rawView.x);
      const y = Number(rawView.y);
      const zoom = clamp(Number(rawView.zoom), MAPS_ZOOM_MIN, MAPS_ZOOM_MAX);
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(zoom)) return null;

      const targetX = Number.isFinite(rawView.targetX) ? rawView.targetX : x;
      const targetY = Number.isFinite(rawView.targetY) ? rawView.targetY : y;
      const targetZoom = Number.isFinite(rawView.targetZoom)
        ? clamp(rawView.targetZoom, MAPS_ZOOM_MIN, MAPS_ZOOM_MAX)
        : zoom;

      return {
        x,
        y,
        targetX,
        targetY,
        zoom,
        targetZoom
      };
    }

    function setMapConstellationPosition(mapId, x, y) {
      const map = getMapById(mapId);
      if (!map || !Number.isFinite(x) || !Number.isFinite(y)) return false;
      map.constellationPosition = { x, y };
      return true;
    }

    function applyMapState(state) {
      nodes.length = 0;
      links.length = 0;

      activeMapId = state.id;
      nodeIdCounter = state.nodeIdCounter ?? 0;
      selectedNodeId = state.selectedNodeId ?? null;
      editingNodeId = null;
      draggedNodeId = null;
      panning = false;
      pointerMoved = false;

      app.style.cursor = mapsOverlayOpen ? "default" : "grab";
      editor.style.display = "none";
      editor.classList.remove("is-visible");
      nodeInput.value = "";
      nodeNoteInput.value = "";
      hideNoteCard();

      const nextCamera = state.camera || {};
      camera.x = nextCamera.x ?? width / 2;
      camera.y = nextCamera.y ?? height / 2;
      camera.targetX = nextCamera.targetX ?? camera.x;
      camera.targetY = nextCamera.targetY ?? camera.y;

      for (const savedNode of state.nodes || []) {
        nodes.push({
          id: savedNode.id,
          parentId: savedNode.parentId ?? null,
          level: savedNode.level ?? 0,
          isCenter: Boolean(savedNode.isCenter),
          label: savedNode.label || (savedNode.isCenter ? "Centro" : "Nodo"),
          note: typeof savedNode.note === "string" ? savedNode.note : "",

          x: savedNode.x ?? 0,
          y: savedNode.y ?? 0,

          vx: 0,
          vy: 0,

          renderX: savedNode.x ?? 0,
          renderY: savedNode.y ?? 0,

          baseRadius: savedNode.isCenter ? 20 : 14,
          visualRadius: savedNode.isCenter ? 20 : 14,
          targetRadius: savedNode.isCenter ? 20 : 14,

          pulseUntil: 0,
          labelFloatSeed: Math.random() * Math.PI * 2
        });
      }

      for (const savedLink of state.links || []) {
        if (getNodeById(savedLink.from) && getNodeById(savedLink.to)) {
          links.push({
            from: savedLink.from,
            to: savedLink.to,
            lastEnergy: 0
          });
        }
      }

      if (!nodes.length) {
        const replacement = createDefaultMapState(state.id);
        const index = getMapIndexById(state.id);
        if (index >= 0) maps[index] = replacement;
        applyMapState(replacement);
        return;
      }

      if (!getNodeById(selectedNodeId)) {
        selectedNodeId = nodes[0].id;
      }
    }

    function updateMapsButton() {
      const totalMaps = Math.max(1, maps.length);
      const title = mapsOverlayOpen
        ? `Cerrar constelacion de mapas (${totalMaps})`
        : `Abrir constelacion de mapas (${totalMaps})`;

      openMapsBtn.title = title;
      openMapsBtn.setAttribute("aria-label", title);
      openMapsBtn.classList.toggle("is-active", mapsOverlayOpen);
    }

    function flushPendingSave() {
      if (saveTimeout !== null) {
        clearTimeout(saveTimeout);
        saveTimeout = null;
      }
    }

    function clearMapsLabel() {
      mapsLabel.textContent = "";
      mapsLabel.style.color = "";
      mapsLabel.style.textShadow = "";
      mapsLabel.classList.remove("is-visible");
    }

    function closeDeleteConfirmation() {
      pendingDeleteMapId = null;
      mapsConfirm.classList.remove("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "true");
    }

    function openDeleteConfirmation(mapId) {
      if (maps.length <= 1) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      const orderedMaps = getOrderedMaps();
      const fallbackIndex = orderedMaps.findIndex(candidate => candidate.id === map.id);

      pendingDeleteMapId = mapId;
      mapsConfirmName.textContent = trimText(getMapName(map, Math.max(0, fallbackIndex)), 40);
      mapsConfirm.classList.add("is-visible");
      mapsConfirm.setAttribute("aria-hidden", "false");
      clearMapsLabel();
      cancelDeleteMapBtn.focus();
      return true;
    }

    function getNextMapIdAfterDelete(mapId) {
      const remainingIds = getOrderedMaps()
        .map(map => map.id)
        .filter(existingId => existingId !== mapId);

      if (!remainingIds.length) return null;

      const nextGreater = remainingIds.find(existingId => existingId > mapId);
      return nextGreater ?? remainingIds[0];
    }

    function deleteMapById(mapId) {
      if (maps.length <= 1) return false;

      const map = getMapById(mapId);
      if (!map) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const nextActiveId = mapId === activeMapId
        ? getNextMapIdAfterDelete(mapId)
        : activeMapId;
      const nextSelectedId = overlaySelectedMapId === mapId
        ? (mapId === activeMapId ? nextActiveId : null)
        : overlaySelectedMapId;

      maps = maps.filter(existingMap => existingMap.id !== mapId);
      hoveredMapId = null;
      overlaySelectedMapId = nextSelectedId;
      closeDeleteConfirmation();

      if (mapId === activeMapId && nextActiveId !== null) {
        const nextMap = getMapById(nextActiveId);
        if (nextMap) {
          applyMapState(nextMap);
          centerMapsCameraOnActive(false);
        }
      }

      saveState(false);
      updateMapsButton();
      return true;
    }

    function closeMapsOverlay() {
      if (!mapsOverlayOpen) return;

      settleMapsCamera();
      mapsOverlayOpen = false;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      overlaySelectedMapId = null;
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      draggedNodeId = null;
      panning = false;

      closeDeleteConfirmation();
      clearMapsLabel();
      hideNoteCard();
      centerMapsBtn.classList.remove("is-visible");
      mapsOverlay.classList.remove("is-open");
      mapsOverlay.setAttribute("aria-hidden", "true");
      app.classList.remove("maps-open");
      mapsCtx.clearRect(0, 0, width, height);
      app.style.cursor = "grab";
      updateMapsButton();
      saveState(false);
    }

    function openMapsOverlay() {
      if (!maps.length) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();
      draggedNodeId = null;
      panning = false;

      mapsOverlayOpen = true;
      overlayPointer.inside = false;
      constellationItems = [];
      hoveredMapId = null;
      overlaySelectedMapId = activeMapId;
      overlayPanning = false;
      overlayPointerMoved = false;
      overlaySuppressClick = false;
      draggedOverlayMapId = null;
      overlayMapDragOffsetX = 0;
      overlayMapDragOffsetY = 0;
      overlayDraggedMapDriftX = 0;
      overlayDraggedMapDriftY = 0;
      settleMapsCamera();
      closeDeleteConfirmation();
      hideNoteCard();

      mapsOverlay.classList.add("is-open");
      mapsOverlay.setAttribute("aria-hidden", "false");
      app.classList.add("maps-open");
      app.style.cursor = "default";
      updateMapsButton();
      updateMapsCenterButton();
    }

    function toggleMapsOverlay() {
      if (mapsOverlayOpen) closeMapsOverlay();
      else openMapsOverlay();
    }

    function switchMapById(mapId) {
      if (mapId === activeMapId) {
        closeMapsOverlay();
        return;
      }

      const nextMap = getMapById(mapId);
      if (!nextMap) return;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      applyMapState(nextMap);
      saveState(false);
      closeMapsOverlay();
    }

    function createNewMap() {
      const confirmed = window.confirm(
        "Se va a crear un mapa mental nuevo y vacio.\n\nTu mapa actual se guardara y podras volver a el desde la constelacion.\n\nQuieres continuar?"
      );
      if (!confirmed) return false;

      closeEditor(true);
      flushPendingSave();
      syncActiveMapInMemory();

      const freshMap = createDefaultMapState();
      freshMap.constellationPosition = findConstellationSpawnWorldPoint(freshMap);
      maps.push(freshMap);
      overlaySelectedMapId = freshMap.id;
      hoveredMapId = null;
      saveState(false);
      updateMapsButton();
      updateMapsCenterButton();
      return true;
    }

    function getNodeById(id) {
      return nodes.find(n => n.id === id);
    }

    function getChildren(parentId) {
      return nodes.filter(n => n.parentId === parentId);
    }

    function getDescendants(nodeId) {
      const result = [];
      const stack = [nodeId];

      while (stack.length) {
        const current = stack.pop();
        const children = nodes.filter(n => n.parentId === current);
        for (const child of children) {
          result.push(child.id);
          stack.push(child.id);
        }
      }

      return result;
    }

    function addChildNode() {
      const parent = getNodeById(selectedNodeId);
      if (!parent) return;

      const siblings = getChildren(parent.id);
      const count = siblings.length;
      const distance = Math.max(110, 142 - parent.level * 8);

      let angle;
      if (parent.isCenter) {
        angle = -Math.PI / 2 + count * 0.92;
      } else {
        const parentOfParent = parent.parentId !== null ? getNodeById(parent.parentId) : null;
        const baseAngle = parentOfParent
          ? Math.atan2(parent.y - parentOfParent.y, parent.x - parentOfParent.x)
          : -Math.PI / 2;
        angle = baseAngle + (-0.75 + count * 0.45);
      }

      const child = createNode({
        x: parent.x + Math.cos(angle) * distance,
        y: parent.y + Math.sin(angle) * distance,
        parentId: parent.id,
        level: parent.level + 1,
        label: "Nuevo"
      });

      selectedNodeId = child.id;
      triggerExpand(child);
      scheduleSave();
    }

    function removeSelectedNode() {
      const node = getNodeById(selectedNodeId);
      if (!node || node.isCenter) return;

      const descendants = getDescendants(node.id);
      const idsToDelete = new Set([node.id, ...descendants]);

      for (let i = nodes.length - 1; i >= 0; i--) {
        if (idsToDelete.has(nodes[i].id)) nodes.splice(i, 1);
      }

      for (let i = links.length - 1; i >= 0; i--) {
        if (idsToDelete.has(links[i].from) || idsToDelete.has(links[i].to)) {
          links.splice(i, 1);
        }
      }

      if (editingNodeId && idsToDelete.has(editingNodeId)) closeEditor(false);

      const fallback = node.parentId ? getNodeById(node.parentId) : nodes[0];
      selectedNodeId = fallback ? fallback.id : null;
      scheduleSave();
    }

    function triggerExpand(node) {
      node.pulseUntil = performance.now() + 320;
    }

    function pointerPosition(e, targetElement = canvas) {
      const rect = targetElement.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function screenToWorld(x, y) {
      return {
        x: x - camera.x,
        y: y - camera.y
      };
    }

    function getNodeAtScreen(x, y) {
      for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        const sx = n.renderX + camera.x;
        const sy = n.renderY + camera.y;
        const dx = x - sx;
        const dy = y - sy;
        const hitRadius = Math.max(18, n.visualRadius + 10);
        if (dx * dx + dy * dy <= hitRadius * hitRadius) return n;
      }
      return null;
    }

    function trimText(text, max) {
      return text.length > max ? text.slice(0, max - 3) + "..." : text;
    }

    function wrap(value, size) {
      if (!size) return 0;
      return ((value % size) + size) % size;
    }

    function getNodeNote(node) {
      return node && typeof node.note === "string" ? node.note.trim() : "";
    }

    function hideNoteCard() {
      noteCard.classList.remove("is-visible");
      noteCard.setAttribute("aria-hidden", "true");
    }

    function positionFloatingPanel(element, anchorX, anchorY, xOffset = 32) {
      const margin = 16;
      const rect = element.getBoundingClientRect();
      let left = anchorX + xOffset;

      if (left + rect.width > width - margin) {
        left = anchorX - rect.width - xOffset;
      }

      left = clamp(left, margin, Math.max(margin, width - rect.width - margin));

      let top = anchorY - rect.height * 0.34;
      top = clamp(top, margin, Math.max(margin, height - rect.height - margin));

      element.style.left = `${left}px`;
      element.style.top = `${top}px`;
    }

    function updateSelectedNoteCard() {
      if (mapsOverlayOpen || editingNodeId) {
        hideNoteCard();
        return;
      }

      const node = getNodeById(selectedNodeId);
      const note = getNodeNote(node);
      if (!node || !note) {
        hideNoteCard();
        return;
      }

      const title = trimText(getNodeDisplayTitle(node), 44);
      if (noteCardTitle.textContent !== title) {
        noteCardTitle.textContent = title;
      }
      if (noteCardBody.textContent !== note) {
        noteCardBody.textContent = note;
        noteCardBody.scrollTop = 0;
      }
      if (!noteCard.classList.contains("is-visible")) {
        noteCard.classList.add("is-visible");
        noteCard.setAttribute("aria-hidden", "false");
      }

      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      positionFloatingPanel(noteCard, x, y, 28);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function length(x, y) {
      return Math.hypot(x, y) || 1;
    }

    function normalize(x, y) {
      const len = length(x, y);
      return { x: x / len, y: y / len, len };
    }

    function updateNodes() {
      camera.x += (camera.targetX - camera.x) * 0.12;
      camera.y += (camera.targetY - camera.y) * 0.12;

      for (const node of nodes) {
        const pulsing = performance.now() < node.pulseUntil;
        node.targetRadius = node.baseRadius * (pulsing ? 1.48 : (node.id === selectedNodeId ? 1.18 : 1));
        node.visualRadius += (node.targetRadius - node.visualRadius) * 0.15;

        node.x += node.vx;
        node.y += node.vy;

        node.vx *= 0.86;
        node.vy *= 0.86;

        if (Math.abs(node.vx) < 0.002) node.vx = 0;
        if (Math.abs(node.vy) < 0.002) node.vy = 0;

        node.renderX = node.x;
        node.renderY = node.y;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "rgba(15, 26, 34, 1)");
      sky.addColorStop(0.50, "rgba(10, 18, 24, 1)");
      sky.addColorStop(1, "rgba(6, 11, 16, 1)");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      drawLiminalField();
      drawPlanes();
      drawAmbientGlow();
      drawDust();
    }

    function drawLiminalField() {
      const gridSize = 260;
      const startX = -((camera.x * 0.22) % gridSize) - gridSize;
      const startY = -((camera.y * 0.14) % gridSize) - gridSize;

      ctx.strokeStyle = "rgba(190, 214, 230, 0.028)";
      ctx.lineWidth = 1;

      for (let x = startX; x < width + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, -gridSize);
        ctx.lineTo(x, height + gridSize);
        ctx.stroke();
      }

      for (let y = startY; y < height + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(-gridSize, y);
        ctx.lineTo(width + gridSize, y);
        ctx.stroke();
      }
    }

    function drawPlanes() {
      const layers = [
        { y: height * 0.30, amp: 18, px: 0.10, py: 0.06, alpha: 0.055 },
        { y: height * 0.48, amp: 24, px: 0.18, py: 0.09, alpha: 0.045 },
        { y: height * 0.68, amp: 30, px: 0.28, py: 0.12, alpha: 0.038 }
      ];

      for (const layer of layers) {
        ctx.beginPath();

        for (let sx = -80; sx <= width + 80; sx += 18) {
          const wx = sx - camera.x * layer.px;
          const wy = camera.y * layer.py;

          const y =
            layer.y +
            Math.sin(wx * 0.0035 + 1.2) * layer.amp +
            Math.sin(wx * 0.008 + wy * 0.002) * layer.amp * 0.32;

          if (sx === -80) ctx.moveTo(sx, y);
          else ctx.lineTo(sx, y);
        }

        ctx.lineTo(width + 80, height + 100);
        ctx.lineTo(-80, height + 100);
        ctx.closePath();

        const g = ctx.createLinearGradient(0, layer.y - 50, 0, height);
        g.addColorStop(0, `rgba(175, 198, 212, ${layer.alpha})`);
        g.addColorStop(1, "rgba(10, 18, 24, 0)");
        ctx.fillStyle = g;
        ctx.fill();
      }
    }

    function drawAmbientGlow() {
      const gx = width * 0.52 - camera.x * 0.08;
      const gy = height * 0.42 - camera.y * 0.04;
      const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(width, height) * 0.55);
      g.addColorStop(0, "rgba(155, 180, 195, 0.08)");
      g.addColorStop(0.55, "rgba(95, 120, 138, 0.025)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);
    }

    function drawDust() {
      for (let i = 0; i < 32; i++) {
        const x = ((((i * 173.3) - camera.x * (0.06 + (i % 4) * 0.01)) % (width + 180)) + (width + 180)) % (width + 180) - 90;
        const y = ((((i * 91.7) - camera.y * (0.04 + (i % 3) * 0.01)) % (height + 140)) + (height + 140)) % (height + 140) - 70;
        const r = 0.7 + (i % 3) * 0.28;

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(205, 224, 236, ${0.022 + (i % 4) * 0.008})`;
        ctx.fill();
      }
    }

    function organicPointOnLink(a, b, t) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const tangent = normalize(dx, dy);
      const normal = normalize(-dy, dx);
      const dist = tangent.len;

      const baseX = lerp(a.x, b.x, t);
      const baseY = lerp(a.y, b.y, t);

      const envelope = Math.pow(Math.sin(Math.PI * t), 1.2);

      const normalVelA = a.vx * normal.x + a.vy * normal.y;
      const normalVelB = b.vx * normal.x + b.vy * normal.y;
      const tangVelA = a.vx * tangent.x + a.vy * tangent.y;
      const tangVelB = b.vx * tangent.x + b.vy * tangent.y;

      const normalEnergy = lerp(normalVelA, normalVelB, t);
      const tangEnergy = lerp(tangVelA, tangVelB, t);

      const offsetNormal = normalEnergy * envelope * Math.min(18, dist * 0.08);
      const offsetTang = tangEnergy * envelope * Math.min(6, dist * 0.02);

      return {
        x: baseX + normal.x * offsetNormal + tangent.x * offsetTang,
        y: baseY + normal.y * offsetNormal + tangent.y * offsetTang
      };
    }

    function drawLinks() {
      for (const link of links) {
        const aNode = getNodeById(link.from);
        const bNode = getNodeById(link.to);
        if (!aNode || !bNode) continue;

        const a = { x: aNode.renderX + camera.x, y: aNode.renderY + camera.y, vx: aNode.vx, vy: aNode.vy };
        const b = { x: bNode.renderX + camera.x, y: bNode.renderY + camera.y, vx: bNode.vx, vy: bNode.vy };

        const active = aNode.id === selectedNodeId || bNode.id === selectedNodeId;

        const totalEnergy =
          Math.abs(a.vx) + Math.abs(a.vy) + Math.abs(b.vx) + Math.abs(b.vy);

        link.lastEnergy = link.lastEnergy * 0.85 + totalEnergy * 0.15;

        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const segments = Math.max(18, Math.min(42, Math.floor(dist / 10)));

        const points = [];
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          points.push(organicPointOnLink(a, b, t));
        }

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
        ctx.strokeStyle = active ? "rgba(218, 235, 248, 0.42)" : "rgba(150, 182, 205, 0.16)";
        ctx.lineWidth = active ? 1.55 : 1.1;
        ctx.stroke();

        if (link.lastEnergy > 0.02 && active) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length - 1; i++) {
            const mx = (points[i].x + points[i + 1].x) * 0.5;
            const my = (points[i].y + points[i + 1].y) * 0.5;
            ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
          }
          ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
          ctx.strokeStyle = "rgba(235, 245, 252, 0.05)";
          ctx.lineWidth = 4;
          ctx.stroke();
        }
      }
    }

    function drawNode(node, time) {
      const x = node.renderX + camera.x;
      const y = node.renderY + camera.y;
      const selected = node.id === selectedNodeId;
      const displayLabel = getNodeDisplayTitle(node);

      if (selected) {
        const aura = 12 + Math.sin(time * 0.004 + node.labelFloatSeed) * 1.5;
        ctx.beginPath();
        ctx.arc(x, y, node.visualRadius + aura, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(220, 234, 246, 0.08)";
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(x, y, node.visualRadius, 0, Math.PI * 2);
      ctx.fillStyle = node.isCenter
        ? "rgba(235, 241, 246, 0.98)"
        : selected
          ? "rgba(250, 253, 255, 1)"
          : "rgba(190, 205, 218, 0.92)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, node.visualRadius + 2.4, 0, Math.PI * 2);
      ctx.strokeStyle = selected
        ? "rgba(240, 247, 252, 0.22)"
        : "rgba(210, 226, 239, 0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();

      const labelYOffset = node.visualRadius + 18 + Math.sin(time * 0.002 + node.labelFloatSeed) * 1.2;
      ctx.fillStyle = selected ? "#f3f8fc" : "#c7d2dc";
      ctx.font = `${selected ? 13 : 12}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(trimText(displayLabel, selected ? 22 : 18), x, y + labelYOffset);
    }

    function summarizeMap(map, fallbackIndex = 0) {
      const centerNode = getMapCenterNode(map);
      const nodeCount = Math.max(1, map.nodes.length);
      const branchCount = centerNode
        ? map.nodes.filter(node => node.parentId === centerNode.id).length
        : 0;

      return {
        name: getMapName(map, fallbackIndex),
        nodeCount,
        branchCount,
        satelliteCount: clamp(branchCount || Math.ceil(Math.sqrt(nodeCount)), 2, 8),
        visualRadius: clamp(14 + Math.sqrt(nodeCount) * 2.2 + branchCount * 0.75, 17, 32),
        seed: map.id * 0.61803398875
      };
    }

    function getConstellationItemAt(x, y) {
      for (let i = constellationItems.length - 1; i >= 0; i--) {
        const item = constellationItems[i];
        const dx = x - item.x;
        const dy = y - item.y;
        if (dx * dx + dy * dy <= item.hitRadius * item.hitRadius) {
          return item;
        }
      }
      return null;
    }

    function pointInCircle(x, y, cx, cy, radius) {
      const dx = x - cx;
      const dy = y - cy;
      return dx * dx + dy * dy <= radius * radius;
    }

    function getConstellationDeleteControl(item) {
      if (!item || item.kind !== "map" || maps.length <= 1) return null;

      const baseAngle = (-Math.PI / 4) + Math.sin(item.summary.seed * 7.4) * 0.12;

      const radius = clamp(item.radius * 0.34, 8, 10.5);
      const distance = item.radius + radius + 7;

      return {
        x: item.x + Math.cos(baseAngle) * distance,
        y: item.y + Math.sin(baseAngle) * distance,
        radius,
        hitRadius: radius + 7
      };
    }

    function getConstellationPlaneMetrics(totalMaps) {
      const planeWidth = Math.max(width * 1.5, 420 + Math.max(0, totalMaps - 1) * 280);
      const planeHeight = Math.max(height * 1.35, 900);
      const padX = Math.max(160, Math.min(300, planeWidth * 0.12));
      const laneOffsets = [
        -planeHeight * 0.24,
        0,
        planeHeight * 0.24
      ];

      return {
        planeWidth,
        planeHeight,
        padX,
        laneOffsets
      };
    }

    function getFallbackConstellationMapWorldPoint(map, index, totalMaps) {
      const metrics = getConstellationPlaneMetrics(totalMaps);
      const progress = totalMaps <= 1 ? 0.5 : index / (totalMaps - 1);
      const laneIndex = Math.min(
        metrics.laneOffsets.length - 1,
        Math.floor(hash01(map.id * 4.7) * metrics.laneOffsets.length)
      );
      const spread = totalMaps <= 1
        ? 0
        : (hash01(map.id * 8.4) - 0.5) * Math.min((metrics.planeWidth - metrics.padX * 2) / totalMaps, 120);

      return {
        x: (-metrics.planeWidth * 0.5) + metrics.padX + ((metrics.planeWidth - metrics.padX * 2) * progress) + spread,
        y: metrics.laneOffsets[laneIndex] + (hash01(map.id * 5.9) - 0.5) * Math.min(metrics.planeHeight * 0.15, 110)
      };
    }

    function getConstellationMapWorldPoint(map, index, totalMaps) {
      return cloneConstellationPosition(map && map.constellationPosition)
        || getFallbackConstellationMapWorldPoint(map, index, totalMaps);
    }

    function getConstellationScreenRadiusForMap(map, fallbackIndex = 0, zoom = mapsCamera.zoom) {
      const summary = summarizeMap(map, fallbackIndex);
      const star = getMapStarProfile(map);
      return clamp(
        summary.visualRadius * star.starScale * getConstellationVisualScale(zoom),
        14,
        star.starVariant === "giant" ? 78 : 58
      );
    }

    function findConstellationSpawnScreenPoint(map) {
      const candidateRadius = getConstellationScreenRadiusForMap(map, maps.length, mapsCamera.zoom);
      const occupiedItems = constellationItems.filter(item => item.kind === "map" || item.kind === "new");
      const margin = candidateRadius + 36;
      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const seedAngle = hash01(map.id * 13.7 + maps.length * 1.91) * Math.PI * 2;
      const baseRadius = Math.max(candidateRadius * 3.2, Math.min(width, height) * 0.18);
      const ringStep = Math.max(candidateRadius * 2.2, Math.min(width, height) * 0.13);
      let bestCandidate = {
        x: clamp(centerX + Math.cos(seedAngle) * baseRadius, margin, width - margin),
        y: clamp(centerY + Math.sin(seedAngle) * baseRadius * 0.82, margin, height - margin)
      };
      let bestScore = -Infinity;

      for (let ring = 0; ring < 7; ring++) {
        const ringRadius = baseRadius + ringStep * ring;
        const steps = 10 + ring * 6;

        for (let step = 0; step < steps; step++) {
          const angle = seedAngle + (step / steps) * Math.PI * 2 + ring * 0.24;
          const candidateX = clamp(centerX + Math.cos(angle) * ringRadius, margin, width - margin);
          const candidateY = clamp(centerY + Math.sin(angle) * ringRadius * 0.82, margin, height - margin);
          let clearance = Infinity;

          for (const item of occupiedItems) {
            const dx = candidateX - item.x;
            const dy = candidateY - item.y;
            const itemRadius = item.kind === "map"
              ? item.hitRadius
              : item.hitRadius + 12;
            const gap = Math.hypot(dx, dy) - (itemRadius + candidateRadius + 24);
            clearance = Math.min(clearance, gap);
          }

          if (!occupiedItems.length) {
            clearance = Infinity;
          }

          const distanceFromCenter = Math.hypot(candidateX - centerX, candidateY - centerY);
          const score = clearance - distanceFromCenter * 0.04;

          if (clearance > 18) {
            return {
              x: candidateX,
              y: candidateY
            };
          }

          if (score > bestScore) {
            bestScore = score;
            bestCandidate = {
              x: candidateX,
              y: candidateY
            };
          }
        }
      }

      return bestCandidate;
    }

    function findConstellationSpawnWorldPoint(map) {
      const screenPoint = findConstellationSpawnScreenPoint(map);
      return screenToConstellationWorld(
        screenPoint.x,
        screenPoint.y,
        mapsCamera.zoom,
        mapsCamera.x,
        mapsCamera.y
      );
    }

    function getDefaultMapsViewState() {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) {
        return {
          x: 0,
          y: 0,
          targetX: 0,
          targetY: 0,
          zoom: 1,
          targetZoom: 1
        };
      }

      const activeIndex = Math.max(0, orderedMaps.findIndex(map => map.id === activeMapId));
      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);

      return {
        x: point.x,
        y: point.y,
        targetX: point.x,
        targetY: point.y,
        zoom: 1,
        targetZoom: 1
      };
    }

    function applyMapsViewState(viewState) {
      const nextView = sanitizeMapsViewState(viewState) || getDefaultMapsViewState();
      mapsCamera.x = nextView.x;
      mapsCamera.y = nextView.y;
      mapsCamera.targetX = nextView.targetX;
      mapsCamera.targetY = nextView.targetY;
      mapsCamera.zoom = nextView.zoom;
      mapsCamera.targetZoom = nextView.targetZoom;
    }

    function captureMapsViewState() {
      const x = Number.isFinite(mapsCamera.targetX) ? mapsCamera.targetX : mapsCamera.x;
      const y = Number.isFinite(mapsCamera.targetY) ? mapsCamera.targetY : mapsCamera.y;
      const zoom = clamp(
        Number.isFinite(mapsCamera.targetZoom) ? mapsCamera.targetZoom : mapsCamera.zoom,
        MAPS_ZOOM_MIN,
        MAPS_ZOOM_MAX
      );

      return {
        x,
        y,
        targetX: x,
        targetY: y,
        zoom,
        targetZoom: zoom
      };
    }

    function settleMapsCamera() {
      const settledView = captureMapsViewState();
      applyMapsViewState(settledView);
    }

    function projectConstellationPoint(worldX, worldY) {
      return {
        x: (width * 0.5) + (worldX - mapsCamera.x) * mapsCamera.zoom,
        y: (height * 0.5) + (worldY - mapsCamera.y) * mapsCamera.zoom
      };
    }

    function screenToConstellationWorld(
      screenX,
      screenY,
      zoom = mapsCamera.zoom,
      cameraX = mapsCamera.x,
      cameraY = mapsCamera.y
    ) {
      const safeZoom = Math.max(zoom, 0.0001);
      return {
        x: cameraX + (screenX - width * 0.5) / safeZoom,
        y: cameraY + (screenY - height * 0.5) / safeZoom
      };
    }

    function getConstellationVisualScale(zoom = mapsCamera.zoom) {
      return clamp(Math.pow(Math.max(zoom, 0.0001), 0.58), 0.56, 2.05);
    }

    function centerMapsCameraOnActive(snap = false) {
      const orderedMaps = getOrderedMaps();
      if (!orderedMaps.length) return;

      const focusMapId = getConstellationFocusMapId();
      if (focusMapId === null) return;

      const activeIndex = orderedMaps.findIndex(map => map.id === focusMapId);
      if (activeIndex < 0) return;

      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);

      mapsCamera.targetX = point.x;
      mapsCamera.targetY = point.y;

      if (snap) {
        mapsCamera.x = point.x;
        mapsCamera.y = point.y;
      }
    }

    function shouldShowCenterMapsButton() {
      const orderedMaps = getOrderedMaps();
      if (!mapsOverlayOpen || pendingDeleteMapId !== null || !orderedMaps.length) return false;

      const focusMapId = getConstellationFocusMapId();
      if (focusMapId === null) return false;

      const activeIndex = orderedMaps.findIndex(map => map.id === focusMapId);
      if (activeIndex < 0) return false;

      const point = getConstellationMapWorldPoint(orderedMaps[activeIndex], activeIndex, orderedMaps.length);
      const dx = mapsCamera.x - point.x;
      const dy = mapsCamera.y - point.y;
      return Math.hypot(dx, dy) > Math.max(120, Math.min(width, height) * 0.12);
    }

    function updateMapsCenterButton() {
      centerMapsBtn.classList.toggle("is-visible", shouldShowCenterMapsButton());
    }

    function resolveConstellationTarget(x, y) {
      if (pendingDeleteMapId !== null) return null;

      if (hoveredMapId !== null) {
        const hoveredItem = constellationItems.find(item => item.kind === "map" && item.mapId === hoveredMapId);
        const hoveredDeleteControl = getConstellationDeleteControl(hoveredItem);
        if (
          hoveredItem &&
          hoveredDeleteControl &&
          pointInCircle(x, y, hoveredDeleteControl.x, hoveredDeleteControl.y, hoveredDeleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: hoveredItem,
            control: hoveredDeleteControl
          };
        }
      }

      const baseItem = getConstellationItemAt(x, y);
      if (!baseItem) return null;

      if (baseItem.kind === "map") {
        const deleteControl = getConstellationDeleteControl(baseItem);
        if (
          deleteControl &&
          pointInCircle(x, y, deleteControl.x, deleteControl.y, deleteControl.hitRadius)
        ) {
          return {
            kind: "delete",
            item: baseItem,
            control: deleteControl
          };
        }
      }

      return {
        kind: baseItem.kind,
        item: baseItem,
        control: null
      };
    }

    function updateMapsLabel(item) {
      if (!item) {
        clearMapsLabel();
        return;
      }

      mapsLabel.textContent = item.label;
      mapsLabel.style.color = item.star ? rgba(item.star.outlineColor, 0.98) : "";
      mapsLabel.style.textShadow = item.star
        ? `0 0 22px ${rgba(item.star.haloColor, 0.32)}`
        : "";
      mapsLabel.style.left = `${clamp(item.x, 24, width - 24)}px`;
      mapsLabel.style.top = `${clamp(item.y - item.radius - 18, 28, height - 28)}px`;
      mapsLabel.classList.add("is-visible");
    }

    function drawConstellationBackdrop(time) {
      mapsCtx.fillStyle = "#000000";
      mapsCtx.fillRect(0, 0, width, height);

      const fieldWidth = width + 180;
      const fieldHeight = height + 180;

      for (let i = 0; i < 96; i++) {
        const seed = i + 1;
        const parallax = 0.12 + hash01(seed * 2.6) * 0.16;
        const driftX = Math.sin(time * 0.00012 + seed * 2.4) * 2.2;
        const driftY = Math.cos(time * 0.0001 + seed * 1.7) * 2;
        const glowRadius = 2.6 + hash01(seed * 5.1) * 5.6;
        const coreRadius = 0.35 + hash01(seed * 6.8) * 1.25;
        const glowAlpha = 0.025 + hash01(seed * 4.2) * 0.05;
        const coreAlpha = 0.18 + hash01(seed * 9.4) * 0.32;
        const baseX = (hash01(seed * 3.7) * fieldWidth * 3.4) - fieldWidth * 1.7;
        const baseY = (hash01(seed * 8.9 + 14) * fieldHeight * 3) - fieldHeight * 1.5;
        const starX = wrap(baseX - mapsCamera.x * parallax, fieldWidth) - 90 + driftX;
        const starY = wrap(baseY - mapsCamera.y * parallax, fieldHeight) - 90 + driftY;

        const glow = mapsCtx.createRadialGradient(starX, starY, 0, starX, starY, glowRadius);
        glow.addColorStop(0, `rgba(236, 244, 250, ${glowAlpha})`);
        glow.addColorStop(1, "rgba(0,0,0,0)");
        mapsCtx.fillStyle = glow;
        mapsCtx.beginPath();
        mapsCtx.arc(starX, starY, glowRadius, 0, Math.PI * 2);
        mapsCtx.fill();

        mapsCtx.beginPath();
        mapsCtx.arc(starX, starY, coreRadius, 0, Math.PI * 2);
        mapsCtx.fillStyle = `rgba(245, 249, 252, ${coreAlpha})`;
        mapsCtx.fill();
      }
    }

    function drawStarFlareArm(x, y, length, thickness, angle, color, alpha, whiteAlpha = 0) {
      mapsCtx.save();
      mapsCtx.translate(x, y);
      mapsCtx.rotate(angle);
      mapsCtx.scale(length, thickness);

      const flare = mapsCtx.createRadialGradient(0, 0, 0, 0, 0, 1);
      flare.addColorStop(0, "rgba(0,0,0,0)");
      flare.addColorStop(0.07, "rgba(0,0,0,0)");
      flare.addColorStop(0.12, `rgba(255, 255, 255, ${whiteAlpha * 0.22})`);
      flare.addColorStop(0.18, rgba(color, alpha * 0.72));
      flare.addColorStop(0.3, rgba(color, alpha * 0.96));
      flare.addColorStop(0.5, rgba(color, alpha * 0.24));
      flare.addColorStop(1, "rgba(0,0,0,0)");

      mapsCtx.fillStyle = flare;
      mapsCtx.beginPath();
      mapsCtx.arc(0, 0, 1, 0, Math.PI * 2);
      mapsCtx.fill();
      mapsCtx.restore();
    }

    function getConstellationTwinkle(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00062;
      const seed = item.summary.seed + item.mapId * 0.173;
      const baseAmplitude = star.starVariant === "giant"
        ? 0.085
        : star.starType === "blue"
          ? 0.19
          : star.starType === "yellow"
            ? 0.168
            : star.starType === "orange"
              ? 0.146
              : 0.132;
      const stateDamping = item.isActive ? 0.94 : hovered ? 1.08 : 1.42;
      const amplitude = baseAmplitude * stateDamping;

      const slow = Math.sin(t * (0.74 + hash01(seed * 5.1) * 0.32) + seed * 6.2);
      const mid = Math.sin(
        t * (1.42 + hash01(seed * 8.4) * 0.7) +
        seed * 14.8 +
        Math.sin(t * 0.21 + seed * 1.7) * 0.22
      );
      const fast = Math.sin(t * (3.08 + hash01(seed * 11.7) * 1.18) + seed * 27.1);
      const shimmer = Math.sin(t * (6.2 + hash01(seed * 16.3) * 1.9) + seed * 39.6);
      const glint = Math.pow(
        Math.max(0, Math.sin(t * (0.92 + hash01(seed * 3.6) * 0.44) + seed * 9.7)),
        6
      ) * amplitude * 0.88;
      const flash = Math.pow(
        Math.max(0, Math.sin(t * (1.34 + hash01(seed * 7.2) * 0.72) + seed * 18.6)),
        10
      ) * amplitude * 1.8;

      const brightness = clamp(
        1 +
          slow * amplitude * 0.72 +
          mid * amplitude * 0.58 +
          fast * amplitude * 0.28 +
          shimmer * amplitude * 0.16 +
          glint * 1.22 +
          flash,
        0.76,
        1.72
      );
      const aura = clamp(
        1 +
          slow * amplitude * 1.02 +
          mid * amplitude * 0.82 +
          fast * amplitude * 0.28 +
          shimmer * amplitude * 0.13 +
          glint * 1.6 +
          flash * 1.34,
        0.68,
        2.1
      );
      const core = clamp(
        1 +
          slow * amplitude * 0.48 +
          mid * amplitude * 0.34 +
          shimmer * amplitude * 0.18 +
          glint * 1.02 +
          flash * 0.82,
        0.86,
        1.48
      );
      const scale = clamp(
        1 +
          slow * amplitude * 0.08 +
          mid * amplitude * 0.06 +
          fast * amplitude * 0.04 +
          glint * 0.1 +
          flash * 0.14,
        0.95,
        1.18
      );
      const bloom = clamp(
        Math.max(0, brightness - 1) * 0.95 + glint * 0.9 + flash * 1.4,
        0,
        0.86
      );

      return {
        brightness,
        aura,
        core,
        scale,
        bloom
      };
    }

    function getConstellationHaloBreath(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00019;
      const seed = item.summary.seed + item.mapId * 0.317;
      const baseAmplitude = star.starVariant === "giant"
        ? 0.092
        : star.starType === "blue"
          ? 0.078
          : star.starType === "yellow"
            ? 0.07
            : star.starType === "orange"
              ? 0.064
              : 0.06;
      const stateDamping = item.isActive ? 0.9 : hovered ? 0.95 : 1;
      const amplitude = baseAmplitude * stateDamping;

      const main = Math.sin(t * (0.86 + hash01(seed * 4.7) * 0.18) + seed * 5.3);
      const secondary = Math.sin(t * (1.34 + hash01(seed * 8.3) * 0.26) + seed * 11.9);
      const envelope = Math.sin(t * (0.34 + hash01(seed * 12.9) * 0.08) + seed * 2.7);

      const radius = clamp(
        1 +
          main * amplitude * 0.6 +
          secondary * amplitude * 0.24 +
          envelope * amplitude * 0.3,
        0.92,
        1.16
      );
      const alpha = clamp(
        1 +
          main * amplitude * 0.22 +
          secondary * amplitude * 0.1 +
          envelope * amplitude * 0.08,
        0.94,
        1.09
      );
      const bloom = clamp(
        1 +
          main * amplitude * 0.18 +
          envelope * amplitude * 0.1,
        0.96,
        1.1
      );

      return {
        radius,
        alpha,
        bloom
      };
    }

    function getConstellationFlareAsymmetry(item, time, hovered) {
      const star = item.star;
      const t = time * 0.00031;
      const seed = item.summary.seed + item.mapId * 0.541;
      const baseAmplitude = star.starType === "blue"
        ? 0.2
        : star.starType === "yellow"
          ? 0.17
          : star.starType === "orange"
            ? 0.145
            : star.starVariant === "giant"
              ? 0.14
              : 0.125;
      const stateDamping = item.isActive ? 0.92 : hovered ? 0.96 : 1;
      const amplitude = baseAmplitude * stateDamping;

      const primary = Math.sin(t * (1.04 + hash01(seed * 4.3) * 0.2) + seed * 6.1);
      const secondary = Math.sin(
        t * (1.72 + hash01(seed * 8.1) * 0.28) +
        seed * 13.4 +
        Math.sin(t * 0.27 + seed * 2.1) * 0.16
      );
      const balance = clamp(
        primary * amplitude * 0.7 + secondary * amplitude * 0.38,
        -0.24,
        0.24
      );
      const diagonal = clamp(
        Math.sin(t * (1.26 + hash01(seed * 10.4) * 0.22) + seed * 9.8) * amplitude * 0.42 +
        Math.sin(t * (2.08 + hash01(seed * 14.7) * 0.34) + seed * 17.2) * amplitude * 0.2,
        -0.14,
        0.14
      );

      return {
        verticalAlpha: 1 + balance,
        horizontalAlpha: 1 - balance * 0.92,
        verticalThickness: clamp(1 + balance * 0.38, 0.9, 1.12),
        horizontalThickness: clamp(1 - balance * 0.34, 0.9, 1.12),
        diagonalPositiveAlpha: 1 + diagonal,
        diagonalNegativeAlpha: 1 - diagonal * 0.94,
        diagonalPositiveThickness: clamp(1 + diagonal * 0.28, 0.92, 1.08),
        diagonalNegativeThickness: clamp(1 - diagonal * 0.24, 0.92, 1.08)
      };
    }

    function drawConstellationMap(item, time, hovered) {
      const star = item.star;
      const emphasis = item.isActive ? 1.16 : hovered ? 1.12 : 1;
      const radius = item.radius * emphasis;
      const pulse =
        1 +
        Math.sin(time * 0.0015 * star.orbitSpeed + item.summary.seed * 7.1) *
          (star.pulseScale + (item.isActive ? 0.006 : hovered ? 0.003 : 0));
      const twinkle = getConstellationTwinkle(item, time, hovered);
      const haloBreath = getConstellationHaloBreath(item, time, hovered);
      const flareAsymmetry = getConstellationFlareAsymmetry(item, time, hovered);
      const coreRadius = radius * pulse * twinkle.scale;
      const auraRadius = coreRadius * star.auraScale * (item.isActive ? 1.1 : hovered ? 1.05 : 1) * (0.96 + twinkle.aura * 0.12) * haloBreath.radius;
      const auraAlpha = star.auraAlpha * star.starLuminosity * twinkle.aura * haloBreath.alpha * (item.isActive ? 1.42 : hovered ? 1.24 : 1.08);
      const bodyRadius = coreRadius * 1.52 * (0.98 + twinkle.brightness * 0.05);
      const coronaRadius = coreRadius * 2.05 * (0.96 + twinkle.aura * 0.1) * (0.98 + (haloBreath.radius - 1) * 1.1);
      const hotCoreColor = mixColor(star.coreColor, [255, 255, 255], 0.52);
      const warmCoreColor = mixColor(star.coreColor, [255, 255, 255], 0.22);
      const whiteCoreAlpha = Math.min(
        1,
        star.whiteCoreAlpha * twinkle.core + (item.isActive ? 0.05 : hovered ? 0.025 : 0)
      );

      const aura = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, auraRadius);
      aura.addColorStop(0, rgba(star.haloColor, auraAlpha));
      aura.addColorStop(0.28, rgba(star.haloColor, auraAlpha * 0.56));
      aura.addColorStop(0.56, rgba(star.haloColor, auraAlpha * 0.14));
      aura.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = aura;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, auraRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      const coronaGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coronaRadius);
      coronaGlow.addColorStop(0, rgba(star.haloColor, auraAlpha * 0.5));
      coronaGlow.addColorStop(0.18, rgba(star.haloColor, auraAlpha * 0.28));
      coronaGlow.addColorStop(0.74, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = coronaGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coronaRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      if (twinkle.bloom > 0.02) {
        const twinkleBloomRadius = coronaRadius * haloBreath.bloom * (1.02 + twinkle.bloom * 0.28);
        const twinkleBloom = mapsCtx.createRadialGradient(
          item.x,
          item.y,
          0,
          item.x,
          item.y,
          twinkleBloomRadius
        );
        twinkleBloom.addColorStop(0, rgba(hotCoreColor, twinkle.bloom * 0.28));
        twinkleBloom.addColorStop(0.18, rgba(star.haloColor, twinkle.bloom * 0.2));
        twinkleBloom.addColorStop(0.52, rgba(star.haloColor, twinkle.bloom * 0.08));
        twinkleBloom.addColorStop(1, "rgba(0,0,0,0)");
        mapsCtx.fillStyle = twinkleBloom;
        mapsCtx.beginPath();
        mapsCtx.arc(item.x, item.y, twinkleBloomRadius, 0, Math.PI * 2);
        mapsCtx.fill();
      }

      const bodyGlow = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, bodyRadius);
      bodyGlow.addColorStop(0, rgba(hotCoreColor, star.bodyAlpha * twinkle.brightness * 0.98));
      bodyGlow.addColorStop(0.22, rgba(warmCoreColor, star.bodyAlpha * twinkle.brightness * 0.8));
      bodyGlow.addColorStop(0.48, rgba(star.coreColor, star.bodyAlpha * twinkle.brightness * 0.52));
      bodyGlow.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = bodyGlow;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, bodyRadius, 0, Math.PI * 2);
      mapsCtx.fill();

      const stellarCore = mapsCtx.createRadialGradient(item.x, item.y, 0, item.x, item.y, coreRadius * 1.08);
      stellarCore.addColorStop(0, `rgba(255, 255, 255, ${whiteCoreAlpha})`);
      stellarCore.addColorStop(0.1, `rgba(255, 255, 255, ${whiteCoreAlpha * 0.92})`);
      stellarCore.addColorStop(0.24, rgba(hotCoreColor, clamp(0.96 * twinkle.core, 0, 1)));
      stellarCore.addColorStop(0.46, rgba(warmCoreColor, clamp(0.88 * twinkle.core, 0, 1)));
      stellarCore.addColorStop(0.72, rgba(star.coreColor, star.bodyAlpha * twinkle.brightness * 0.74));
      stellarCore.addColorStop(1, "rgba(0,0,0,0)");
      mapsCtx.fillStyle = stellarCore;
      mapsCtx.beginPath();
      mapsCtx.arc(item.x, item.y, coreRadius * 1.08, 0, Math.PI * 2);
      mapsCtx.fill();

      const spikeAlpha = star.spikeAlpha * star.starLuminosity * twinkle.brightness * (1 + twinkle.bloom * 0.3) * (item.isActive ? 1.24 : hovered ? 1.12 : 1);
      const spikeLength = coreRadius * star.spikeLength * (1 + twinkle.bloom * 0.16) * (item.isActive ? 1.1 : hovered ? 1.05 : 1);
      const verticalThickness = coreRadius * 0.095 * flareAsymmetry.verticalThickness;
      const horizontalThickness = coreRadius * 0.068 * flareAsymmetry.horizontalThickness;
      const verticalSpikeAlpha = spikeAlpha * flareAsymmetry.verticalAlpha;
      const horizontalSpikeAlpha = spikeAlpha * flareAsymmetry.horizontalAlpha;
      const diagonalPositiveThickness = coreRadius * 0.062 * flareAsymmetry.diagonalPositiveThickness;
